# Sailfin workspace manifest — the workspace root for the self-hosted compiler.
#
# Design: SFEP-0006 (docs/proposals/0006-build-architecture.md) §4.2. This file
# declares the members that `sfn build -p compiler` resolves against, so an
# intra-workspace edge (compiler → runtime, compiler → sfn/strings, …) links
# from local source instead of the capsule cache or registry.
#
# The resolver consumes this manifest directly: `load_workspace_members`
# (compiler/src/capsule_resolver.sfn) reads `[workspace].members`, and
# `toolchain_decide` reads an optional `[toolchain]` pin here as the
# workspace-wide default (a member capsule.toml overrides it per field).
#
# `members` MUST stay a single-physical-line literal list until a seed that
# understands multi-line arrays + trailing-`/*` glob expansion is pinned in
# bootstrap.toml: `make compile` self-hosts with the *pinned seed*, which reads
# this file with its own baked-in TOML parser. The compiler now supports both
# forms (multi-line arrays in toml_parser.sfn; `capsules/sfn/*` glob expansion
# in capsule_resolver.sfn::_cr_expand_member_globs), so once a seed carrying
# that parser is pinned this collapses to:
#   members = [
#       "compiler",
#       "runtime",
#       "capsules/sfn/*",
#   ]

[workspace]
members = ["compiler", "runtime", "capsules/sfn/bench", "capsules/sfn/cli", "capsules/sfn/crypto", "capsules/sfn/fs", "capsules/sfn/http", "capsules/sfn/json", "capsules/sfn/layers", "capsules/sfn/log", "capsules/sfn/losses", "capsules/sfn/math", "capsules/sfn/net", "capsules/sfn/nn", "capsules/sfn/os", "capsules/sfn/path", "capsules/sfn/prelude", "capsules/sfn/strings", "capsules/sfn/sync", "capsules/sfn/tensor", "capsules/sfn/test", "capsules/sfn/time", "capsules/sfn/toml"]

# Workspace-wide toolchain floor (SFEP-0051 Phase 2, SFN-414 / SFEP-0046
# floor/override model). This is the default floor for every member: the
# running `sfn` must be >= `sfn` and rank >= `channel` (stable > rc > beta >
# alpha). A member `capsule.toml [toolchain]` overrides the workspace value
# per field (compiler/capsule.toml raises `sfn` for its own self-host gate).
# `toolchain_decide` (capsule_resolver.sfn) reads this block first, so the
# pinned seed in bootstrap.toml already honors it — adopting it here needs no
# seed cut. The floor stays <= the released compiler version so `make compile`
# self-hosts; bump it only to require a newer language/runtime capability
# workspace-wide. `channel = "alpha"` is the lowest rank (stable > rc > beta >
# alpha), so it never rejects a running toolchain today — it documents the
# minimum stability contract and tightens only if raised to `beta`/`rc`/`stable`.
[toolchain]
sfn = "0.8.0"
channel = "alpha"
