[capsule]
name = "sailfin"
version = "0.8.0-alpha.5"
description = "The Sailfin compiler — self-hosted, targeting LLVM via .sfn-asm IR"

# Dogfood the toolchain pin (SFEP-0046). This floor must never exceed
# [capsule].version above: the first-pass self-host binary runs at
# [capsule].version and gates itself when building seedcheck, so a pin ahead
# of the version would fail `make check` (use SAILFIN_TOOLCHAIN=off only for a
# deliberate seed transition — see the Makefile note).
[toolchain]
sfn = "0.8.0-alpha.3"

[dependencies]
# Stage D PR2: declare the C runtime as an explicit dependency so
# `sfn build -p compiler` finds it through the workspace's
# `kind = "runtime"` capsule discovery
# (`compiler/src/runtime_capsule_resolver.sfn`). The driver
# iterates every declared runtime capsule's `c-sources` /
# `ll-sources` / `include-dirs` / `link-libs` and feeds them into
# the link phase. `make compile` now routes through
# `<seed> build -p compiler`, so this line is the load-bearing
# pointer to the bootstrap's runtime sources. Historically
# `make compile` delegated to the prior `scripts/build.sh` (since
# retired in Stage E PR7 / #383), which walked
# `runtime/native/src/*.c` directly; Stage D PR4 flipped
# `make compile` to the driver, and Stage E PR7 deleted the
# script outright.
"sfn/runtime-native" = "*"
# Issue #1159 (CLI modularization epic #351, Phase 2 / Issue 2.1,
# Risk R1): declare the regular `sfn/*` source capsule `sfn/cli` as a
# compiler dependency. This is the load-bearing feasibility gate — the
# compiler tree has never imported from `capsules/sfn/*` (only the
# `kind = "runtime"` `sfn/runtime-native`), so this proves
# `capsule_resolver.sfn` can stage + compile + link a normal source
# capsule into a self-hosted build. A single token import + call of
# the `bold` helper in `cli_main.sfn` exercises link-time symbol
# resolution (imported module-level `let` constants like `EXIT_OK`
# lower to `internal global` and have no cross-capsule import path
# today, so a function call is what actually forces the link). Wildcard
# matches the `sfn/runtime-native` convention; the capsule is at
# 0.13.1 (workspace member `capsules/sfn/cli`).
"sfn/cli" = "*"
# SFN-35: `sfn/cli` (and `sfn/http`) import `int_to_string` from `sfn/strings`,
# dropping their private `_int_to_string` copies. `enumerate_capsule_sources`
# now resolves the transitive closure, so `sfn/strings` is reached through
# `sfn/cli` automatically — but `make compile` self-hosts against the PINNED
# SEED (`bootstrap.toml [seed]`), whose resolver is still flat. Until a seed
# carrying the transitive resolver is pinned, `sfn/strings` must stay declared
# directly here or the seed's flat build leaves `int_to_string__sfn__strings__mod`
# undefined at link. Drop this line in the same change that pins such a seed.
# `sfn/strings` is a pure (`required = []`) source capsule (workspace member
# `capsules/sfn/strings`).
"sfn/strings" = "*"
# SFEP-0046 §3.5 / §4: `sfn toolchain install` verifies a signed release
# manifest with `ed25519_verify_utf8` before extracting a fetched
# toolchain. Declared like `sfn/cli` — a normal source capsule staged +
# linked into the self-hosted build (workspace member `capsules/sfn/crypto`).
"sfn/crypto" = "*"

[capabilities]
# `io` covers fs.*, print.*, console.*, and process.* surface used
# across emit/lower/CLI helpers and the print.err debug traces.
# `clock` is required because compile_to_llvm_with_module_timed
# (compiler/src/main.sfn) wraps the lower pipeline with
# monotonic_millis() — `--timing` mode on `sfn emit llvm`.
# Phase F (docs/proposals/0008-effect-validation.md §5) enforces this
# surface against every function's declared effects: any function
# declaring an effect outside this list fails with E0403.
# `net` (SFEP-0046 §4, accepted): the native `sfn toolchain install`
# fetch path (`http.download` in cli/commands/toolchain.sfn) is
# `![net, io]`, so the compiler honestly declares the network authority
# it now uses — the capability model working as intended.
required = ["clock", "io", "net"]

[build]
kind = "binary"
entry = "src/main.sfn"

# The compiler reads its version from this file at runtime via
# resolve_compiler_version() in compiler/src/version.sfn.
# For installed binaries, __version_fallback__ in version.sfn is used.
# Release CI updates both files; build.sh writes a .build-stamp with
# the capsule version + git hash for dev builds.
