[capsule]
name = "sfn/test"
version = "0.9.5"
description = "Test assertion helpers and utilities for Sailfin"

[dependencies]
# `sfn/strings::find` replaces the hand-rolled `_find_in_string` helper
# the capsule used to inline. That capsule was renamed (#856) from its
# former `fmt` name to `strings` so its name matches its contents — pure
# string ops, not formatters (the name the proposal cited in
# `docs/proposals/0010-test-infra/02-phases.md`, issue 1.3). Integer
# formatting still goes through the runtime intrinsic `number_to_string`,
# the same formatter `pure_assert_eq_float` already uses for fractions.
"sfn/strings" = "*"

# `with_tmp_dir`'s teardown imports `sfn/fs::remove_all` (#976) instead of
# carrying an inlined copy. The earlier workaround (PR #1110) dropped this
# dependency to dodge the batched cross-capsule link bug (#1113); that bug
# is fixed (#873 slug canonicalization), so the import is restored (#1571).
"sfn/fs" = "*"

# `with_env` (#1166) composes the typed `os::Env` + `os::run_capture` to run
# a subprocess under a scoped, per-child environment without mutating the
# parent `environ`. `sfn/os` has no dependencies of its own, so no cycle.
"sfn/os" = "*"

[capabilities]
required = ["io"]

[build]
entry = "src/mod.sfn"
kind = "library"
