name: Agent Orchestration

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, labeled, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ─── Issue Triage ───────────────────────────────────────────────
  # Auto-label new issues to kick off the pipeline.
  triage:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();

            const labels = [];

            // Auto-detect issue type from title/body keywords
            if (title.startsWith('feat') || body.includes('feature request'))
              labels.push('feature', 'needs-design');
            else if (title.startsWith('fix') || title.startsWith('bug') || body.includes('bug'))
              labels.push('bug', 'needs-triage');
            else if (title.startsWith('docs') || body.includes('documentation'))
              labels.push('documentation');
            else if (title.startsWith('security') || body.includes('vulnerability'))
              labels.push('security');
            else
              labels.push('needs-triage');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels,
              });
            }

  # ─── Architect: Design Review ──────────────────────────────────
  # Triggered when an issue is labeled 'needs-design'.
  # The Architect agent reviews the issue and produces a design plan.
  dispatch-architect:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
      && github.event.label.name == 'needs-design'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                '## 🏗️ Architect Review Requested',
                '',
                '@architect — Please review this issue and provide:',
                '1. A design plan with affected files and pipeline stages',
                '2. Alignment assessment against roadmap (`docs/roadmap.md`)',
                '3. Risk analysis (self-hosting, complexity, effect system)',
                '',
                'When your review is complete:',
                '- If approved: remove `needs-design`, add `design-approved`',
                '- If changes needed: comment with concerns and add `needs-discussion`',
              ].join('\n'),
            });

  # ─── Engineer: Implementation ──────────────────────────────────
  # Triggered when an issue is labeled 'design-approved'.
  # The Engineer agent picks up the design and implements it.
  dispatch-engineer:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
      && github.event.label.name == 'design-approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                '## 🔧 Implementation Requested',
                '',
                '@engineer — The design has been approved. Please:',
                '1. Implement the changes following the design plan above',
                '2. Add regression tests in `compiler/tests/`',
                '3. Verify self-hosting with `make compile`',
                '4. Open a PR linking back to this issue',
                '',
                'The PR will automatically trigger review agents.',
              ].join('\n'),
            });

  # ─── PR Review: Fan out to all review agents ──────────────────
  # Triggered when a PR is opened or labeled 'needs-review'.
  dispatch-pr-reviews:
    if: >-
      github.event_name == 'pull_request'
      && (
        github.event.action == 'opened'
        || (github.event.action == 'labeled' && github.event.label.name == 'needs-review')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // Fetch changed files to determine which agents to invoke
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number }
            );
            const paths = files.map(f => f.filename);

            const touchesCompiler = paths.some(p => p.startsWith('compiler/'));
            const touchesDocs = paths.some(p => p.startsWith('docs/'));
            const touchesRuntime = paths.some(p => p.startsWith('runtime/'));
            const touchesExamples = paths.some(p => p.startsWith('examples/'));
            const touchesSite = paths.some(p => p.startsWith('site/'));

            const agents = [];

            // QC always reviews
            agents.push({
              agent: 'qc',
              message: '@qc — Please verify build, test coverage, documentation, and code quality for this PR.',
            });

            // Security reviews compiler and runtime changes
            if (touchesCompiler || touchesRuntime) {
              agents.push({
                agent: 'security',
                message: '@security — Please audit this PR for security implications: effect system boundaries, ownership enforcement, memory safety, and LLVM IR correctness.',
              });
            }

            // Product reviews user-facing changes
            if (touchesCompiler || touchesExamples || touchesSite) {
              agents.push({
                agent: 'product',
                message: '@product — Please evaluate this PR for developer experience: error message quality, syntax ergonomics, and example clarity.',
              });
            }

            // Docs Writer reviews when docs should be updated
            if (touchesDocs || touchesCompiler) {
              agents.push({
                agent: 'docs-writer',
                message: '@docs-writer — Please verify documentation accuracy and check that `docs/status.md`, `docs/spec.md`, and `docs/roadmap.md` are updated if needed.',
              });
            }

            // Post a single coordinating comment
            const body = [
              '## 🔍 Agent Reviews Dispatched',
              '',
              `Based on the changed files, the following agents have been assigned:`,
              '',
              ...agents.map(a => `- **${a.agent}**`),
              '',
              '---',
              '',
              ...agents.map(a => a.message),
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });

            // Add needs-review label if not already present
            const currentLabels = pr.labels.map(l => l.name);
            if (!currentLabels.includes('needs-review')) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ['needs-review'],
              });
            }

  # ─── Re-review on request ─────────────────────────────────────
  # When Engineer pushes fixes and adds 'needs-review' again.
  dispatch-re-review:
    if: >-
      github.event_name == 'pull_request'
      && github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);

            // Only notify if the PR has 'needs-changes' (feedback was given)
            if (labels.includes('needs-changes')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '## 🔄 Changes Pushed — Re-review Available',
                  '',
                  'New commits have been pushed addressing review feedback.',
                  'To trigger a fresh review cycle, add the `needs-review` label.',
                ].join('\n'),
              });

              // Remove needs-changes label
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: 'needs-changes',
                });
              } catch (e) {
                // Label might already be removed
              }
            }

  # ─── Bug fast-track ────────────────────────────────────────────
  # Bugs skip design review and go straight to Engineer.
  dispatch-bug-fix:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
      && github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Only fast-track if not also labeled needs-design
            if (!labels.includes('needs-design')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '## 🐛 Bug Fix Requested',
                  '',
                  '@engineer — Please investigate and fix this bug:',
                  '1. Reproduce the issue and add a failing test',
                  '2. Implement the fix in `compiler/src/`',
                  '3. Verify self-hosting with `make compile`',
                  '4. Open a PR linking back to this issue',
                ].join('\n'),
              });
            }
