name: Build

on:
  push:
    branches:
      - main
      - rc
      - beta
      - alpha
  pull_request:
  workflow_dispatch:
    inputs:
      run_stage1_bootstrap:
        description: "Also run Stage1/bootstrap pipeline (legacy safety net). Default: false"
        required: false
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stage2:
    name: Stage2 (${{ matrix.package_label }})
    # Legacy safety net: this job runs the Stage1->Stage2 bootstrap pipeline.
    # The project goal is full self-hosting, so keep this opt-in only.
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_stage1_bootstrap == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            package_label: macos-arm64
          - os: ubuntu-22.04
            package_label: linux-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-update-conda: false
          use-mamba: true

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm jq

      - name: Install jq + LLVM tools (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Build native Stage2 compiler
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) make compile

      - name: Run Sailfin-native tests
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) make test

      - name: Package Stage2 artifacts
        run: conda run -n sailfin python tools/package_stage2.py --skip-build --target ${{ matrix.package_label }} --out dist

      - name: Upload Stage2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage2-stage1-${{ matrix.package_label }}
          path: |
            dist/sailfin-stage2-${{ matrix.package_label }}-*.tar.gz
            dist/sailfin-stage2-${{ matrix.package_label }}-*.tar.gz.sha256
            dist/sailfin-stage2-${{ matrix.package_label }}-*.manifest.json
          if-no-files-found: error

  selfhost-from-release-seed:
    name: Selfhost From Release Seed (${{ matrix.package_label }})
    if: >-
      github.event_name != 'push' ||
      (
        github.event.head_commit.author.name != 'semantic-release' &&
        github.event.head_commit.author.name != 'Sailfin Release Bot' &&
        !contains(github.event.head_commit.author.email, 'semantic-release')
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      # The released seed can successfully selfhost current sources on alpha
      # while still producing an unstable compiler (segfaults in tests / emit-native).
      # Until a clean seed is published, force the stage1-bootstrap seed path on alpha.
      FORCE_STAGE1_SEED: ${{ (github.ref == 'refs/heads/alpha' || github.base_ref == 'alpha') && '1' || '0' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            package_label: macos-arm64
            asset_os: macos
            asset_arch: arm64
            max_attempts: 15
          - os: ubuntu-22.04
            package_label: linux-x86_64
            asset_os: linux
            asset_arch: x86_64
            max_attempts: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-update-conda: false
          use-mamba: true

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm jq

      - name: Install jq + LLVM tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install latest released Stage2 seed (via install.sh)
        shell: bash -l {0}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # Optional: set repo variables to pin or exclude a seed during incidents.
          # - SELFHOST_SEED_VERSION: e.g. 0.1.1-alpha.114 (or 'latest')
          # - SELFHOST_SEED_EXCLUDE_TAG: e.g. v0.1.1-alpha.999
          VERSION: ${{ vars.SELFHOST_SEED_VERSION || 'latest' }}
          EXCLUDE_TAG: ${{ vars.SELFHOST_SEED_EXCLUDE_TAG || '' }}
          GLOBAL_BIN_DIR: ${{ github.workspace }}/build/seed/bin
          INSTALL_BASE: ${{ github.workspace }}/build/seed/versions
        run: |
          set -euo pipefail
          ./install.sh
          echo "SEED_STAGE2=${GLOBAL_BIN_DIR}/sailfin-stage2" >> "$GITHUB_ENV"

      - name: Report installed seed version
        shell: bash -l {0}
        run: |
          set -euo pipefail
          ls -lh "$SEED_STAGE2"
          "$SEED_STAGE2" version

      - name: Try self-host rebuild Stage2 from released seed
        id: selfhost_seed_try
        if: env.FORCE_STAGE1_SEED != '1'
        continue-on-error: true
        shell: bash -l {0}
        run: |
          set -euo pipefail
          rm -f build/native/sailfin-stage2
          conda run -n sailfin python scripts/selfhost_native_stage2.py \
            --seed "$SEED_STAGE2" \
            --no-prefer-asan-seed \
            --out build/native/sailfin-stage2 \
            --jobs 2 \
            --import-context-jobs 1 \
            --max-attempts ${{ matrix.max_attempts }} \
            --max-total-seconds 1800

      - name: Stage1/bootstrap fallback seed (alpha only)
        if: >-
          (env.FORCE_STAGE1_SEED == '1') ||
          (
            steps.selfhost_seed_try.outcome != 'success' &&
            (github.ref == 'refs/heads/alpha' || github.base_ref == 'alpha')
          )
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "[ci][warn] using stage1 bootstrap to mint a temporary seed (alpha escape hatch)"
          if [ "${RUNNER_OS}" = "Linux" ]; then
            export CLANG_LL_FLAGS="-mllvm -opaque-pointers"
          fi
          # Keep parallelism conservative on CI runners. This is a *temporary* seed,
          # so prefer faster compilation over peak optimization.
          CONDA=$(which conda) make compile NATIVE_JOBS=1 NATIVE_OPT=-O1 NATIVE_LL_TIMEOUT_SECONDS=2400
          # Preserve the stage1-built binary as a seed input for the selfhost step.
          rm -f build/native/sailfin-stage2-stage1-seed
          mv build/native/sailfin-stage2 build/native/sailfin-stage2-stage1-seed

      - name: Self-host rebuild Stage2 from fallback seed (alpha only)
        if: >-
          (env.FORCE_STAGE1_SEED == '1') ||
          (
            steps.selfhost_seed_try.outcome != 'success' &&
            (github.ref == 'refs/heads/alpha' || github.base_ref == 'alpha')
          )
        shell: bash -l {0}
        run: |
          set -euo pipefail
          rm -f build/native/sailfin-stage2
          conda run -n sailfin python scripts/selfhost_native_stage2.py \
            --seed build/native/sailfin-stage2-stage1-seed \
            --no-prefer-asan-seed \
            --out build/native/sailfin-stage2 \
            --jobs 2 \
            --import-context-jobs 1 \
            --max-attempts ${{ matrix.max_attempts }} \
            --max-total-seconds 1800

      - name: Fail if no build path succeeded
        if: >-
          steps.selfhost_seed_try.outcome != 'success' &&
          !(github.ref == 'refs/heads/alpha' || github.base_ref == 'alpha')
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "released seed failed to selfhost, and stage1 fallback is disabled on this branch" >&2
          exit 1

      - name: Report selfhosted compiler metadata
        shell: bash -l {0}
        run: |
          set -euo pipefail
          ls -lh build/native/sailfin-stage2
          (file build/native/sailfin-stage2 || true)
          build/native/sailfin-stage2 version || build/native/sailfin-stage2 --version || true

      - name: Expose runtime prelude object for tests
        shell: bash -l {0}
        run: |
          set -euo pipefail
          # The Stage2 CLI test runner requires a runtime bundle prelude object.
          # In a fresh CI checkout, the selfhost build produces it under build/selfhost/...
          # but the CLI searches build/native/obj/runtime/prelude.o as a fallback.
          if [ ! -f build/selfhost/stage2/obj/runtime/prelude.o ]; then
            echo "missing build/selfhost/stage2/obj/runtime/prelude.o (selfhost did not build runtime__prelude?)" >&2
            find build/selfhost -maxdepth 4 -type f -name 'prelude.o' -print || true
            exit 1
          fi
          mkdir -p build/native/obj/runtime
          cp -f build/selfhost/stage2/obj/runtime/prelude.o build/native/obj/runtime/prelude.o
          ls -lh build/selfhost/stage2/obj/runtime/prelude.o build/native/obj/runtime/prelude.o

      - name: Enable test runner trace (macOS)
        if: runner.os == 'macOS'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          mkdir -p build/sailfin
          touch build/sailfin/.trace_test_runner

      - name: Preflight single unit test (macOS)
        if: runner.os == 'macOS'
        id: mac_test_preflight
        continue-on-error: true
        shell: bash -l {0}
        run: |
          set -euo pipefail
          build/native/sailfin-stage2 test compiler/tests/unit/cli_version_test.sfn

      - name: ASAN repro on preflight failure (macOS)
        if: runner.os == 'macOS' && steps.mac_test_preflight.outcome != 'success'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "[ci][warn] preflight unit test crashed; building a Stage1-based ASAN compiler to get a stack trace"
          CONDA=$(which conda) make native-stage2-asan
          # Ensure the runtime prelude object exists where the test runner expects it.
          # (native-stage2-asan builds build/native/asan-obj, including runtime/prelude.o under build/native/asan-obj/runtime/prelude.o)
          mkdir -p build/native/obj/runtime
          if [ -f build/native/asan-obj/runtime/prelude.o ]; then
            cp -f build/native/asan-obj/runtime/prelude.o build/native/obj/runtime/prelude.o
          fi
          # The test runner links with clang; when using an ASAN-instrumented compiler/runtime,
          # the final test executable must link the ASAN runtime as well.
          # Provide a PATH-preferred clang wrapper that forces -fsanitize=address.
          mkdir -p build/clang-asan-wrapper
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'REAL_CLANG="'"'"'$(xcrun --find clang)'"'"'"' \
            'exec "$REAL_CLANG" -fsanitize=address "$@"' \
            > build/clang-asan-wrapper/clang
          chmod +x build/clang-asan-wrapper/clang
          export PATH="$PWD/build/clang-asan-wrapper:$PATH"
          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0"
          build/native/sailfin-stage2-asan test compiler/tests/unit/cli_version_test.sfn

      - name: Self-host fixed-point rebuild (linux-x86_64)
        if: matrix.package_label == 'linux-x86_64'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda run -n sailfin python scripts/selfhost_native_stage2.py \
            --seed build/native/sailfin-stage2 \
            --out build/native/sailfin-stage2-selfhost1 \
            --jobs 1 \
            --import-context-jobs 1 \
            --max-attempts 5 \
            --seed-timeout 120 \
            --max-total-seconds 1200
          conda run -n sailfin python scripts/selfhost_native_stage2.py \
            --seed build/native/sailfin-stage2-selfhost1 \
            --out build/native/sailfin-stage2-selfhost2 \
            --jobs 1 \
            --import-context-jobs 1 \
            --max-attempts 3
          ls -lh build/native/sailfin-stage2-selfhost1 build/native/sailfin-stage2-selfhost2
          (file build/native/sailfin-stage2-selfhost1 build/native/sailfin-stage2-selfhost2 || true)
          build/native/sailfin-stage2-selfhost1 version || true
          build/native/sailfin-stage2-selfhost2 version || true
          echo "[ci] fixed-point sha256:" 
          (sha256sum build/native/sailfin-stage2-selfhost1 build/native/sailfin-stage2-selfhost2 2>/dev/null || shasum -a 256 build/native/sailfin-stage2-selfhost1 build/native/sailfin-stage2-selfhost2)
          if ! cmp -s build/native/sailfin-stage2-selfhost1 build/native/sailfin-stage2-selfhost2; then
            echo "[ci][error] fixed-point rebuild mismatch (binaries differ)" >&2
            (cmp -l build/native/sailfin-stage2-selfhost1 build/native/sailfin-stage2-selfhost2 | head -n 20 || true)
            exit 1
          fi

      - name: Run Sailfin-native tests (selfhosted compiler)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          CONDA=$(which conda) make test

      - name: Package Stage2 artifacts (selfhosted)
        run: conda run -n sailfin python tools/package_stage2.py --skip-build --target ${{ matrix.package_label }} --out dist

      - name: Upload Stage2 artifacts (selfhosted)
        uses: actions/upload-artifact@v4
        with:
          name: stage2-${{ matrix.package_label }}
          path: |
            dist/sailfin-stage2-${{ matrix.package_label }}-*.tar.gz
            dist/sailfin-stage2-${{ matrix.package_label }}-*.tar.gz.sha256
            dist/sailfin-stage2-${{ matrix.package_label }}-*.manifest.json
          if-no-files-found: error

  semantic-release:
    needs: selfhost-from-release-seed
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git credentials
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git config user.name "Sailfin Release Bot"
          git config user.email "releases@sailfin.io"
          git remote set-url origin "https://mcereal:${RELEASE_PAT}@github.com/SailfinIO/sailfin.git"

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true

      - name: Semantic release version
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) semantic-release version

      - name: Run semantic release
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) semantic-release publish
