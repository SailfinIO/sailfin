name: Nightly self-host check

# The triple-pass `make check` gate is the only thing that catches
# compiler bugs baked into the first-pass binary (e.g. re-export
# miscompilations — see docs/rca/2026-04-18-reexport-diagnostic-gep.md).
# Per-PR CI is intentionally single-pass for speed; this job runs
# nightly and before a release to give us a clean self-hosting signal.
#
# Triggers:
#   - nightly at 07:00 UTC
#   - manual dispatch (use before cutting any release)
#   - when the release-tag workflow runs (see release-tag.yml)
#
# The pinned seed version lives in `.seed-version` at the repo root.
# A setup step below reads that file (or uses the `seed_version`
# workflow_dispatch input when set) and exports the resolved value as
# `steps.seed.outputs.seed_version`. Kept in sync with ci.yml,
# release-branches.yml, release-tag.yml, and the Makefile — all four
# read the same `.seed-version` file. Bumping the seed is a one-line
# edit.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      seed_version:
        description: "Seed version (blank defaults to `.seed-version` from checkout)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: nightly-selfhost
  cancel-in-progress: false

jobs:
  make-check:
    name: make check (triple-pass fixed point) [${{ matrix.package_label }}]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            package_label: linux-x86_64
            clang: clang-18
          - os: macos-latest
            package_label: macos-arm64
            clang: clang
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Resolve seed version (input override → .seed-version)
        id: seed
        shell: bash
        env:
          INPUT_SEED_VERSION: ${{ inputs.seed_version }}
        run: |
          set -euo pipefail
          override="$(printf '%s' "$INPUT_SEED_VERSION" | tr -d '[:space:]')"
          if [ -n "$override" ]; then
            echo "[seed-pin] using seed $override (workflow_dispatch input override)"
            pin="$override"
          else
            if [ ! -f .seed-version ]; then
              echo "[seed-pin] .seed-version is missing from checkout" >&2
              exit 1
            fi
            pin="$(tr -d '[:space:]' < .seed-version)"
            if [ -z "$pin" ]; then
              echo "[seed-pin] .seed-version is empty" >&2
              exit 1
            fi
            echo "[seed-pin] using seed $pin from .seed-version"
          fi
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq

      - name: Install jq + LLVM tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Fetch released seed compiler
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_VERSION: ${{ steps.seed.outputs.seed_version }}
        run: |
          set -euo pipefail
          echo "[nightly] seed version: $SEED_VERSION"
          make fetch-seed SEED_VERSION="$SEED_VERSION"
          build/seed/bin/sailfin version

      - name: make check (first pass → seedcheck → stage3)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLANG: ${{ matrix.clang }}
        run: |
          set -euo pipefail
          export SEED_NATIVE="build/seed/bin/sailfin"
          make check

      - name: Surface non-empty phase_types diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          shopt -s globstar nullglob
          files=(build/selfhost/**/build/sailfin/.phase_types_diagnostics)
          for f in "${files[@]}"; do
            if [ -s "$f" ]; then
              echo "== $f =="
              cat "$f"
            fi
          done

      - name: Surface retry-log entries
        if: always()
        shell: bash
        run: |
          set +e
          for log in build/selfhost/**/raw/retry_log.tsv; do
            if [ -s "$log" ]; then
              echo "== $log =="
              cat "$log"
            fi
          done
