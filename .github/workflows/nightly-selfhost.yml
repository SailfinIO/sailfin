name: Nightly self-host check

# The triple-pass `make check` gate is the only thing that catches
# compiler bugs baked into the first-pass binary (e.g. re-export
# miscompilations — see docs/rca/2026-04-18-reexport-diagnostic-gep.md).
# Per-PR CI is intentionally single-pass for speed; this job runs
# nightly and before a release to give us a clean self-hosting signal.
#
# Triggers:
#   - nightly at 07:00 UTC
#   - manual dispatch (use before cutting any release)
#   - when the release-tag workflow runs (see release-tag.yml)
#
# The pinned seed version lives in `bootstrap.toml`'s [seed].version key
# at the repo root. A setup step below reads that file (or uses the
# `seed_version` workflow_dispatch input when set) and exports the
# resolved value as `steps.seed.outputs.seed_version`. Kept in sync with
# ci.yml, release-branches.yml, release-tag.yml, and the Makefile — all
# four read the same `bootstrap.toml`. Bumping the seed is a one-line
# edit.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      seed_version:
        description: "Seed version (blank defaults to bootstrap.toml [seed].version from checkout)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: nightly-selfhost
  cancel-in-progress: false

jobs:
  make-check:
    name: make check (triple-pass fixed point) [${{ matrix.package_label }}]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            package_label: linux-x86_64
            clang: clang-18
            # Strict self-host gate (#1830): a stage2/stage3 fixed-point
            # mismatch fails this leg instead of warn-and-promote.
            selfhost_strict: "1"
          # Trialing macos-26 ahead of the 2026-06-15 `macos-latest` migration:
          # nightly is the early-warning canary for fixed-point / determinism
          # breakage on the new image before CI and release jobs adopt it.
          #
          # Strict on macOS too (SFN-87 / #1726). It was warn-only because the
          # check could not pass: ld64 derives a Mach-O's ad-hoc code-signature
          # identifier from the linked output's basename, and the driver linked
          # stage2/stage3 to different basenames, so `binary_match` was
          # structurally unsatisfiable and every run reported a mismatch even
          # though all 240 module digests were identical. With both stages
          # linked to a common basename the fixed point is reached (binary
          # included), and `sfn selfhost` now gates strict on module-IR
          # divergence rather than the binary sha, which macOS packaging makes
          # an unreliable signal.
          - os: macos-26
            package_label: macos-arm64
            clang: clang
            selfhost_strict: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version (input override → bootstrap.toml)
        id: seed
        shell: bash
        env:
          INPUT_SEED_VERSION: ${{ inputs.seed_version }}
        run: |
          set -euo pipefail
          override="$(printf '%s' "$INPUT_SEED_VERSION" | tr -d '[:space:]')"
          if [ -n "$override" ]; then
            echo "[seed-pin] using seed $override (workflow_dispatch input override)"
            pin="$override"
          else
            if [ ! -f bootstrap.toml ]; then
              echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
              exit 1
            fi
            pin="$(awk '
              /^\[[^]]+\]/ { section=$0 }
              section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
            ' bootstrap.toml)"
            if [ -z "$pin" ]; then
              echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
              exit 1
            fi
            echo "[seed-pin] using seed $pin from bootstrap.toml"
          fi
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq

      - name: Install jq + LLVM tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Fetch released seed compiler
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_VERSION: ${{ steps.seed.outputs.seed_version }}
        run: |
          set -euo pipefail
          echo "[nightly] seed version: $SEED_VERSION"
          make fetch-seed SEED_VERSION="$SEED_VERSION"
          build/toolchains/seed/bin/sfn version

      - name: make check (first pass → seedcheck → stage3)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLANG: ${{ matrix.clang }}
          # #1830: SELFHOST_STRICT=1 makes a stage2/stage3 fixed-point
          # mismatch fatal on the Linux leg; macOS passes "0" (warn-only).
          SELFHOST_STRICT: ${{ matrix.selfhost_strict }}
        run: |
          set -euo pipefail
          export SEED_NATIVE="build/toolchains/seed/bin/sfn"
          make check SELFHOST_STRICT="$SELFHOST_STRICT"

      - name: Surface non-empty phase_types diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          shopt -s globstar nullglob
          files=(build/selfhost/**/build/sailfin/.phase_types_diagnostics)
          for f in "${files[@]}"; do
            if [ -s "$f" ]; then
              echo "== $f =="
              cat "$f"
            fi
          done

      - name: Surface retry-log entries
        if: always()
        shell: bash
        run: |
          set +e
          for log in build/selfhost/**/raw/retry_log.tsv; do
            if [ -s "$log" ]; then
              echo "== $log =="
              cat "$log"
            fi
          done
