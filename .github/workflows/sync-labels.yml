name: Sync Labels

# Reconciles repository labels with the canonical scheme defined in
# .github/labels.yml. Auto-runs on push to main when the spec or the
# setup script changes. Maintainers can also trigger it manually
# (workflow_dispatch) to re-apply after a manual edit on github.com.
#
# This is a regular Actions workflow, not a gh-aw agent: no LLM, no API
# key, deterministic shell script. Drift can never compound because every
# merge to main re-runs it.

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - 'scripts/setup-github-labels.sh'
      - '.github/workflows/sync-labels.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without writing'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: sync-labels
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install yq (pinned)
        env:
          # Pinned for determinism. Bump deliberately; CI must stay
          # reproducible across upstream yq releases.
          YQ_VERSION: "v4.44.3"
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          curl -fsSL -o "$tmpdir/yq" \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          # Verify against upstream's published checksums for the same tag.
          # `checksums` is a single text file shipped with every yq release;
          # it covers every published artifact name -> sha256. We grep our
          # binary out of it and run `sha256sum --check`.
          curl -fsSL -o "$tmpdir/checksums" \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums"
          curl -fsSL -o "$tmpdir/checksums_hashes_order" \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums_hashes_order"
          # checksums_hashes_order tells us which column is sha256.
          col="$(grep -nx 'SHA-256' "$tmpdir/checksums_hashes_order" | cut -d: -f1)"
          [[ -n "$col" ]] || { echo "::error::SHA-256 column not found in checksums_hashes_order"; exit 1; }
          want="$(awk -v f="yq_linux_amd64" -v c="$col" '$1==f { print $(c+1) }' "$tmpdir/checksums")"
          [[ -n "$want" ]] || { echo "::error::no sha256 for yq_linux_amd64 in checksums"; exit 1; }
          got="$(sha256sum "$tmpdir/yq" | awk '{ print $1 }')"
          [[ "$want" == "$got" ]] || {
            echo "::error::yq checksum mismatch for ${YQ_VERSION}: want=$want got=$got"
            exit 1
          }
          sudo install -m 0755 "$tmpdir/yq" /usr/local/bin/yq
          yq --version

      - name: Sync labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            scripts/setup-github-labels.sh --dry-run --repo "$GH_REPO"
          else
            scripts/setup-github-labels.sh --repo "$GH_REPO"
          fi
