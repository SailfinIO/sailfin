name: CI (branch push)

# Runs the build + test matrix on pushes to main, rc, and beta.
#
# This workflow validates that the branch is healthy.  It does NOT create
# releases — use the manual "Release" workflow (release.yml) for that.
#
# The pinned seed version lives in `.seed-version` at the repo root.
# A setup step below reads that file and exports the resolved value as
# a step output (`steps.seed.outputs.seed_version`) so the downstream
# composite action sees the correct pin. Kept in sync with ci.yml,
# release-tag.yml, nightly-selfhost.yml, and the Makefile — all four
# read the same `.seed-version` file. Bumping the seed is a one-line
# edit.

on:
    push:
        branches:
            - main
            - rc
            - beta
        paths-ignore:
            - CHANGELOG.md
            - compiler/src/version.sfn
            - compiler/capsule.toml
            - 'site/**'
            - 'capsules/**/capsule.toml'

concurrency:
    group: ci-branch-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-from-release-seed:
        name: Build + Test (seed) [${{ matrix.package_label }}]
        # Skip release-bot commits to avoid burning runner time.
        if: >-
            github.event.head_commit.author.name != 'Sailfin Release Bot' &&
            !contains(github.event.head_commit.message, 'chore(release)')
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Pinned to macos-15: `macos-latest` migrates to macOS 26
                    # on 2026-06-15. Seed-producing build; keep the toolchain
                    # stable rather than letting the image shift mid-cycle.
                    - os: macos-15
                      package_label: macos-arm64
                      clang: clang
                      # 3-vCPU / 7GB hosted runner — see the test_jobs
                      # input in actions/sailfin-build for the RAM budget.
                      test_jobs: 2
                    - os: ubuntu-24.04
                      package_label: linux-x86_64
                      clang: clang-18
                      # 4-vCPU / 16GB hosted runner.
                      test_jobs: 4

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6.0.3

            - name: Resolve seed version from .seed-version
              id: seed
              shell: bash
              run: |
                  set -euo pipefail
                  if [ ! -f .seed-version ]; then
                      echo "[seed-pin] .seed-version is missing from checkout" >&2
                      exit 1
                  fi
                  pin="$(tr -d '[:space:]' < .seed-version)"
                  if [ -z "$pin" ]; then
                      echo "[seed-pin] .seed-version is empty" >&2
                      exit 1
                  fi
                  echo "[seed-pin] using seed $pin"
                  echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

            - name: Install clang (Linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y clang-18 llvm-18 jq
                  echo "CLANG=clang-18" >> "$GITHUB_ENV"

            - name: Install jq + LLVM tools (macOS)
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  brew install jq llvm
                  echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

            - name: Build + test + package (via Makefile)
              uses: ./.github/actions/sailfin-build
              env:
                  GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
              with:
                  target: ${{ matrix.package_label }}
                  clang: ${{ matrix.clang }}
                  seed_version: ${{ steps.seed.outputs.seed_version }}
                  test_jobs: ${{ matrix.test_jobs }}
                  # Slim release gate (#843): beta/rc tags are always
                  # prereleases cut from a validated main/branch SHA —
                  # build + package + smoke here; suite coverage lives in
                  # PR CI, push:main, and the nightly self-host.
                  mode: build-package

            - name: Smoke-test built compiler (hello-world)
              shell: bash {0}
              run: |
                  set -euo pipefail
                  if [ "${RUNNER_OS:-}" = "Linux" ]; then
                      ulimit -v 8388608 || true
                  fi
                  out="$(build/native/sailfin run examples/basics/hello-world.sfn)"
                  echo "$out"
                  if ! printf '%s' "$out" | grep -q "Hello, Sailfin!"; then
                      echo "[ci][error] hello-world smoke failed: expected 'Hello, Sailfin!' in output" >&2
                      exit 1
                  fi

            - name: Report compiler metadata
              shell: bash {0}
              run: |
                  set -euo pipefail
                  ls -lh build/native/sailfin
                  (file build/native/sailfin || true)
                  build/native/sailfin version || build/native/sailfin --version || true
