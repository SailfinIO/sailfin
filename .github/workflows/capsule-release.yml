name: Capsule Release

on:
  push:
    branches: [main]
    paths:
      - 'capsules/**'

concurrency:
  group: capsule-release
  cancel-in-progress: false

jobs:
  release:
    name: Detect, Version & Publish Capsules
    if: >-
      github.event.head_commit.author.name != 'Sailfin Release Bot' &&
      !contains(github.event.head_commit.message, '[skip capsule-release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git credentials
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          git config user.name "Sailfin Release Bot"
          git config user.email "releases@sailfin.io"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Install Sailfin CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/SailfinIO/sailfin/main/install.sh | bash

      - name: Detect changed capsules and publish
        env:
          SAILFIN_REGISTRY_PUBLISH_TOKEN: ${{ secrets.SAILFIN_REGISTRY_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail

          # Get the commit range for this push
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          # If this is the first push (before is all zeros), compare against parent
          if echo "$BEFORE" | grep -qE '^0+$'; then
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          fi

          echo "Comparing $BEFORE..$AFTER"

          # Find all capsule directories that had source changes (not just capsule.toml bumps)
          changed_capsules=()
          for capsule_dir in $(find capsules -name capsule.toml -exec dirname {} \;); do
            # Check if any files OTHER than capsule.toml changed in this capsule
            if git diff --name-only "$BEFORE".."$AFTER" -- "$capsule_dir" | grep -qv 'capsule\.toml$'; then
              changed_capsules+=("$capsule_dir")
            fi
          done

          if [ ${#changed_capsules[@]} -eq 0 ]; then
            echo "No capsule source changes detected, skipping."
            exit 0
          fi

          echo "Changed capsules: ${changed_capsules[*]}"

          committed=false

          for capsule_dir in "${changed_capsules[@]}"; do
            capsule_name="$(grep -oP '^name\s*=\s*"\K[^"]+' "$capsule_dir/capsule.toml")"
            echo "::group::Processing $capsule_name ($capsule_dir)"

            # Get commits that touched this capsule's source files (excluding capsule.toml)
            commits="$(git log "$BEFORE".."$AFTER" --format='%s' -- "$capsule_dir" | grep -v 'capsule\.toml$' || true)"

            if [ -z "$commits" ]; then
              echo "No relevant commits for $capsule_name, skipping."
              echo "::endgroup::"
              continue
            fi

            echo "Commits touching $capsule_name:"
            echo "$commits"

            # Determine bump type from conventional commits
            bump="patch"
            if echo "$commits" | grep -qiE '^[a-z]+(\(.+\))?!:'; then
              bump="major"
            elif echo "$commits" | grep -qiE '^feat(\(.+\))?:'; then
              bump="minor"
            fi

            echo "Bump type: $bump"

            # Read current version
            current_version="$(grep -oP '^version\s*=\s*"\K[^"]+' "$capsule_dir/capsule.toml")"
            echo "Current version: $current_version"

            # Bump version
            IFS='.' read -r major minor patch <<< "$current_version"
            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            new_version="${major}.${minor}.${patch}"
            echo "New version: $new_version"

            # Update capsule.toml
            sed -i "s/^version = \"$current_version\"/version = \"$new_version\"/" "$capsule_dir/capsule.toml"

            # Publish
            echo "Publishing $capsule_name@$new_version..."
            (cd "$capsule_dir" && sailfin publish)

            echo "::endgroup::"
            committed=true
          done

          # Commit all version bumps in one commit
          if [ "$committed" = true ]; then
            git add capsules/*/capsule.toml capsules/*/*/capsule.toml
            git commit -m "chore(capsules): bump versions [skip capsule-release]

          $(for capsule_dir in "${changed_capsules[@]}"; do
              name="$(grep -oP '^name\s*=\s*\"\K[^\"]+' "$capsule_dir/capsule.toml")"
              ver="$(grep -oP '^version\s*=\s*\"\K[^\"]+' "$capsule_dir/capsule.toml")"
              echo "  - $name@$ver"
            done)"
            git push origin main
          fi
