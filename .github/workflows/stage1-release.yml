name: Stage1 Build and Release

on:
  push:
    branches:
      - main
      - alpha
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true

      - name: Run tests
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) make test

      - name: Build stage1 artifact
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sailfin-stage1
          path: dist/*.zip

  semantic-release:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git credentials
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git config user.name "Sailfin Release Bot"
          git config user.email "releases@sailfin.io"
          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/SailfinIO/sailfin.git"

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true

      - name: Semantic release version
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) semantic-release version

      - name: Run semantic release
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) semantic-release publish
