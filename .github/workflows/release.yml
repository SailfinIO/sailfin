name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.2-alpha.1). If empty, uses the triggering release tag."
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build native (${{ matrix.package_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            package_label: linux-x86_64
            asset_os: linux
            asset_arch: x86_64
            exe_ext: ""
          - os: macos-latest
            package_label: macos-arm64
            asset_os: macos
            asset_arch: arm64
            exe_ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          TAG_INPUT="${{ inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "Tag could not be resolved" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-update-conda: false
          use-mamba: true

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang llvm jq

      - name: Install jq + LLVM tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install released Stage2 seed (previous release)
        id: seed
        shell: bash -l {0}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: latest
          # Exclude the current tag to avoid selecting a release with no assets yet.
          EXCLUDE_TAG: ${{ steps.rel.outputs.tag }}
          GLOBAL_BIN_DIR: ${{ github.workspace }}/build/seed/bin
          INSTALL_BASE: ${{ github.workspace }}/build/seed/versions
        run: |
          set -euo pipefail
          ./install.sh
          echo "seed_path=${GLOBAL_BIN_DIR}/sailfin-stage2" >> "$GITHUB_OUTPUT"

      - name: Report installed seed version
        shell: bash -l {0}
        run: |
          set -euo pipefail
          ls -lh "${{ steps.seed.outputs.seed_path }}"
          "${{ steps.seed.outputs.seed_path }}" version

      - name: Try self-host rebuild Stage2 from released seed
        id: selfhost_seed_try
        continue-on-error: true
        shell: bash -l {0}
        run: |
          set -euo pipefail
          rm -f build/native/sailfin-stage2-selfhost${{ matrix.exe_ext }}
          conda run -n sailfin python scripts/selfhost_native_stage2.py \
            --seed "${{ steps.seed.outputs.seed_path }}" \
            --no-prefer-asan-seed \
            --out build/native/sailfin-stage2-selfhost${{ matrix.exe_ext }} \
            --jobs 2 \
            --max-attempts 10 \
            --max-total-seconds 3600

      - name: Stage1/bootstrap fallback seed (alpha escape hatch)
        if: steps.selfhost_seed_try.outcome != 'success'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "[release][warn] previous released seed could not selfhost this tag; falling back to stage1 bootstrap to mint a temporary seed"
          if [ "${RUNNER_OS}" = "Linux" ]; then
            export CLANG_LL_FLAGS="-mllvm -opaque-pointers"
          fi
          CONDA=$(which conda) make compile
          rm -f build/native/sailfin-stage2-stage1-seed
          mv build/native/sailfin-stage2 build/native/sailfin-stage2-stage1-seed

      - name: Self-host rebuild Stage2 from fallback seed
        if: steps.selfhost_seed_try.outcome != 'success'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          rm -f build/native/sailfin-stage2-selfhost${{ matrix.exe_ext }}
          conda run -n sailfin python scripts/selfhost_native_stage2.py \
            --seed build/native/sailfin-stage2-stage1-seed \
            --no-prefer-asan-seed \
            --out build/native/sailfin-stage2-selfhost${{ matrix.exe_ext }} \
            --jobs 2 \
            --max-attempts 10 \
            --max-total-seconds 3600

      - name: Verify embedded CLI version matches release tag
        shell: bash -l {0}
        run: |
          set -euo pipefail
          VERSION="${{ steps.rel.outputs.version }}"
          OUT="$(build/native/sailfin-stage2-selfhost${{ matrix.exe_ext }} --version | tr -d '\r' | head -n 1)"
          echo "$OUT"
          echo "$OUT" | grep -F "sfn ${VERSION}" >/dev/null

      - name: Run Sailfin-native tests (release binary)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          CONDA=$(which conda)
          STAGE2_BIN="build/native/sailfin-stage2-selfhost${{ matrix.exe_ext }}"
          "$STAGE2_BIN" --version
          CONDA="$CONDA" make test STAGE2_BIN="$STAGE2_BIN"

      - name: Package release asset
        shell: bash -l {0}
        run: |
          set -euo pipefail
          VERSION="${{ steps.rel.outputs.version }}"
          OS="${{ matrix.asset_os }}"
          ARCH="${{ matrix.asset_arch }}"
          EXE_EXT="${{ matrix.exe_ext }}"
          BIN_SRC="build/native/sailfin-stage2-selfhost${EXE_EXT}"
          PRELUDE_OBJ="build/selfhost/stage2/obj/runtime/prelude.o"

          mkdir -p dist
          STAGE_DIR="$(mktemp -d)"
          mkdir -p "${STAGE_DIR}/bin"
          cp "$BIN_SRC" "${STAGE_DIR}/bin/sailfin-stage2${EXE_EXT}"
          cp "$BIN_SRC" "${STAGE_DIR}/bin/sfn${EXE_EXT}"
          mkdir -p "${STAGE_DIR}/runtime"
          cp -R runtime/native "${STAGE_DIR}/runtime/native"
          mkdir -p "${STAGE_DIR}/runtime/native/obj"
          cp "$PRELUDE_OBJ" "${STAGE_DIR}/runtime/native/obj/prelude.o"

          ASSET="sailfin-stage2_${VERSION}_${OS}_${ARCH}.tar.gz"
          tar -czf "dist/${ASSET}" -C "${STAGE_DIR}" .
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: |
            dist/sailfin-stage2_${{ steps.rel.outputs.version }}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
