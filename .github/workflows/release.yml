name: Release

# Manually-triggered release workflow.  Replaces python-semantic-release.
#
# Reads the current version from compiler/capsule.toml, computes the next
# version based on `channel` and `bump` inputs, updates capsule.toml +
# version.sfn, commits, tags, pushes, creates a GitHub Release, then calls
# release-tag.yml to build and upload platform assets.
#
# Channel semantics:
#   alpha       → v0.5.0-alpha.23   (prerelease on main)
#   beta        → v0.5.0-beta.1     (promote to beta)
#   rc          → v0.5.0-rc.1       (release candidate)
#   stable      → v0.5.0            (GA release)
#
# Bump semantics (within the chosen channel):
#   prerelease  → increment the .N suffix (or start .1 when promoting)
#   patch       → bump patch, reset to <channel>.1  (or clean for stable)
#   minor       → bump minor, reset patch + prerelease
#   major       → bump major, reset minor + patch + prerelease

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
          - stable
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - prerelease
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (compute version but don't tag/release)"
        required: false
        type: boolean
        default: false
      verified_sha:
        description: "Commit whose compiler a green nightly self-host verified (release-train gate). Blank on manual cuts skips the re-check."
        required: false
        type: string
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

env:
  RELEASE_PAT_SECRET: ${{ secrets.RELEASE_PAT }}

jobs:
  release:
    name: Bump version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      prev_tag: ${{ steps.bump.outputs.prev_tag }}

    steps:
      - name: Require RELEASE_PAT
        if: env.RELEASE_PAT_SECRET == ''
        run: |
          echo "::error::RELEASE_PAT secret is required so the new tag triggers downstream workflows."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git credentials
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          git config user.name "Sailfin Release Bot"
          git config user.email "releases@sailfin.io"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Compute next version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          CHANNEL="${{ inputs.channel }}"
          BUMP="${{ inputs.bump }}"

          # --- Read current version from capsule.toml -------------------------
          current="$(sed -n 's/^version *= *"\([^"]*\)"/\1/p' compiler/capsule.toml)"
          if [ -z "$current" ]; then
            echo "::error::Could not read version from compiler/capsule.toml"
            exit 1
          fi
          echo "Current version: $current"
          echo "prev_tag=v${current}" >> "$GITHUB_OUTPUT"

          # --- Parse semver components ----------------------------------------
          # Matches: MAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH-pre.N
          if [[ "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-([a-z]+)\.([0-9]+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            PRE_LABEL="${BASH_REMATCH[5]:-}"
            PRE_NUM="${BASH_REMATCH[6]:-0}"
          else
            echo "::error::Cannot parse version '$current' as semver"
            exit 1
          fi

          # --- Channel ordering for promotion checks -------------------------
          channel_rank() {
            case "$1" in
              alpha)  echo 0 ;;
              beta)   echo 1 ;;
              rc)     echo 2 ;;
              stable) echo 3 ;;
              *)      echo -1 ;;
            esac
          }

          cur_rank=$(channel_rank "${PRE_LABEL:-stable}")
          new_rank=$(channel_rank "$CHANNEL")

          # --- Compute next version -------------------------------------------
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              if [ "$CHANNEL" = "stable" ]; then
                NEXT="${MAJOR}.${MINOR}.${PATCH}"
              else
                NEXT="${MAJOR}.${MINOR}.${PATCH}-${CHANNEL}.1"
              fi
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              if [ "$CHANNEL" = "stable" ]; then
                NEXT="${MAJOR}.${MINOR}.${PATCH}"
              else
                NEXT="${MAJOR}.${MINOR}.${PATCH}-${CHANNEL}.1"
              fi
              ;;
            patch)
              PATCH=$((PATCH + 1))
              if [ "$CHANNEL" = "stable" ]; then
                NEXT="${MAJOR}.${MINOR}.${PATCH}"
              else
                NEXT="${MAJOR}.${MINOR}.${PATCH}-${CHANNEL}.1"
              fi
              ;;
            prerelease)
              if [ "$CHANNEL" = "stable" ]; then
                # Promote to stable: strip prerelease suffix
                NEXT="${MAJOR}.${MINOR}.${PATCH}"
              elif [ "$CHANNEL" = "$PRE_LABEL" ]; then
                # Same channel: increment prerelease number
                NEXT="${MAJOR}.${MINOR}.${PATCH}-${CHANNEL}.$((PRE_NUM + 1))"
              elif [ "$new_rank" -gt "$cur_rank" ]; then
                # Promoting to a higher channel: start at .1
                NEXT="${MAJOR}.${MINOR}.${PATCH}-${CHANNEL}.1"
              else
                echo "::error::Cannot demote from '${PRE_LABEL:-stable}' to '${CHANNEL}'. Use a higher channel or bump major/minor/patch first."
                exit 1
              fi
              ;;
          esac

          # --- Guard against no-op releases ------------------------------------
          if [ "$NEXT" = "$current" ]; then
            echo "::error::Computed version '$NEXT' is the same as the current version. Nothing to release. Use a different bump or channel."
            exit 1
          fi

          # --- Guard against re-tagging an existing tag -----------------------
          if git rev-parse "v${NEXT}" >/dev/null 2>&1; then
            echo "::error::Tag 'v${NEXT}' already exists. Choose a different bump/channel combination."
            exit 1
          fi

          echo "Next version: $NEXT"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Update version files
        if: inputs.dry_run != true
        shell: bash
        env:
          NEXT: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail

          # Update capsule.toml (whitespace-tolerant around = and quotes)
          capsule_matches=$(grep -c '^version *=' compiler/capsule.toml || true)
          if [ "$capsule_matches" -ne 1 ]; then
            echo "::error::Expected exactly 1 'version =' line in capsule.toml, found $capsule_matches"
            exit 1
          fi
          sed -i "s/^version *= *\"[^\"]*\"/version = \"${NEXT}\"/" compiler/capsule.toml

          # Update version.sfn fallback (whitespace-tolerant around = and quotes).
          # The compiler reads its version from capsule.toml at runtime, but
          # installed binaries fall back to __version_fallback__ when capsule.toml
          # is not on disk.
          sfn_matches=$(grep -c 'let __version_fallback__ *=' compiler/src/version.sfn || true)
          if [ "$sfn_matches" -ne 1 ]; then
            echo "::error::Expected exactly 1 '__version_fallback__' assignment in version.sfn, found $sfn_matches"
            exit 1
          fi
          sed -i "s/let __version_fallback__ *= *\"[^\"]*\"/let __version_fallback__ = \"${NEXT}\"/" compiler/src/version.sfn

          # Verify the replacements took effect
          echo "--- compiler/capsule.toml ---"
          grep '^version' compiler/capsule.toml
          echo "--- compiler/src/version.sfn ---"
          grep '__version_fallback__' compiler/src/version.sfn

          # Update llms.txt's "> Version:" stamp. The drift guard
          # (compiler/tests/e2e/test_llms_txt_sync.sh) asserts this line
          # matches capsule.toml; without this rewrite every automated
          # release tag fails that test by construction (the bump lands
          # seconds before the build, with no human review in between) —
          # exactly what broke the v0.7.0-alpha.30 cut. Content accuracy
          # beyond the stamp remains a review concern on content PRs.
          llms_matches=$(grep -c '^> Version:' llms.txt || true)
          if [ "$llms_matches" -ne 1 ]; then
            echo "::error::Expected exactly 1 '> Version:' line in llms.txt, found $llms_matches"
            exit 1
          fi
          today=$(date -u +%Y-%m-%d)
          sed -i "s/^> Version:.*/> Version: ${NEXT} | Updated: ${today}/" llms.txt
          echo "--- llms.txt ---"
          grep '^> Version:' llms.txt

          # Final sanity check: the new version must appear in all three files
          if ! grep -q "\"${NEXT}\"" compiler/capsule.toml; then
            echo "::error::capsule.toml was not updated to version ${NEXT}"
            exit 1
          fi
          if ! grep -q "\"${NEXT}\"" compiler/src/version.sfn; then
            echo "::error::version.sfn was not updated to version ${NEXT}"
            exit 1
          fi
          if ! grep -q "^> Version: ${NEXT} " llms.txt; then
            echo "::error::llms.txt was not updated to version ${NEXT}"
            exit 1
          fi

      - name: Commit version bump
        if: inputs.dry_run != true
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git add compiler/capsule.toml compiler/src/version.sfn llms.txt
          git commit -m "chore(release): ${TAG#v}"

      - name: Rebase, tag & push
        if: inputs.dry_run != true
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          VERIFIED_SHA: ${{ inputs.verified_sha }}
        run: |
          set -euo pipefail
          # main is written to concurrently (e.g. capsule-release.yml auto-commits
          # `chore(capsules): bump versions`). Rebase our version-bump commit onto the
          # latest origin/main and retry, re-pointing the tag to the rebased commit.
          # Paths are disjoint (we touch compiler/*, capsule bot touches capsules/*),
          # so the rebase replays without conflicts; abort defensively if one occurs.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            # Self-host safety gate (#1956): the release-train passes the SHA of the
            # green nightly whose triple-pass `make check` verified HEAD's compiler.
            # We tag origin/main's tip (so the version bump fast-forwards main), which
            # is safe ONLY while its compiler is byte-behaviour-identical to that
            # verified commit. Re-check here — origin/main may have advanced since the
            # train evaluated — and refuse to tag if it moved onto a compiler /
            # runtime / seed change the nightly never saw; the next nightly must
            # re-verify first. Diffed BEFORE our own bump commit, so the bump's
            # version.sfn/capsule.toml edits never trip it. Empty on manual/override
            # cuts (the operator owns the risk).
            if [ -n "$VERIFIED_SHA" ]; then
              unverified="$(git diff --name-only "${VERIFIED_SHA}..origin/main" -- compiler/src runtime bootstrap.toml)"
              if [ -n "$unverified" ]; then
                echo "::error::origin/main advanced onto self-host-relevant changes not covered by verified nightly ${VERIFIED_SHA}; refusing to cut an unverified compiler. Re-run after the next green nightly. Files:"
                echo "$unverified"
                exit 1
              fi
            fi
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Rebase onto origin/main hit a conflict (attempt ${attempt})."
              exit 1
            fi
            # Re-create the tag on the (possibly) rebased commit before pushing.
            git tag -fa "$TAG" -m "Release ${TAG}"
            if git push origin HEAD && git push origin --force "$TAG"; then
              echo "Pushed ${TAG} on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); main moved — retrying after rebase."
            sleep 5
          done
          echo "::error::Failed to push release commit + tag after 5 attempts."
          exit 1

      - name: Create GitHub Release
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
          CHANNEL: ${{ inputs.channel }}
          PREV_TAG: ${{ steps.bump.outputs.prev_tag }}
        run: |
          set -euo pipefail
          prerelease_args=()
          if [ "$CHANNEL" != "stable" ]; then
            prerelease_args=(--prerelease)
          fi

          latest_args=()
          if [ "$CHANNEL" = "stable" ]; then
            latest_args=(--latest)
          fi

          # Only pass --notes-start-tag if the previous tag actually exists
          notes_start_args=()
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            notes_start_args=(--notes-start-tag "$PREV_TAG")
          fi

          gh release create "$TAG" \
            --title "Sailfin $VERSION" \
            --generate-notes \
            "${notes_start_args[@]}" \
            "${prerelease_args[@]}" \
            "${latest_args[@]}"

      - name: Dry run summary
        if: inputs.dry_run == true
        run: |
          {
            echo "## Dry Run Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Current | ${{ steps.bump.outputs.prev_tag }} |"
            echo "| Next | ${{ steps.bump.outputs.tag }} |"
            echo "| Channel | ${{ inputs.channel }} |"
            echo "| Bump | ${{ inputs.bump }} |"
            echo ""
            echo "No changes were made (dry run)."
          } >> "$GITHUB_STEP_SUMMARY"

  build-assets:
    name: Build release assets
    needs: release
    if: inputs.dry_run != true
    permissions:
      contents: write
    uses: ./.github/workflows/release-tag.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit

  notify-slack-failure:
    name: Notify Slack on release workflow failure
    needs: release
    if: failure()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Post Slack notification
        shell: bash
        env:
          SLACK_RELEASE_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
          CHANNEL: ${{ inputs.channel }}
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_RELEASE_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          python3 - <<'PY' > /tmp/slack-payload.json
          import json
          import os
          channel = os.environ.get("CHANNEL", "unknown")
          bump = os.environ.get("BUMP", "unknown")
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          print(json.dumps({
              "text": f":x: Sailfin release workflow failed before asset build (channel={channel}, bump={bump}).\\nRun: {run_url}"
          }))
          PY
          curl -fsS -X POST \
            -H 'Content-type: application/json' \
            --data @/tmp/slack-payload.json \
            "$SLACK_RELEASE_WEBHOOK_URL" >/dev/null || true
