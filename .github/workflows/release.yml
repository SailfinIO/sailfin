name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.2-alpha.1). If empty, uses the triggering release tag."
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build native (${{ matrix.package_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            package_label: linux-x86_64
            asset_os: linux
            asset_arch: x86_64
            exe_ext: ""
          - os: macos-latest
            package_label: macos-arm64
            asset_os: macos
            asset_arch: arm64
            exe_ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          TAG_INPUT="${{ inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "Tag could not be resolved" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-update-conda: false
          use-mamba: true

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq

      - name: Build Stage1-compiled Stage2 binary (seed for self-hosting)
        id: seed
        shell: bash -l {0}
        run: |
          set -euo pipefail
          # Use Stage1 Python transpiler to build Stage2 as the seed
          # This avoids dependency on potentially broken previous releases
          conda run -n sailfin python tools/compile_with_stage1.py
          conda run -n sailfin python scripts/bootstrap_stage2.py --no-validate
          conda run -n sailfin make _build-native-stage2

          mkdir -p "${{ github.workspace }}/build/seed/bin"
          cp build/native/sailfin-stage2${{ matrix.exe_ext }} "${{ github.workspace }}/build/seed/bin/sailfin-stage2-seed${{ matrix.exe_ext }}"
          echo "seed_path=${{ github.workspace }}/build/seed/bin/sailfin-stage2-seed${{ matrix.exe_ext }}" >> "$GITHUB_OUTPUT"

      - name: Self-host rebuild Stage2 from Stage1 seed
        id: selfhost_seed
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda run -n sailfin python scripts/selfhost_native_stage2.py \
            --seed "${{ steps.seed.outputs.seed_path }}" \
            --no-prefer-asan-seed \
            --out build/native/sailfin-stage2-selfhost${{ matrix.exe_ext }} \
            --max-attempts 10 \
            --max-total-seconds 3600

      - name: Verify embedded CLI version matches release tag
        shell: bash -l {0}
        run: |
          set -euo pipefail
          VERSION="${{ steps.rel.outputs.version }}"
          OUT="$(build/native/sailfin-stage2-selfhost --version | tr -d '\r' | head -n 1)"
          echo "$OUT"
          echo "$OUT" | grep -F "sfn ${VERSION}" >/dev/null

      - name: Package release asset
        shell: bash -l {0}
        run: |
          set -euo pipefail
          VERSION="${{ steps.rel.outputs.version }}"
          OS="${{ matrix.asset_os }}"
          ARCH="${{ matrix.asset_arch }}"
          EXE_EXT="${{ matrix.exe_ext }}"
          BIN_SRC="build/native/sailfin-stage2-selfhost${EXE_EXT}"
          PRELUDE_OBJ="build/selfhost/stage2/obj/runtime/prelude.o"

          mkdir -p dist
          STAGE_DIR="$(mktemp -d)"
          mkdir -p "${STAGE_DIR}/bin"
          cp "$BIN_SRC" "${STAGE_DIR}/bin/sailfin-stage2${EXE_EXT}"
          cp "$BIN_SRC" "${STAGE_DIR}/bin/sfn${EXE_EXT}"
          mkdir -p "${STAGE_DIR}/runtime"
          cp -R runtime/native "${STAGE_DIR}/runtime/native"
          mkdir -p "${STAGE_DIR}/runtime/native/obj"
          cp "$PRELUDE_OBJ" "${STAGE_DIR}/runtime/native/obj/prelude.o"

          ASSET="sailfin-stage2_${VERSION}_${OS}_${ARCH}.tar.gz"
          tar -czf "dist/${ASSET}" -C "${STAGE_DIR}" .
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: |
            dist/sailfin-stage2_${{ steps.rel.outputs.version }}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
