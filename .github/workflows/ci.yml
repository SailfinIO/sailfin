name: CI

env:
  # Pinned seed used for self-host bootstrap in CI.
  # Bump this once the latest release assets are healthy again.
  SEED_VERSION: 0.1.1-alpha.121

on:
  push:
    branches:
      - main
      - rc
      - beta
      - alpha
  pull_request:
  workflow_dispatch:
    inputs: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-from-release-seed:
    name: Build From Release Seed (${{ matrix.package_label }})
    if: >-
      github.event_name != 'push' ||
      (
        github.event.head_commit.author.name != 'semantic-release' &&
        github.event.head_commit.author.name != 'Sailfin Release Bot' &&
        !contains(github.event.head_commit.author.email, 'semantic-release')
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            package_label: macos-arm64
            asset_os: macos
            asset_arch: arm64
            clang: clang
            max_attempts: 15
          - os: ubuntu-24.04
            package_label: linux-x86_64
            asset_os: linux
            asset_arch: x86_64
            clang: clang-18
            max_attempts: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-update-conda: false
          use-mamba: true

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      - name: Install jq + LLVM tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Build + test + package (via Makefile)
        uses: ./.github/actions/sailfin-build
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        with:
          target: ${{ matrix.package_label }}
          max_attempts: ${{ matrix.max_attempts }}
          clang: ${{ matrix.clang }}
          seed_version: ${{ env.SEED_VERSION }}

      - name: Report compiler metadata
        shell: bash -l {0}
        run: |
          set -euo pipefail
          ls -lh build/native/sailfin
          (file build/native/sailfin || true)
          build/native/sailfin version || build/native/sailfin --version || true

      - name: Enable test runner trace (macOS)
        if: runner.os == 'macOS'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          mkdir -p build/sailfin
          touch build/sailfin/.trace_test_runner

      - name: Preflight single unit test (macOS)
        if: runner.os == 'macOS'
        id: mac_test_preflight
        continue-on-error: true
        shell: bash -l {0}
        run: |
          set -euo pipefail
          build/native/sailfin test compiler/tests/unit/cli_version_test.sfn

      - name: Fixed-point rebuild check (linux-x86_64, macos-arm64)
        if: >-
          (matrix.package_label == 'linux-x86_64' || matrix.package_label == 'macos-arm64') &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc')
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda run -n sailfin python scripts/selfhost_native.py \
            --seed build/native/sailfin \
            --out build/native/sailfin-selfhost1 \
            --clang "${CLANG:-clang}" \
            --jobs 1 \
            --import-context-jobs 1 \
            --max-attempts 5 \
            --seed-timeout 120 \
            --max-total-seconds 1200
          conda run -n sailfin python scripts/selfhost_native.py \
            --seed build/native/sailfin-selfhost1 \
            --out build/native/sailfin-selfhost2 \
            --clang "${CLANG:-clang}" \
            --jobs 1 \
            --import-context-jobs 1 \
            --max-attempts 3
          ls -lh build/native/sailfin-selfhost1 build/native/sailfin-selfhost2
          (file build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 || true)
          build/native/sailfin-selfhost1 version || true
          build/native/sailfin-selfhost2 version || true
          echo "[ci] fixed-point sha256:" 
          (sha256sum build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 2>/dev/null || shasum -a 256 build/native/sailfin-selfhost1 build/native/sailfin-selfhost2)
          if [ "${RUNNER_OS}" = "Linux" ]; then
            if ! cmp -s build/native/sailfin-selfhost1 build/native/sailfin-selfhost2; then
              echo "[ci][error] fixed-point rebuild mismatch (binaries differ)" >&2
              (cmp -l build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 | head -n 20 || true)
              exit 1
            fi
          else
            # macOS binaries (Mach-O) embed a per-link UUID (LC_UUID), so byte-for-byte
            # equality is not a stable determinism signal. Instead, assert the second
            # selfhosted compiler can run a minimal unit test.
            (dwarfdump --uuid build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 || true)
            build/native/sailfin-selfhost2 test compiler/tests/unit/cli_version_test.sfn
          fi

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-native-${{ matrix.package_label }}
          path: |
            dist/sailfin-native-${{ matrix.package_label }}-*.tar.gz
            dist/sailfin-native-${{ matrix.package_label }}-*.tar.gz.sha256
            dist/sailfin-native-${{ matrix.package_label }}-*.manifest.json
          if-no-files-found: error

      - name: Upload installer archive
        uses: actions/upload-artifact@v4
        with:
          name: ci-installer-${{ matrix.package_label }}
          path: dist/installer-${{ matrix.package_label }}.tar.gz
          if-no-files-found: error

  semantic-release:
    needs: build-from-release-seed
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      (
        github.event.head_commit.author.name != 'semantic-release' &&
        github.event.head_commit.author.name != 'Sailfin Release Bot' &&
        !contains(github.event.head_commit.author.email, 'semantic-release')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release_tag.outputs.released }}
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git credentials
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Sailfin Release Bot"
          git config user.email "releases@sailfin.io"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true

      - name: Semantic release version
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) semantic-release version

      - name: Run semantic release
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        shell: bash -l {0}
        run: |
          CONDA=$(which conda) semantic-release publish

      - name: Detect release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(git tag --points-at HEAD | sort -V | tail -n 1 || true)"
          if [ -z "$TAG" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-from-release-tag:
    name: Build From Release Tag (${{ matrix.package_label }})
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.semantic-release.outputs.tag }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            package_label: macos-arm64
            asset_os: macos
            asset_arch: arm64
            clang: clang
            max_attempts: 15
          - os: ubuntu-24.04
            package_label: linux-x86_64
            asset_os: linux
            asset_arch: x86_64
            clang: clang-18
            max_attempts: 10

    steps:
      - name: Checkout repository (release tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}
          fetch-depth: 0

      - name: Verify release tag checkout
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          current="$(git describe --tags --exact-match)"
          if [ "$current" != "$RELEASE_TAG" ]; then
            echo "[ci][error] expected $RELEASE_TAG, got $current" >&2
            exit 1
          fi

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: sailfin
          environment-file: environment.yml
          auto-update-conda: false
          use-mamba: true

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      - name: Install jq + LLVM tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Build + test + package (via Makefile)
        uses: ./.github/actions/sailfin-build
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        with:
          target: ${{ matrix.package_label }}
          max_attempts: ${{ matrix.max_attempts }}
          clang: ${{ matrix.clang }}
          seed_version: ${{ env.SEED_VERSION }}

      - name: Report compiler metadata
        shell: bash -l {0}
        run: |
          set -euo pipefail
          ls -lh build/native/sailfin
          (file build/native/sailfin || true)
          build/native/sailfin version || build/native/sailfin --version || true

      - name: Verify compiler version matches release tag
        shell: bash -l {0}
        run: |
          set -euo pipefail
          expected="${RELEASE_TAG#v}"
          file_version="$(python -c "import re, pathlib; text=pathlib.Path('compiler/src/version.sfn').read_text(encoding='utf-8'); m=re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', text); print(m.group(1) if m else '')")"
          if [ "$file_version" != "$expected" ]; then
            echo "[ci][error] version.sfn $file_version does not match $expected" >&2
            exit 1
          fi
          actual="$(build/native/sailfin version | sed -n 's/.*sfn //p')"
          if [ "$actual" != "$expected" ]; then
            echo "[ci][error] compiler reports $actual, expected $expected" >&2
            exit 1
          fi

      - name: Enable test runner trace (macOS)
        if: runner.os == 'macOS'
        shell: bash -l {0}
        run: |
          set -euo pipefail
          mkdir -p build/sailfin
          touch build/sailfin/.trace_test_runner

      - name: Preflight single unit test (macOS)
        if: runner.os == 'macOS'
        id: mac_test_preflight
        continue-on-error: true
        shell: bash -l {0}
        run: |
          set -euo pipefail
          build/native/sailfin test compiler/tests/unit/cli_version_test.sfn

      - name: Fixed-point rebuild check (linux-x86_64, macos-arm64)
        if: >-
          (matrix.package_label == 'linux-x86_64' || matrix.package_label == 'macos-arm64') &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc')
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda run -n sailfin python scripts/selfhost_native.py \
            --seed build/native/sailfin \
            --out build/native/sailfin-selfhost1 \
            --clang "${CLANG:-clang}" \
            --jobs 1 \
            --import-context-jobs 1 \
            --max-attempts 5 \
            --seed-timeout 120 \
            --max-total-seconds 1200
          conda run -n sailfin python scripts/selfhost_native.py \
            --seed build/native/sailfin-selfhost1 \
            --out build/native/sailfin-selfhost2 \
            --clang "${CLANG:-clang}" \
            --jobs 1 \
            --import-context-jobs 1 \
            --max-attempts 3
          ls -lh build/native/sailfin-selfhost1 build/native/sailfin-selfhost2
          (file build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 || true)
          build/native/sailfin-selfhost1 version || true
          build/native/sailfin-selfhost2 version || true
          echo "[ci] fixed-point sha256:" 
          (sha256sum build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 2>/dev/null || shasum -a 256 build/native/sailfin-selfhost1 build/native/sailfin-selfhost2)
          if [ "${RUNNER_OS}" = "Linux" ]; then
            if ! cmp -s build/native/sailfin-selfhost1 build/native/sailfin-selfhost2; then
              echo "[ci][error] fixed-point rebuild mismatch (binaries differ)" >&2
              (cmp -l build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 | head -n 20 || true)
              exit 1
            fi
          else
            # macOS binaries (Mach-O) embed a per-link UUID (LC_UUID), so byte-for-byte
            # equality is not a stable determinism signal. Instead, assert the second
            # selfhosted compiler can run a minimal unit test.
            (dwarfdump --uuid build/native/sailfin-selfhost1 build/native/sailfin-selfhost2 || true)
            build/native/sailfin-selfhost2 test compiler/tests/unit/cli_version_test.sfn
          fi

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-native-${{ matrix.package_label }}
          path: |
            dist/sailfin-native-${{ matrix.package_label }}-*.tar.gz
            dist/sailfin-native-${{ matrix.package_label }}-*.tar.gz.sha256
            dist/sailfin-native-${{ matrix.package_label }}-*.manifest.json
          if-no-files-found: error

      - name: Upload installer archive
        uses: actions/upload-artifact@v4
        with:
          name: release-installer-${{ matrix.package_label }}
          path: dist/installer-${{ matrix.package_label }}.tar.gz
          if-no-files-found: error

  attach-release-assets-tag:
    needs:
      - semantic-release
      - build-from-release-tag
    if: >-
      needs.semantic-release.outputs.released == 'true' &&
      needs.build-from-release-tag.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.semantic-release.outputs.tag }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "release-*"
          merge-multiple: true
          path: .

      - name: Normalize artifact layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find . -maxdepth 3 -type f -name 'sailfin-native-*.tar.gz' -exec mv -f {} dist/ \;
          find . -maxdepth 3 -type f -name 'sailfin-native-*.tar.gz.sha256' -exec mv -f {} dist/ \;
          find . -maxdepth 3 -type f -name 'sailfin-native-*.manifest.json' -exec mv -f {} dist/ \;
          find . -maxdepth 3 -type f -name 'installer-*.tar.gz' -exec mv -f {} dist/ \;

      - name: Prepare installer assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          for payload in $(find dist -maxdepth 1 -type f -name 'installer-*.tar.gz'); do
            label="$(basename "$payload" .tar.gz)"
            case "$label" in
              *linux-x86_64*)
                os="linux"
                arch="x86_64"
                ;;
              *macos-arm64*)
                os="macos"
                arch="arm64"
                ;;
              *)
                echo "unknown installer payload $label" >&2
                continue
                ;;
            esac
            installer_name="sailfin_${version}_${os}_${arch}.tar.gz"
            mv -f "$payload" "dist/${installer_name}"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "dist/${installer_name}" > "dist/${installer_name}.sha256"
            else
              shasum -a 256 "dist/${installer_name}" > "dist/${installer_name}.sha256"
            fi
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          # semantic-release creates the release entry, but if it ever doesn't
          # (or if this job runs against a tag-only rerun), make the intent explicit:
          prerelease: ${{ github.ref_name != 'main' }}
          make_latest: ${{ github.ref_name == 'main' }}
          files: |
            dist/sailfin-native-*.tar.gz
            dist/sailfin-native-*.tar.gz.sha256
            dist/sailfin-native-*.manifest.json
            dist/sailfin_*.tar.gz
            dist/sailfin_*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
