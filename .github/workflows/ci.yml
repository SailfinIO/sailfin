            package_label: macos-arm64
            asset_os: macos
            asset_arch: arm64
            max_attempts: 15
          - os: ubuntu-24.04
            package_label: linux-x86_64
            asset_os: linux
            asset_arch: x86_64
            max_attempts: 10

    steps:
