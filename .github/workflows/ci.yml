name: CI (PR + merge queue)

# The pinned seed version lives in `bootstrap.toml`'s [seed].version key.
# A setup step in each job reads that file and exports the resolved
# value as a step output (`steps.seed.outputs.seed_version`) so
# downstream `uses: ./.github/actions/sailfin-build` sees the correct
# pin. Kept in sync with release-branches.yml, release-tag.yml,
# nightly-selfhost.yml, and the Makefile — all four read the same
# `bootstrap.toml`. Bumping the seed is a one-line edit.

env:
  # Phase 0 / M0.5: pin arena allocator on for CI. Belt-and-suspenders
  # guard so a future change to the runtime default (formerly the
  # now-retired prior `scripts/build.sh` default) — or a caller that
  # scrubs env — can't silently regress CI onto the malloc path.
  # See docs/proposals/0006-build-architecture.md → "Arena Allocator Default-On".
  SAILFIN_USE_ARENA: "1"

permissions:
  contents: read

on:
  pull_request:
    # Keep the workflow itself present on every PR. GitHub required
    # status checks cannot distinguish "workflow skipped by paths:" from
    # "check still pending", so path decisions happen inside `ci-scope`
    # and the always-running `Required CI gate` job reports the final
    # require-able status.
    types: [opened, synchronize, reopened, ready_for_review]
  # Merge queue (SFEP-0037 §3.1, the bors "not rocket science" rule):
  # run the same PR-gating surface on the speculative merge commit so
  # branch protection's required checks gate the queue, not the stale PR
  # head. `merge_group` does not support `paths:` filtering; `ci-scope`
  # therefore marks queue runs as in-scope and the full job set runs for
  # every queued merge. Deliberate: the queue must never land an untested
  # combination. The fixed-point rebuild steps stay off — they are gated
  # to `refs/heads/main|rc`, which a queue ref is not, same as PR context
  # today. Enablement steps: docs/runbooks/merge-queue.md.
  # `checks_requested` is the only activity type Actions supports for
  # merge_group (and the default); stated explicitly for clarity.
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs: {}

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-scope:
    name: CI scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      source: ${{ steps.scope.outputs.source }}
      site_hero: ${{ steps.scope.outputs.site_hero }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine compiler CI scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          source=true
          site_hero=true
          reason="full compiler CI for ${GITHUB_EVENT_NAME}"
          site_hero_reason="hero verification for ${GITHUB_EVENT_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            source=false
            site_hero=false
            reason="no compiler/runtime/build-system paths changed"
            site_hero_reason="no homepage hero contract paths changed"
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            git diff --name-only "$base" "$head" | tee changed-files.txt

            while IFS= read -r path; do
              case "$path" in
                compiler/*|runtime/*|capsules/*|scripts/*|Makefile|bootstrap.toml|.github/workflows/ci.yml|.github/actions/*)
                  source=true
                  reason="compiler/runtime/build-system path changed: $path"
                  ;;
              esac
              case "$path" in
                site/examples/hero-effects/*|site/scripts/verify-hero-example.sh|site/src/components/Hero.astro|site/package.json|bootstrap.toml|.github/workflows/ci.yml)
                  site_hero=true
                  site_hero_reason="homepage hero contract path changed: $path"
                  ;;
              esac
            done < changed-files.txt
          fi

          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "site_hero=$site_hero" >> "$GITHUB_OUTPUT"
          echo "[ci-scope] source=$source ($reason)"
          echo "[ci-scope] site_hero=$site_hero ($site_hero_reason)"
          {
            echo "### CI scope"
            echo ""
            echo "- compiler CI in scope: \`$source\`"
            echo "- reason: $reason"
            echo "- homepage hero verification in scope: \`$site_hero\`"
            echo "- reason: $site_hero_reason"
          } >> "$GITHUB_STEP_SUMMARY"

  check-site-hero:
    name: Verify homepage Sailfin example
    needs: ci-scope
    if: ${{ needs.ci-scope.outputs.site_hero == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Fetch released seed compiler
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make fetch-seed

      - name: Verify checked hero fixtures
        working-directory: site
        run: npm run check:hero

  # Assert the native shard map (`sfn dev shard`, SFN-200) still covers every
  # test file `make test` runs — no gaps, no overlaps. The whole point of
  # sharding is parallelism; this is the only thing standing between
  # "rebalance the shards" and "silently stop running some tests". The map now
  # lives in the compiler (compiler/src/cli/commands/dev_shard.sfn), so the
  # lint reuses the already-built compiler tree rather than a bash file-tree
  # check — it runs alongside the shard legs off the shared per-OS build.
  shard-cover:
    name: Shard-cover lint
    needs: [ci-scope, build-compiler-linux]
    if: ${{ needs.ci-scope.outputs.source == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download shared compiler build
        uses: actions/download-artifact@v8
        with:
          name: ci-build-tree-linux-x86_64

      - name: Extract shared compiler build
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf "build-tree-linux-x86_64.tar.gz"
          rm -f "build-tree-linux-x86_64.tar.gz"
          # Assert the binary survived the artifact round-trip executable
          # rather than `touch`-ing it: cover runs no nested `make compile`,
          # so the shard legs' mtime fix does not apply here, and creating an
          # empty placeholder would only defer a missing-binary failure into a
          # confusing exec error one step later.
          if [ ! -x build/bin/sfn ]; then
            echo "[shard-cover] build/bin/sfn missing or not executable in the shared compiler artifact" >&2
            ls -l build/bin 2>/dev/null || true
            exit 1
          fi
          ls -lh build/bin/sfn

      - name: Assert shard map covers the full test surface
        shell: bash
        run: build/bin/sfn dev shard cover

  # Fast static-analysis pre-flight: run `sfn check` over the whole
  # compiler tree using the *pinned seed* binary (no self-host build
  # needed), so parse / typecheck / effect-check errors surface in
  # ~5 min instead of waiting out the ~90 min build+test matrix.
  #
  # Runs on Linux, where effect enforcement is full (it is only partial
  # on macOS arm64 — see #613), so this is the strongest effect signal
  # in PR CI. The seed parses current source by construction (it is the
  # same front-end `make compile` self-hosts with), so this cannot drift
  # from what the build accepts for parse/typecheck.
  #
  # Intentionally NOT a `needs:` dependency of the build/test jobs — it
  # runs in parallel so a green PR pays zero added latency, while a red
  # result still shows up early. It is included in `Required CI gate` for
  # source-touching PRs, so branch protection sees this as part of the
  # aggregate required check rather than as a standalone required job.
  check-fast:
    name: Fast static check (sfn check compiler/src/)
    needs: ci-scope
    if: ${{ needs.ci-scope.outputs.source == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version from bootstrap.toml
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bootstrap.toml ]; then
            echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
            exit 1
          fi
          pin="$(awk '
            /^\[[^]]+\]/ { section=$0 }
            section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
          ' bootstrap.toml)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Fetch released seed compiler
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_VERSION: ${{ steps.seed.outputs.seed_version }}
        run: |
          set -euo pipefail
          make fetch-seed SEED_VERSION="$SEED_VERSION"
          build/toolchains/seed/bin/sfn version

      - name: sfn check compiler/src/ (parse + typecheck + effect-check)
        shell: bash
        run: |
          set -euo pipefail
          # SAILFIN_USE_ARENA=1 matches the rest of CI; it is also the
          # arena-reset path that keeps per-file scratch bounded across
          # the full tree. `check` emits no IR and invokes no clang.
          #
          # No step-level ulimit: since seed 0.7.0-alpha.33 the compiler
          # self-applies an 8 GiB RLIMIT_AS at startup (#1291,
          # runtime/sfn/platform/rlimit.sfn), so a runaway allocation
          # dies as a clean non-zero exit instead of exhausting the
          # runner VM and killing the runner agent (the #1243 failure
          # mode). time -v records the peak RSS either way.
          SAILFIN_USE_ARENA=1 /usr/bin/time -v \
            build/toolchains/seed/bin/sfn check compiler/src/

  # One compiler build per OS, shared by every shard leg below (#1234,
  # "Lever 1 step 1b" of docs/proposals/0011-ci-test-speed.md §6 step 2).
  # Previously each of the ~14 Build + Test legs ran `make rebuild` from
  # seed (~1.5 min Linux / ~3 min macOS even warm); now the build runs
  # once per OS and the legs download the result. The tree is tarred
  # before upload because upload-artifact does NOT preserve file modes —
  # the tar round-trip is what keeps the binary executable on download
  # (load-bearing on macOS; asserted by the composite's skip-build
  # verify step).
  #
  # Deliberately TWO job ids (not one matrix job): GitHub Actions treats
  # a matrix job as a single `needs:` dependency, so a shared matrix
  # would gate every Linux shard on the slower macOS build (and lose
  # Linux test signal entirely when only the macOS build fails). Per-OS
  # job ids keep each OS's shard legs gated only on their own build.
  build-compiler-linux:
    name: Build compiler [linux-x86_64]
    needs: ci-scope
    if: ${{ needs.ci-scope.outputs.source == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version from bootstrap.toml
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bootstrap.toml ]; then
            echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
            exit 1
          fi
          pin="$(awk '
            /^\[[^]]+\]/ { section=$0 }
            section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
          ' bootstrap.toml)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      - name: Build native compiler (via Makefile)
        uses: ./.github/actions/sailfin-build
        env:
          # PR CI should not require a PAT.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mode: build-only
          target: linux-x86_64
          clang: clang-18
          seed_version: ${{ steps.seed.outputs.seed_version }}
          package: 'false'

      # --- Cross-compile Windows binary from Linux LLVM IR ---
      # Lives here (not on a shard leg) because it consumes build
      # products the shared artifact deliberately excludes:
      # `build/native/raw/*.ll` and the build work dir's shim — both
      # fresh from the `make rebuild` above. Keeping them out of the
      # shard artifact keeps it bounded (#1234 risk note).
      - name: Cache MinGW-w64 apt packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/mingw-debs
          key: apt-mingw-w64-x86-64-${{ runner.os }}-v1

      - name: Install MinGW-w64 cross-compiler (Linux)
        run: |
          set -euo pipefail
          # `make ci-cross-windows` only uses the x86-64 C cross toolchain
          # (`clang -target x86_64-w64-mingw32` + `x86_64-w64-mingw32-gcc`).
          # The `mingw-w64` metapackage drags in ~277 MB across 25 packages —
          # i686, g++, and both win32/posix runtimes — none of which this
          # build touches. The i686 `.deb`s were exactly what stalled the
          # Ubuntu/Azure mirror fetch (#1402). Install just
          # `gcc-mingw-w64-x86-64` (pulls binutils + the x86-64 sysroot) and
          # cache the resolved `.deb`s so a cache hit skips the mirror
          # entirely; on a miss, download is bounded + retried so a transient
          # mirror stall fails fast and self-recovers.
          DEB_DIR="$HOME/.cache/mingw-debs"
          mkdir -p "$DEB_DIR"
          shopt -s nullglob
          debs=("$DEB_DIR"/*.deb)
          if [ "${#debs[@]}" -eq 0 ]; then
            for attempt in 1 2 3; do
              echo "[mingw] download attempt ${attempt}/3"
              if sudo timeout 300 apt-get update \
                && sudo timeout 300 apt-get install -y --no-install-recommends \
                     -o Acquire::Retries=3 \
                     -o Dir::Cache::archives="$DEB_DIR" \
                     --download-only gcc-mingw-w64-x86-64; then
                break
              fi
              if [ "${attempt}" = 3 ]; then
                echo "[mingw] download failed after 3 attempts" >&2
                exit 1
              fi
              echo "[mingw] attempt ${attempt} failed or timed out; backing off"
              sleep $((attempt * 15))
            done
            sudo rm -rf "$DEB_DIR/partial"
            sudo chown -R "$(id -u):$(id -g)" "$DEB_DIR"
          else
            echo "[mingw] cache hit: ${#debs[@]} package(s)"
          fi
          debs=("$DEB_DIR"/*.deb)
          sudo dpkg -i "${debs[@]}" \
            || sudo apt-get install -y --no-install-recommends -f
          x86_64-w64-mingw32-gcc --version | head -1

      - name: Cross-compile for Windows (Linux)
        shell: bash {0}
        run: |
          set -euo pipefail
          make ci-cross-windows

      - name: Upload Windows installer archive
        uses: actions/upload-artifact@v7
        with:
          name: ci-installer-windows-x86_64
          path: dist/installer-windows-x86_64.tar.gz
          if-no-files-found: error

      # Bounded shard payload: compiler binary + import-context +
      # module-IR cache (+ build stamp). Explicitly NOT included:
      # build/native/raw (cross-windows only, consumed above),
      # build/cache/test-bin (each shard leg restores its own test-bin
      # cache and would be clobbered by an empty copy), and any scratch.
      - name: Bundle compiler tree for shard legs
        shell: bash
        run: |
          set -euo pipefail
          paths=(build/bin/sfn build/compiler/import-context)
          if [ -f build/native/.build-stamp ]; then
            paths+=(build/native/.build-stamp)
          fi
          if [ -d build/cache ]; then
            paths+=(build/cache)
          fi
          tar --exclude 'build/cache/test-bin' -czf "build-tree-linux-x86_64.tar.gz" "${paths[@]}"
          ls -lh "build-tree-linux-x86_64.tar.gz"

      - name: Upload compiler build tree
        uses: actions/upload-artifact@v7
        with:
          name: ci-build-tree-linux-x86_64
          path: build-tree-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-compiler-macos:
    name: Build compiler [macos-arm64]
    needs: ci-scope
    if: ${{ needs.ci-scope.outputs.source == 'true' }}
    # macos-26: the `macos-latest` label migrated to macOS 26 on
    # 2026-06-15, so macos-15 runners are now scarce (PR queue stalls
    # waiting for them). The nightly-selfhost canary has been validating
    # the triple-pass fixed point on macos-26; adopt it here. The two
    # macOS-only test blockers it exposed are fixed in this lane: the
    # per-platform `struct dirent` offset (#1409) and the build-and-run
    # e2e child-env linking (#1410).
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version from bootstrap.toml
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bootstrap.toml ]; then
            echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
            exit 1
          fi
          pin="$(awk '
            /^\[[^]]+\]/ { section=$0 }
            section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
          ' bootstrap.toml)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install jq + LLVM tools (macOS)
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Build native compiler (via Makefile)
        uses: ./.github/actions/sailfin-build
        env:
          # PR CI should not require a PAT.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mode: build-only
          target: macos-arm64
          clang: clang
          seed_version: ${{ steps.seed.outputs.seed_version }}
          package: 'false'

      # #1235 measurement (read-only): surface the build-phase wall time and
      # the module-IR cache.hit_rate that the sailfin-build action captured
      # (build/ci-metrics.env) into the job log + step summary. The findings
      # comment scrapes the `[ci-metrics]` line; queue/start/end come from
      # the Actions API at analysis time. macOS-only — Linux is out of scope.
      - name: Emit macOS build-leg metrics (#1235)
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          f=build/ci-metrics.env
          if [ ! -f "$f" ]; then
            echo "[ci-metrics] no metrics file ($f) — build likely failed before measurement"
            exit 0
          fi
          # shellcheck disable=SC1090
          . "$f"
          echo "[ci-metrics] target=${ci_metrics_target:-macos-arm64} phase=build build_s=${build_seconds:-?} build_cache_hit_rate=${build_cache_hit_rate:-?}"
          {
            echo "### macOS build leg metrics (#1235)"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| build wall (s) | ${build_seconds:-?} |"
            echo "| module-IR cache.hit_rate | ${build_cache_hit_rate:-?} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # Bounded shard payload — see the Linux twin above for the
      # include/exclude rationale.
      - name: Bundle compiler tree for shard legs
        shell: bash
        run: |
          set -euo pipefail
          paths=(build/bin/sfn build/compiler/import-context)
          if [ -f build/native/.build-stamp ]; then
            paths+=(build/native/.build-stamp)
          fi
          if [ -d build/cache ]; then
            paths+=(build/cache)
          fi
          tar --exclude 'build/cache/test-bin' -czf "build-tree-macos-arm64.tar.gz" "${paths[@]}"
          ls -lh "build-tree-macos-arm64.tar.gz"

      - name: Upload compiler build tree
        uses: actions/upload-artifact@v7
        with:
          name: ci-build-tree-macos-arm64
          path: build-tree-macos-arm64.tar.gz
          if-no-files-found: error
          retention-days: 1

  # The PR test suite is ~90% of CI wall time and runs serially, so we
  # fan it across per-OS shard legs that run concurrently (Phase 1 of
  # docs/proposals/0011-ci-test-speed.md, #843 Track A). Each leg downloads
  # the shared per-OS compiler tree from its build-compiler-* job
  # (#1234 — no per-leg `make rebuild`) then runs only its shard.
  # `primary: true` designates the one leg per OS that also runs the
  # one-shot steps (fmt/canary/effect-gate/package/upload) so they
  # don't run 4x. Shard names live in compiler/src/cli/commands/dev_shard.sfn
  # (`sfn dev shard names`).
  #
  # build-linux and build-macos are separate job ids (not one os-matrix
  # job) so each OS's legs gate only on their own compiler build — see
  # the build-compiler-* comment above.
  #
  # The suite is sharded across `*_test.sfn` slices only (the legacy
  # e2e-sh `.sh` shards were retired when the bash e2e suite was fully
  # migrated — epic #840). The shard-cover job fails if the map drifts.
  build-linux:
    name: Build + Test [linux-x86_64 / ${{ matrix.shard }}]
    needs: [ci-scope, build-compiler-linux]
    if: ${{ needs.ci-scope.outputs.source == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [unit-a, unit-b, unit-c, int-caps, e2e-a, e2e-b, e2e-c, e2e-d]
        include:
          # Primary leg: runs the one-shot non-test steps + packaging.
          - shard: unit-a
            primary: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version from bootstrap.toml
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bootstrap.toml ]; then
            echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
            exit 1
          fi
          pin="$(awk '
            /^\[[^]]+\]/ { section=$0 }
            section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
          ' bootstrap.toml)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang (Linux)
        run: |
          sudo apt-get update
          # lld provides the unversioned ld.lld/lld binaries the compiler's
          # Linux-only linker auto-detect probes (compiler/src/build/link.sfn);
          # llvm-18 ships only versioned names, so without lld every example/
          # test link falls to the slower system-default linker instead of the
          # intended fast path (SFN-176). ubuntu-24.04's default lld is
          # version 18.
          sudo apt-get install -y clang-18 llvm-18 lld jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      # Shared compiler build (#1234): download the per-OS tree built by
      # `build-compiler-linux` instead of running `make rebuild` here.
      # The tar round-trip preserves the exec bit (upload-artifact strips
      # file modes); the composite's skip-build verify step asserts it.
      - name: Download shared compiler build
        uses: actions/download-artifact@v8
        with:
          name: ci-build-tree-linux-x86_64

      - name: Extract shared compiler build
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf "build-tree-linux-x86_64.tar.gz"
          rm -f "build-tree-linux-x86_64.tar.gz"
          # mtime fix (the real cause of the macOS e2e "exit 134"
          # misattributed to #892): the artifact binary was built from
          # THIS commit's sources, but tar transport leaves it older than
          # the freshly-checked-out sources. A nested `make compile` (run
          # by make_result_contract_test / make_report_contract_test) then
          # sees the binary as stale -> triggers `make rebuild` -> and,
          # since build/toolchains/seed is not bundled, fetches the seed over the
          # network (unauthenticated, no GITHUB_TOKEN in the test child
          # env) and fails -> status != "pass" -> the test aborts (134).
          # The binary IS up-to-date for this commit, so mark it current
          # and `make compile` becomes the intended no-op.
          touch build/bin/sfn
          [ -f build/native/.build-stamp ] && touch build/native/.build-stamp || true
          ls -lh build/bin/sfn

      # Per-shard test-binary cache restore (#2008, SFEP-0044). The
      # build-tree artifact deliberately excludes build/cache/test-bin;
      # this restores each leg's slice from the most recent prior run of
      # the same OS+shard (restore-keys prefix) and saves under this
      # run's sha at job end. Safety is in the entry keys themselves:
      # test_bin_cache_key folds test-source hash + dep closure +
      # compiler identity + runtime identity (#1233), so a restored
      # stale entry self-invalidates and a compiler-changing PR misses
      # everything (correct cold start). The merge/seedcheck gate and
      # nightly `make check` keep --no-test-cache — the cold backstop
      # never consumes this cache.
      - name: Restore per-shard test-binary cache
        uses: actions/cache@v6
        with:
          path: build/cache/test-bin
          key: test-bin-${{ runner.os }}-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            test-bin-${{ runner.os }}-${{ matrix.shard }}-

      - name: Test + package (via Makefile)
        uses: ./.github/actions/sailfin-build
        env:
          # PR CI should not require a PAT.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mode: skip-build
          target: linux-x86_64
          clang: clang-18
          seed_version: ${{ steps.seed.outputs.seed_version }}
          # Each leg runs only its shard; package only on the primary leg.
          shard: ${{ matrix.shard }}
          # Per-file parallelism within the shard leg (benchmarked #843/Track A
          # follow-on): 3 on the 4-vCPU/16GB ubuntu runner (~2x e2e, ~6x unit
          # throughput; tree-wide peak RSS ~2-3.5 GiB, well under budget).
          shard_test_jobs: "3"
          package: ${{ matrix.primary && 'true' || 'false' }}

      - name: Report compiler metadata
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          ls -lh build/bin/sfn
          (file build/bin/sfn || true)
          build/bin/sfn version || build/bin/sfn --version || true

      # Examples regression sweep (epic #549). Every runnable example under
      # examples/ must still `check` + `run` end-to-end. The KNOWN_FAILING
      # allowlist in the script tracks examples blocked on an open compiler
      # bug (each tied to a #549 sub-issue); the gate fails on a NEW failure
      # (a regression in the marketed surface) or when a listed example starts
      # passing (remove it — the ratchet tightens). Primary leg only: it has
      # the packaged native compiler, and runs from the repo root so runtime/
      # resolves via CWD.
      - name: Examples sweep (epic #549)
        if: ${{ matrix.primary }}
        shell: bash
        env:
          # The first example compiled (sorted order: advanced/decorators.sfn)
          # pays the full cold module+object cache cost; on this shared runner
          # that can exceed the script's 25s default and time out `sfn run` —
          # surfacing as a RUN_FAIL whose only stderr is the `[link]` info line
          # (misread as a linker fault in SFN-176). Give the cold first-example
          # compile headroom; the non-terminating examples that must not run to
          # completion are already excluded via the script's SKIP_RUN list, so
          # a genuine hang is still caught.
          SAILFIN_EXAMPLES_TIMEOUT: "60"
        run: scripts/check-examples.sh

      # Regression guard for #615 / #807: assert the effect gate
      # actually fails the build (non-zero exit + correct summary
      # integers) on both Linux x86_64 and macOS arm64. The
      # original report saw `error[E0400]` printed but the process
      # exited 0 and the summary line printed garbage integers
      # like "checked 22884130224 files: 22884131104 error",
      # caused by a Bool/int ABI hazard since fixed by the i64
      # C-ABI coercion family (#638/#641/#639) and the arm64 ABI
      # fixes in 027735d9 / a476bf4b. The clean-file control
      # ensures the gate is not just rejecting every input.
      - name: Effect-gate exit-code smoke (#615 / #807)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          BAD=compiler/tests/fixtures/cli/missing_effect.sfn
          OK=compiler/tests/fixtures/cli/clean_effect.sfn
          fail=0

          # --- Missing-effect input must fail `sailfin check`. ---
          if out="$(build/bin/sfn check "$BAD" 2>&1)"; then
            echo "[effect-gate] FAIL: sailfin check on $BAD exited 0 (expected non-zero)."
            echo "$out"
            fail=$((fail + 1))
          else
            echo "[effect-gate] ok: sailfin check on $BAD exited non-zero."
          fi
          if ! echo "$out" | grep -q 'error\[E0400\]'; then
            echo "[effect-gate] FAIL: missing E0400 diagnostic in output:"
            echo "$out"
            fail=$((fail + 1))
          fi
          if ! echo "$out" | grep -qE '^checked 1 files: 1 error$'; then
            echo "[effect-gate] FAIL: summary line not 'checked 1 files: 1 error'."
            echo "[effect-gate] (likely Bool/int ABI corruption — see #615 / #638 / #641)"
            echo "$out" | grep -E '^checked ' || true
            fail=$((fail + 1))
          fi

          # --- Missing-effect input must also fail `sailfin emit llvm`. ---
          if build/bin/sfn emit llvm "$BAD" >/dev/null 2>&1; then
            echo "[effect-gate] FAIL: sailfin emit llvm on $BAD exited 0 (expected non-zero)."
            fail=$((fail + 1))
          else
            echo "[effect-gate] ok: sailfin emit llvm on $BAD exited non-zero."
          fi

          # --- Clean-file control must succeed. ---
          if ! ok_out="$(build/bin/sfn check "$OK" 2>&1)"; then
            echo "[effect-gate] FAIL: sailfin check on $OK exited non-zero (expected 0)."
            echo "$ok_out"
            fail=$((fail + 1))
          else
            echo "[effect-gate] ok: sailfin check on $OK exited 0."
          fi
          if ! echo "$ok_out" | grep -qE '^checked 1 files: ok$'; then
            echo "[effect-gate] FAIL: clean-file summary not 'checked 1 files: ok'."
            echo "$ok_out" | grep -E '^checked ' || true
            fail=$((fail + 1))
          fi

          if [ "$fail" -gt 0 ]; then
            echo ""
            echo "[effect-gate] $fail assertion(s) failed. The effect gate is broken."
            exit 1
          fi
          echo "[effect-gate] all assertions passed"

      - name: Check formatting (sfn fmt --check)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          fail=0
          # Per-file loop to avoid OOM on bulk --check
          while IFS= read -r f; do
            if ! build/bin/sfn fmt --check "$f" > /dev/null 2>&1; then
              echo "[fmt] needs formatting: $f"
              fail=$((fail + 1))
            fi
          done < <(find compiler/src runtime -name '*.sfn' -print | sort)
          if [ "$fail" -gt 0 ]; then
            echo ""
            echo "[fmt] $fail file(s) need formatting. Run: sfn fmt --write compiler/src/ runtime/"
            exit 1
          fi
          echo "[fmt] all files formatted"

      # Cheap pre-check: emit native_ir_api.sfn (the hottest consumer of
      # cross-module helpers) and assert the lowering produced no
      # "unknown function" or "unable to lower if condition" diagnostics.
      # These diagnostics are currently non-fatal (they're written to
      # stderr and the build continues), but they are a reliable signal
      # that an import is resolving to a symbol with no `.fn` signature
      # in the imported module's `.sfn-asm` — the exact shape described
      # in docs/rca/2026-04-18-reexport-diagnostic-gep.md.
      - name: Lowering-diagnostic canary (emit + grep)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          mkdir -p build/sailfin
          canary_files=(
            compiler/src/native_ir_api.sfn
            compiler/src/native_ir_parser.sfn
            compiler/src/native_ir_parser_defs.sfn
            compiler/src/native_ir_parser_instructions.sfn
            compiler/src/native_ir_utils_layout.sfn
            compiler/src/native_ir_utils_parse.sfn
          )
          fail=0
          for f in "${canary_files[@]}"; do
            if ! log="$(build/bin/sfn emit llvm "$f" 2>&1 1>/dev/null)"; then
              echo "[canary] emit crashed for $f"
              fail=$((fail + 1))
              continue
            fi
            bad="$(echo "$log" | grep -E 'call to unknown function|unable to lower if condition' || true)"
            if [ -n "$bad" ]; then
              echo "[canary] lowering diagnostics in $f:"
              echo "$bad"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo ""
            echo "[canary] $fail file(s) produced unsafe lowering diagnostics."
            echo "[canary] This typically means an imported symbol has no .fn"
            echo "[canary] signature in its origin's .sfn-asm — check for"
            echo "[canary] re-exports of imported symbols."
            echo "[canary] See docs/rca/2026-04-18-reexport-diagnostic-gep.md."
            exit 1
          fi
          echo "[canary] all canary files emit cleanly"

      # Static check: catch any new `export { X };` (no `from`) that
      # re-exports a symbol imported from a local module path. This is
      # the compiler's own analysis (E0600), now run in the `sfn check`
      # fast path — it replaces the former
      # scripts/lint_no_implicit_reexports.py Python duplicate. Uses the
      # freshly-built native binary (not the seed) so the check is the
      # current source's, with no seed-lag, over both source trees.
      # See docs/rca/2026-04-18-reexport-diagnostic-gep.md.
      - name: Re-export check (sfn check enforces E0600)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          build/bin/sfn check compiler/src runtime

      - name: Fixed-point rebuild check (linux-x86_64)
        if: >-
          matrix.primary &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc')
        shell: bash {0}
        run: |
          set -euo pipefail
          # Stage E PR7 (#383): the prior `scripts/build.sh` orchestrator
          # was retired; this fixed-point gate now routes through the
          # driver's `--work-dir` flag (the same path `make check`'s
          # stage2/stage3 invocations use). `SAILFIN_TEST_SCRATCH`
          # isolates each stage's per-module `.ll` outputs so the
          # second-pass build does not clobber the first-pass set.
          # `--no-cache` forces a fresh emit on each pass so the byte
          # comparison is meaningful.
          #
          # `stage_capsule_imports` treats existing
          # `<work-dir>/native/import-context/*.sfn-asm` +
          # `.layout-manifest` files as cache hits based only on
          # presence (mtime / `--no-cache` are not consulted for that
          # short-circuit), so a restored workflow cache or stale
          # workspace could otherwise produce a vacuous fixed-point
          # comparison. Wipe both work dirs and their scratch roots
          # before each build, mirroring `make check`'s targeted-find
          # cleanup at Makefile:455-460/495-500.
          rm -rf build/selfhost/native-selfhost1 build/selfhost/native-selfhost2
          mkdir -p build/selfhost/native-selfhost1 build/selfhost/native-selfhost2
          SAILFIN_TEST_SCRATCH="build/selfhost/native-selfhost1/scratch" \
            build/bin/sfn build --no-cache -p compiler \
              --work-dir build/selfhost/native-selfhost1 \
              -o build/bin/sfn-selfhost1
          SAILFIN_TEST_SCRATCH="build/selfhost/native-selfhost2/scratch" \
            build/bin/sfn-selfhost1 build --no-cache -p compiler \
              --work-dir build/selfhost/native-selfhost2 \
              -o build/bin/sfn-selfhost2
          ls -lh build/bin/sfn-selfhost1 build/bin/sfn-selfhost2
          (file build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 || true)
          build/bin/sfn-selfhost1 version || true
          build/bin/sfn-selfhost2 version || true
          echo "[ci] fixed-point sha256:"
          (sha256sum build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 2>/dev/null || shasum -a 256 build/bin/sfn-selfhost1 build/bin/sfn-selfhost2)
          if [ "${RUNNER_OS}" = "Linux" ]; then
            if ! cmp -s build/bin/sfn-selfhost1 build/bin/sfn-selfhost2; then
              echo "[ci][error] fixed-point rebuild mismatch (binaries differ)" >&2
              (cmp -l build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 | head -n 20 || true)
              exit 1
            fi
          else
            # macOS binaries (Mach-O) embed a per-link UUID (LC_UUID), so byte-for-byte
            # equality is not a stable determinism signal. Instead, assert the second
            # selfhosted compiler can run a minimal unit test.
            (dwarfdump --uuid build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 || true)
            build/bin/sfn-selfhost2 test compiler/tests/unit/cli_version_test.sfn
          fi

      # NOTE (#1234): the Windows cross-compile + its installer upload
      # moved to the `build-compiler-linux` job — it needs
      # `build/native/raw/*.ll`, which the shared shard artifact
      # deliberately excludes to stay bounded.

      - name: Upload native artifacts
        if: ${{ matrix.primary }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-native-linux-x86_64
          path: |
            dist/sailfin-native-linux-x86_64-*.tar.gz
            dist/sailfin-native-linux-x86_64-*.tar.gz.sha256
            dist/sailfin-native-linux-x86_64-*.manifest.json
          if-no-files-found: error

      - name: Upload installer archive
        if: ${{ matrix.primary }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-installer-linux-x86_64
          path: dist/installer-linux-x86_64.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build + Test [macos-arm64 / ${{ matrix.shard }}]
    needs: [ci-scope, build-compiler-macos]
    if: ${{ needs.ci-scope.outputs.source == 'true' }}
    # macos-26: adopted from the nightly-selfhost canary now that the
    # `macos-latest` migration (2026-06-15) has made macos-15 runners
    # scarce. The *test runner* is serial (`sailfin test --jobs 1` via
    # `sfn dev shard run`), but each fixture build fans out internally
    # to `_cr_resolve_jobs()` emit workers. `RLIMIT_AS` is a no-op on
    # Darwin, so that fan-out is the only memory backpressure on macOS;
    # it is now RAM-aware (#1532, `docs/proposals/0022-darwin-memory-governor.md`)
    # and self-selects a small N on the ~7 GiB runner instead of the
    # blind 8 that previously OOMed the int-e2e-caps shard.
    runs-on: macos-26
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [unit-a, unit-b, unit-c, int-caps, e2e-a, e2e-b, e2e-c, e2e-d]
        include:
          # Primary leg: runs the one-shot non-test steps + packaging.
          - shard: unit-a
            primary: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version from bootstrap.toml
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bootstrap.toml ]; then
            echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
            exit 1
          fi
          pin="$(awk '
            /^\[[^]]+\]/ { section=$0 }
            section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
          ' bootstrap.toml)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install jq + LLVM tools (macOS)
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      # Shared compiler build (#1234): download the per-OS tree built by
      # `build-compiler-macos` instead of running `make rebuild` here.
      # The tar round-trip preserves the exec bit (upload-artifact strips
      # file modes); the composite's skip-build verify step asserts it.
      - name: Download shared compiler build
        uses: actions/download-artifact@v8
        with:
          name: ci-build-tree-macos-arm64

      - name: Extract shared compiler build
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf "build-tree-macos-arm64.tar.gz"
          rm -f "build-tree-macos-arm64.tar.gz"
          # mtime fix (the real cause of the macOS e2e "exit 134"
          # misattributed to #892): the artifact binary was built from
          # THIS commit's sources, but tar transport leaves it older than
          # the freshly-checked-out sources. A nested `make compile` (run
          # by make_result_contract_test / make_report_contract_test) then
          # sees the binary as stale -> triggers `make rebuild` -> and,
          # since build/toolchains/seed is not bundled, fetches the seed over the
          # network (unauthenticated, no GITHUB_TOKEN in the test child
          # env) and fails -> status != "pass" -> the test aborts (134).
          # The binary IS up-to-date for this commit, so mark it current
          # and `make compile` becomes the intended no-op.
          touch build/bin/sfn
          [ -f build/native/.build-stamp ] && touch build/native/.build-stamp || true
          ls -lh build/bin/sfn

      # Per-shard test-binary cache restore (#2008, SFEP-0044) — same
      # contract as the Linux leg: prefix-restore from the latest prior
      # run of this OS+shard, save under this run's sha; entry keys
      # self-validate (#1233) so stale restores are safe by construction.
      - name: Restore per-shard test-binary cache
        uses: actions/cache@v6
        with:
          path: build/cache/test-bin
          key: test-bin-${{ runner.os }}-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            test-bin-${{ runner.os }}-${{ matrix.shard }}-

      - name: Test + package (via Makefile)
        uses: ./.github/actions/sailfin-build
        env:
          # PR CI should not require a PAT.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mode: skip-build
          target: macos-arm64
          clang: clang
          seed_version: ${{ steps.seed.outputs.seed_version }}
          # Each leg runs only its shard; package only on the primary leg.
          shard: ${{ matrix.shard }}
          # Per-file parallelism within the shard leg, raised 2 -> 3 to
          # match the 3-vCPU macos-arm64 runner: the macOS unit/e2e legs
          # are the PR-CI critical path (24-32 min) and the prior
          # conservative 2 left a core idle. Darwin has no RLIMIT_AS
          # backstop, but the per-child emit fan-out is RAM-aware
          # (SFEP-0022 governor) and the heavy-child working set is
          # frontend-bound, not RSS-bound (#2010). Drop back to 2 if a
          # shard leg OOMs on the 7GB runner.
          shard_test_jobs: "3"
          package: ${{ matrix.primary && 'true' || 'false' }}

      # #1235 measurement (read-only): surface this shard leg's test-phase
      # wall time and cache.test_bin_hit_rate (captured by the sailfin-build
      # action into build/ci-metrics.env) into the job log + step summary.
      # The findings comment scrapes the per-shard `[ci-metrics]` line; the
      # per-leg queue/start/end come from the Actions API at analysis time.
      - name: Emit macOS test-leg metrics (#1235)
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          f=build/ci-metrics.env
          if [ ! -f "$f" ]; then
            echo "[ci-metrics] no metrics file ($f) — tests likely failed before measurement (shard ${{ matrix.shard }})"
            exit 0
          fi
          # shellcheck disable=SC1090
          . "$f"
          shard="${ci_metrics_shard:-${{ matrix.shard }}}"
          echo "[ci-metrics] target=${ci_metrics_target:-macos-arm64} phase=test shard=${shard} test_s=${test_seconds:-?} test_bin_hit_rate=${test_bin_hit_rate:-?}"
          {
            echo "### macOS test leg metrics — shard ${shard} (#1235)"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| shard | ${shard} |"
            echo "| test wall (s) | ${test_seconds:-?} |"
            echo "| cache.test_bin_hit_rate | ${test_bin_hit_rate:-?} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report compiler metadata
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          ls -lh build/bin/sfn
          (file build/bin/sfn || true)
          build/bin/sfn version || build/bin/sfn --version || true

      # Regression guard for #615 / #807 — see the build-linux twin for
      # the full background. Runs on macOS arm64 too because the
      # original hazard was an arm64 ABI bug.
      - name: Effect-gate exit-code smoke (#615 / #807)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          BAD=compiler/tests/fixtures/cli/missing_effect.sfn
          OK=compiler/tests/fixtures/cli/clean_effect.sfn
          fail=0

          # --- Missing-effect input must fail `sailfin check`. ---
          if out="$(build/bin/sfn check "$BAD" 2>&1)"; then
            echo "[effect-gate] FAIL: sailfin check on $BAD exited 0 (expected non-zero)."
            echo "$out"
            fail=$((fail + 1))
          else
            echo "[effect-gate] ok: sailfin check on $BAD exited non-zero."
          fi
          if ! echo "$out" | grep -q 'error\[E0400\]'; then
            echo "[effect-gate] FAIL: missing E0400 diagnostic in output:"
            echo "$out"
            fail=$((fail + 1))
          fi
          if ! echo "$out" | grep -qE '^checked 1 files: 1 error$'; then
            echo "[effect-gate] FAIL: summary line not 'checked 1 files: 1 error'."
            echo "[effect-gate] (likely Bool/int ABI corruption — see #615 / #638 / #641)"
            echo "$out" | grep -E '^checked ' || true
            fail=$((fail + 1))
          fi

          # --- Missing-effect input must also fail `sailfin emit llvm`. ---
          if build/bin/sfn emit llvm "$BAD" >/dev/null 2>&1; then
            echo "[effect-gate] FAIL: sailfin emit llvm on $BAD exited 0 (expected non-zero)."
            fail=$((fail + 1))
          else
            echo "[effect-gate] ok: sailfin emit llvm on $BAD exited non-zero."
          fi

          # --- Clean-file control must succeed. ---
          if ! ok_out="$(build/bin/sfn check "$OK" 2>&1)"; then
            echo "[effect-gate] FAIL: sailfin check on $OK exited non-zero (expected 0)."
            echo "$ok_out"
            fail=$((fail + 1))
          else
            echo "[effect-gate] ok: sailfin check on $OK exited 0."
          fi
          if ! echo "$ok_out" | grep -qE '^checked 1 files: ok$'; then
            echo "[effect-gate] FAIL: clean-file summary not 'checked 1 files: ok'."
            echo "$ok_out" | grep -E '^checked ' || true
            fail=$((fail + 1))
          fi

          if [ "$fail" -gt 0 ]; then
            echo ""
            echo "[effect-gate] $fail assertion(s) failed. The effect gate is broken."
            exit 1
          fi
          echo "[effect-gate] all assertions passed"

      - name: Check formatting (sfn fmt --check)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          fail=0
          # Per-file loop to avoid OOM on bulk --check
          while IFS= read -r f; do
            if ! build/bin/sfn fmt --check "$f" > /dev/null 2>&1; then
              echo "[fmt] needs formatting: $f"
              fail=$((fail + 1))
            fi
          done < <(find compiler/src runtime -name '*.sfn' -print | sort)
          if [ "$fail" -gt 0 ]; then
            echo ""
            echo "[fmt] $fail file(s) need formatting. Run: sfn fmt --write compiler/src/ runtime/"
            exit 1
          fi
          echo "[fmt] all files formatted"

      # Lowering-diagnostic canary — see the build-linux twin for the
      # full background (docs/rca/2026-04-18-reexport-diagnostic-gep.md).
      - name: Lowering-diagnostic canary (emit + grep)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          mkdir -p build/sailfin
          canary_files=(
            compiler/src/native_ir_api.sfn
            compiler/src/native_ir_parser.sfn
            compiler/src/native_ir_parser_defs.sfn
            compiler/src/native_ir_parser_instructions.sfn
            compiler/src/native_ir_utils_layout.sfn
            compiler/src/native_ir_utils_parse.sfn
          )
          fail=0
          for f in "${canary_files[@]}"; do
            if ! log="$(build/bin/sfn emit llvm "$f" 2>&1 1>/dev/null)"; then
              echo "[canary] emit crashed for $f"
              fail=$((fail + 1))
              continue
            fi
            bad="$(echo "$log" | grep -E 'call to unknown function|unable to lower if condition' || true)"
            if [ -n "$bad" ]; then
              echo "[canary] lowering diagnostics in $f:"
              echo "$bad"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo ""
            echo "[canary] $fail file(s) produced unsafe lowering diagnostics."
            echo "[canary] This typically means an imported symbol has no .fn"
            echo "[canary] signature in its origin's .sfn-asm — check for"
            echo "[canary] re-exports of imported symbols."
            echo "[canary] See docs/rca/2026-04-18-reexport-diagnostic-gep.md."
            exit 1
          fi
          echo "[canary] all canary files emit cleanly"

      # Static check: E0600 re-export analysis — see the build-linux
      # twin for the full background.
      - name: Re-export check (sfn check enforces E0600)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          build/bin/sfn check compiler/src runtime

      - name: Enable test runner trace (macOS)
        if: ${{ matrix.primary }}
        shell: bash {0}
        run: |
          set -euo pipefail
          mkdir -p build/sailfin
          touch build/sailfin/.trace_test_runner

      - name: Preflight single unit test (macOS)
        if: ${{ matrix.primary }}
        id: mac_test_preflight
        continue-on-error: true
        shell: bash {0}
        run: |
          set -euo pipefail
          build/bin/sfn test compiler/tests/unit/cli_version_test.sfn

      - name: Fixed-point rebuild check (macos-arm64)
        if: >-
          matrix.primary &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc')
        shell: bash {0}
        run: |
          set -euo pipefail
          # Stage E PR7 (#383): the prior `scripts/build.sh` orchestrator
          # was retired; this fixed-point gate now routes through the
          # driver's `--work-dir` flag (the same path `make check`'s
          # stage2/stage3 invocations use). `SAILFIN_TEST_SCRATCH`
          # isolates each stage's per-module `.ll` outputs so the
          # second-pass build does not clobber the first-pass set.
          # `--no-cache` forces a fresh emit on each pass so the byte
          # comparison is meaningful.
          #
          # `stage_capsule_imports` treats existing
          # `<work-dir>/native/import-context/*.sfn-asm` +
          # `.layout-manifest` files as cache hits based only on
          # presence (mtime / `--no-cache` are not consulted for that
          # short-circuit), so a restored workflow cache or stale
          # workspace could otherwise produce a vacuous fixed-point
          # comparison. Wipe both work dirs and their scratch roots
          # before each build, mirroring `make check`'s targeted-find
          # cleanup at Makefile:455-460/495-500.
          rm -rf build/selfhost/native-selfhost1 build/selfhost/native-selfhost2
          mkdir -p build/selfhost/native-selfhost1 build/selfhost/native-selfhost2
          SAILFIN_TEST_SCRATCH="build/selfhost/native-selfhost1/scratch" \
            build/bin/sfn build --no-cache -p compiler \
              --work-dir build/selfhost/native-selfhost1 \
              -o build/bin/sfn-selfhost1
          SAILFIN_TEST_SCRATCH="build/selfhost/native-selfhost2/scratch" \
            build/bin/sfn-selfhost1 build --no-cache -p compiler \
              --work-dir build/selfhost/native-selfhost2 \
              -o build/bin/sfn-selfhost2
          ls -lh build/bin/sfn-selfhost1 build/bin/sfn-selfhost2
          (file build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 || true)
          build/bin/sfn-selfhost1 version || true
          build/bin/sfn-selfhost2 version || true
          echo "[ci] fixed-point sha256:"
          (sha256sum build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 2>/dev/null || shasum -a 256 build/bin/sfn-selfhost1 build/bin/sfn-selfhost2)
          if [ "${RUNNER_OS}" = "Linux" ]; then
            if ! cmp -s build/bin/sfn-selfhost1 build/bin/sfn-selfhost2; then
              echo "[ci][error] fixed-point rebuild mismatch (binaries differ)" >&2
              (cmp -l build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 | head -n 20 || true)
              exit 1
            fi
          else
            # macOS binaries (Mach-O) embed a per-link UUID (LC_UUID), so byte-for-byte
            # equality is not a stable determinism signal. Instead, assert the second
            # selfhosted compiler can run a minimal unit test.
            (dwarfdump --uuid build/bin/sfn-selfhost1 build/bin/sfn-selfhost2 || true)
            build/bin/sfn-selfhost2 test compiler/tests/unit/cli_version_test.sfn
          fi

      - name: Upload native artifacts
        if: ${{ matrix.primary }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-native-macos-arm64
          path: |
            dist/sailfin-native-macos-arm64-*.tar.gz
            dist/sailfin-native-macos-arm64-*.tar.gz.sha256
            dist/sailfin-native-macos-arm64-*.manifest.json
          if-no-files-found: error

      - name: Upload installer archive
        if: ${{ matrix.primary }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-installer-macos-arm64
          path: dist/installer-macos-arm64.tar.gz
          if-no-files-found: error

  # Native Windows smoke test. The Windows .exe is cross-compiled on
  # ubuntu (build-compiler-linux) and was, until now, shipped without
  # ever being executed (#DOA: it segfaulted at startup on a native-TLS
  # access — fixed by -femulated-tls in `make ci-cross-windows`). This
  # job runs the cross-built binary on a real windows-latest runner so
  # that regression can never ship again.
  smoke-windows:
    name: Smoke test [windows-x86_64]
    needs: [ci-scope, build-compiler-linux]
    if: ${{ needs.ci-scope.outputs.source == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download Windows installer archive
        uses: actions/download-artifact@v8
        with:
          name: ci-installer-windows-x86_64
          path: dist

      - name: Extract installer bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p win-bundle
          tar -xzf dist/installer-windows-x86_64.tar.gz -C win-bundle
          EXE="$(find "$PWD/win-bundle" -name sailfin.exe | head -1)"
          if [ -z "$EXE" ]; then
            echo "sailfin.exe not found in installer bundle" >&2
            exit 1
          fi
          echo "SAILFIN_EXE=$EXE" >> "$GITHUB_ENV"
          echo "found: $EXE"

      # Regression guard for the native-TLS startup segfault. Before the
      # -femulated-tls fix this exited with 0xC0000005 before printing
      # anything; --version exiting 0 with a version string proves the
      # binary boots and TLS is initialized.
      - name: Smoke - version (boots without segfault)
        shell: bash
        run: |
          set -euo pipefail
          out="$("$SAILFIN_EXE" --version)"
          echo "version: $out"
          case "$out" in
            "sfn "*) echo "ok: binary boots and prints version" ;;
            *) echo "FAIL: unexpected --version output: $out" >&2; exit 1 ;;
          esac

      # Frontend smoke (lex + parse + typecheck + effect-check). Run from
      # the repo root so the runtime bundle (runtime/) resolves via CWD.
      - name: Smoke - frontend check
        shell: bash
        run: |
          set -euo pipefail
          "$SAILFIN_EXE" check examples/basics/hello-world.sfn

  required-ci:
    name: Required CI gate
    needs:
      - ci-scope
      - check-site-hero
      - check-fast
      - build-compiler-linux
      - build-compiler-macos
      - shard-cover
      - build-linux
      - build-macos
      - smoke-windows
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      CI_SCOPE_RESULT: ${{ needs.ci-scope.result }}
      SOURCE_CI: ${{ needs.ci-scope.outputs.source }}
      SITE_HERO_CI: ${{ needs.ci-scope.outputs.site_hero }}
      CHECK_SITE_HERO: ${{ needs.check-site-hero.result }}
      CHECK_FAST: ${{ needs.check-fast.result }}
      BUILD_COMPILER_LINUX: ${{ needs.build-compiler-linux.result }}
      BUILD_COMPILER_MACOS: ${{ needs.build-compiler-macos.result }}
      SHARD_COVER: ${{ needs.shard-cover.result }}
      BUILD_LINUX: ${{ needs.build-linux.result }}
      BUILD_MACOS: ${{ needs.build-macos.result }}
      SMOKE_WINDOWS: ${{ needs.smoke-windows.result }}
    steps:
      - name: Summarize required CI result
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "### Required CI gate"
            echo ""
            echo "| check | result |"
            echo "| --- | --- |"
            echo "| CI scope job | ${CI_SCOPE_RESULT:-unset} |"
            echo "| CI scope output | ${SOURCE_CI:-unset} |"
            echo "| Homepage hero scope output | ${SITE_HERO_CI:-unset} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${CI_SCOPE_RESULT:-}" != "success" ]; then
            echo "[required-ci] CI scope did not succeed; failing closed." >&2
            exit 1
          fi

          if [ "${SOURCE_CI:-}" != "true" ] && [ "${SOURCE_CI:-}" != "false" ]; then
            echo "[required-ci] CI scope emitted unexpected source value: ${SOURCE_CI:-unset}" >&2
            exit 1
          fi

          if [ "${SITE_HERO_CI:-}" != "true" ] && [ "${SITE_HERO_CI:-}" != "false" ]; then
            echo "[required-ci] CI scope emitted unexpected homepage hero value: ${SITE_HERO_CI:-unset}" >&2
            exit 1
          fi

          fail=0
          check() {
            name="$1"
            result="$2"
            echo "[required-ci] $name: $result"
            echo "| $name | $result |" >> "$GITHUB_STEP_SUMMARY"
            if [ "$result" != "success" ]; then
              fail=$((fail + 1))
            fi
          }

          if [ "${SOURCE_CI:-}" = "true" ]; then
            check "Fast static check (sfn check compiler/src/)" "$CHECK_FAST"
            check "Build compiler [linux-x86_64]" "$BUILD_COMPILER_LINUX"
            check "Build compiler [macos-arm64]" "$BUILD_COMPILER_MACOS"
            check "Shard-cover lint" "$SHARD_COVER"
            check "Build + Test [linux-x86_64]" "$BUILD_LINUX"
            check "Build + Test [macos-arm64]" "$BUILD_MACOS"
            check "Smoke test [windows-x86_64]" "$SMOKE_WINDOWS"
          else
            echo "[required-ci] compiler CI is out of scope for this PR."
            echo "| Compiler CI | skipped by path scope |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${SITE_HERO_CI:-}" = "true" ]; then
            check "Verify homepage Sailfin example" "$CHECK_SITE_HERO"
          else
            echo "[required-ci] homepage hero verification is out of scope for this PR."
            echo "| Homepage hero verification | skipped by path scope |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$fail" -gt 0 ]; then
            echo "[required-ci] $fail required CI job(s) did not succeed." >&2
            exit 1
          fi

          echo "[required-ci] all in-scope required CI jobs passed."
