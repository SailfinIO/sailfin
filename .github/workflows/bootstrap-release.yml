name: Compiler Build and Publish

on:
  push:
    branches:
      - main
      - beta # Include beta branch if needed

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required for semantic-release to access full git history

      # 2. Set up Python
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      # 3. Install Poetry
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH  # Correctly append to PATH

      # 4. Configure Poetry to not create a virtual environment
      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create false
        working-directory: bootstrap

      # 5. Cache Poetry Dependencies
      - name: Cache Poetry Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('bootstrap/pyproject.toml', 'bootstrap/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # 6. Install Dependencies
      - name: Install Dependencies
        run: |
          cd bootstrap && poetry install --no-interaction --no-ansi

      # 7. Semantic Release - Version (creates new version, updates files, tags, builds via build_command)
      - name: Semantic Release Version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SEMANTIC_RELEASE_LOG_LEVEL: DEBUG
        run: |
          cd bootstrap && poetry run semantic-release version

      # 8. Semantic Release - Publish (creates GitHub release & uploads assets)
      - name: Semantic Release Publish
        env:
          # GitHub automatically provides this token; semantic-release expects GH_TOKEN
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment for verbose troubleshooting
          # SEMANTIC_RELEASE_LOG_LEVEL: DEBUG
        run: |
          cd bootstrap && poetry run semantic-release publish
