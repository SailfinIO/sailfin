name: Release Train (weekly stable)

# Weekly, fully-automated STABLE minor release train (SFEP-0026 WS-C, amended
# 2026-07-18).
#
# A scheduled, deterministic workflow that runs every Monday and, when `main`
# is green, cuts the next STABLE minor automatically — no human confirmation.
# At each train boundary it:
#
#   1. Computes the stable target from `compiler/capsule.toml`:
#        - a prerelease line `X.Y.Z-pre.N` ships as `X.Y.Z` stable
#          (`channel=stable bump=prerelease` — strips the suffix), so a line
#          already in flight is promoted rather than skipped;
#        - an already-stable `X.Y.0` advances to `X.(Y+1).0`
#          (`channel=stable bump=minor`).
#      There is no `pendingStable` HOLD — the train ships the pending stable
#      instead of waiting on a human to do it.
#   2. Evaluates the *cut gate* — the health of `main` (latest scheduled
#      Nightly self-host check; per-commit CI is guaranteed by the merge queue),
#      NOT the open scope. Whatever scoped work is not done ROLLS FORWARD to the
#      next train: open `release:next-minor` items are surfaced for visibility
#      but NEVER block the train (time-box semantics).
#   3. Dispatches `release.yml` (channel=stable) automatically on scheduled
#      cadence runs when the cut gate is green. Manual runs stay
#      human-confirmable: re-run with `confirm_dispatch=true` to fire an
#      off-clock or repair cut once the cadence comment looks right.
#
# It is a PLAIN, deterministic Actions workflow in the spirit of
# `seed-cut-advisor.yml` — NOT a gh-aw `.md` source. No compiled `.lock.yml`,
# no LLM engine, no ANTHROPIC_API_KEY. A single pinned `actions/github-script`
# step does the version math / tracker upsert / gate evaluation / optional
# dispatch. The seed is auto-pinned on the resulting release by
# `cadence-seed-pin.yml` (every green release, auto-merged).
#
# See `.github/AGENTS.md`, `docs/conventions/issue-naming.md` "Release
# tracking" / "Seed pinning", and `.claude/commands/release-plan.md` (which
# enriches the tracker the train opens).

on:
  schedule:
    # Every Monday 09:00 UTC — weekly cadence boundary. A maintainer can always
    # run off-cadence via workflow_dispatch.
    - cron: "0 9 * * 1"
  # Re-evaluate whenever a nightly self-host check finishes: a cut only fires
  # once a GREEN nightly has verified the current `main` HEAD, so the nightly's
  # completion is the natural "now safe to cut" signal.
  workflow_run:
    workflows: ["Nightly self-host check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute + report only; make no writes (no tracker, no comment, no dispatch)"
        required: false
        type: boolean
        default: false
      confirm_dispatch:
        description: "Manual confirmation: dispatch release.yml for the cadence stable cut (requires a clear cut gate)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  actions: write

concurrency:
  group: release-train
  cancel-in-progress: false

jobs:
  train:
    name: Weekly stable train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run weekly stable train
        uses: actions/github-script@v9.0.0
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          CONFIRM_DISPATCH: ${{ inputs.confirm_dispatch }}
          SLACK_RELEASE_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const dryRun = process.env.DRY_RUN === 'true';
            const confirmDispatch = process.env.CONFIRM_DISPATCH === 'true';
            const isSchedule = context.eventName === 'schedule';
            const isNightlyDone = context.eventName === 'workflow_run';
            const summary = [];
            const note = (s) => { core.info(s); summary.push(s); };
            async function postSlack(text) {
              const url = process.env.SLACK_RELEASE_WEBHOOK_URL || '';
              if (!url) return;
              try {
                const res = await fetch(url, {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ text }),
                });
                if (!res.ok) {
                  core.warning(`Slack notification failed (${res.status}): ${await res.text()}`);
                }
              } catch (e) {
                core.warning(`Slack notification failed: ${e.message}`);
              }
            }

            note(`Weekly stable train; event=${context.eventName}, dryRun=${dryRun}.`);

            async function tagExists(tag) {
              try {
                await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
                return true;
              } catch (e) {
                if (e.status === 404) return false;
                throw e;
              }
            }

            // --- 1. Compute the stable target ---------------------------------
            // A prerelease line ships its own stable (promote, don't skip);
            // an already-stable line advances to the next minor.
            const capsule = fs.readFileSync('compiler/capsule.toml', 'utf8');
            const vm = capsule.match(/^version\s*=\s*"([^"]+)"/m);
            if (!vm) { core.setFailed('Could not read version from compiler/capsule.toml'); return; }
            const cm = vm[1].match(/^(\d+)\.(\d+)\.(\d+)(?:-([a-z]+)\.(\d+))?$/);
            if (!cm) { core.setFailed(`Cannot parse version '${vm[1]}'`); return; }
            const [maj, min, patch] = [parseInt(cm[1], 10), parseInt(cm[2], 10), parseInt(cm[3], 10)];
            const prerelease = cm[4] || '';
            let target, bump;
            if (prerelease) {
              target = `v${maj}.${min}.${patch}`;
              bump = 'prerelease';
              note(`Current ${vm[1]} is a prerelease line → promoting to stable ${target} (channel=stable bump=prerelease).`);
            } else {
              target = `v${maj}.${min + 1}.0`;
              bump = 'minor';
              note(`Current ${vm[1]} is stable → advancing to ${target} (channel=stable bump=minor).`);
            }
            const trackerTitle = `Release: ${target}`;

            // --- 2. Cut gate: current main HEAD self-hosts (NOT open scope) ---
            // The train is time-boxed: open scope rolls forward and never gates
            // the cut. The gate is that the EXACT commit we would tag — current
            // `main` HEAD — has a GREEN Nightly self-host run (triple-pass
            // `make check`). Binding to `head_sha` (not merely "latest scheduled
            // nightly = success") closes the window where a self-host-breaking
            // commit lands after the last nightly and gets cut as stable on a
            // stale-green signal. Per-commit single-pass CI is guaranteed by the
            // merge queue; the nightly adds the triple-pass seedcheck.
            const defaultBranch = context.payload.repository?.default_branch || 'main';
            const headSha = (await github.rest.repos.getBranch({
              owner, repo, branch: defaultBranch,
            })).data.commit.sha;
            const nightlyRuns = (await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id: 'nightly-selfhost.yml',
              branch: defaultBranch, per_page: 30,
            })).data.workflow_runs;
            const headNightly = nightlyRuns.find(r => r.head_sha === headSha && r.status === 'completed');
            const cutGateClear = !!headNightly && headNightly.conclusion === 'success';
            const nightlyInFlight = nightlyRuns.some(r => r.status === 'queued' || r.status === 'in_progress');
            note(`Current ${defaultBranch} HEAD ${headSha.slice(0, 8)}.`);
            note(headNightly
              ? `Cut gate — nightly for HEAD = ${headNightly.conclusion} (${headNightly.html_url}).`
              : `Cut gate — no completed nightly self-host run for HEAD yet (in-flight: ${nightlyInFlight}).`);

            // --- 3. Roll-forward visibility: open release:next-minor items -----
            const openNextMinor = (await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'release:next-minor', per_page: 100,
            })).filter(i => !i.pull_request);
            note(openNextMinor.length === 0
              ? 'No open `release:next-minor` items — train carries the merged-and-validated work.'
              : `${openNextMinor.length} open \`release:next-minor\` item(s) will ROLL FORWARD (they never block the train): `
                + openNextMinor.map(i => '#' + i.number).join(', '));

            // --- 4. Open or update the tracker --------------------------------
            // Trackers are looked up by exact title first. The `tracking` label
            // is still applied for compatibility with older advisor tooling, but
            // a missing label must not make the train miss an existing tracker.
            const existing = (await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100,
            })).filter(i => !i.pull_request && i.title.trim() === trackerTitle);
            let tracker = existing[0] || null;
            if (existing.length > 1) {
              note(`⚠ Multiple open trackers titled "${trackerTitle}" (#${existing.map(i => i.number).join(', #')}); using the lowest.`);
              tracker = existing.sort((a, b) => a.number - b.number)[0];
            }

            const cadenceMarker = `Cadence-train: ${target}`;

            if (!tracker) {
              if (dryRun) {
                note(`[dry-run] would CREATE tracker "${trackerTitle}" (label: tracking) and run \`/release-plan ${target}\` to enrich it.`);
              } else {
                const body = [
                  '## Goal', '',
                  `Track what ships in **${target}**, cut on the weekly stable release train.`, '',
                  '## Scope summary', '',
                  '_Auto-opened by the weekly stable train. Run `/release-plan '
                    + target + '` to enrich the scope manifest and the seed-bump section._', '',
                  '## Cut gate', '',
                  'This is an automated weekly stable cut. Scheduled train runs dispatch '
                    + '`release.yml` (channel=stable) automatically when `main` is green '
                    + '(latest scheduled nightly self-host); manual runs require '
                    + '`confirm_dispatch=true`. Open scope rolls forward — it never blocks the train.', '',
                  '## Cross-references', '',
                  '- Weekly stable train: `.github/workflows/release-train.yml`',
                  '- Convention: `docs/conventions/issue-naming.md` "Release tracking" / "Seed pinning"',
                  '- `/release-plan` skill: `.claude/commands/release-plan.md`',
                  '- Design: SFEP-0026 (`docs/proposals/0026-delivery-process.md`) WS-C',
                ].join('\n');
                const created = await github.rest.issues.create({
                  owner, repo, title: trackerTitle, labels: ['tracking'], body,
                });
                tracker = created.data;
                note(`Created tracker #${tracker.number} (${tracker.html_url}).`);
              }
            } else {
              note(`Tracker "${trackerTitle}" already open as #${tracker.number}.`);
            }
            if (tracker) {
              const hasTracking = (tracker.labels || []).some(l => (typeof l === 'string' ? l : l.name) === 'tracking');
              if (!hasTracking) {
                if (dryRun) {
                  note(`[dry-run] would ADD missing \`tracking\` label to tracker #${tracker.number}.`);
                } else {
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: tracker.number, labels: ['tracking'],
                  });
                  note(`Added missing \`tracking\` label to tracker #${tracker.number}.`);
                }
              }
            }

            // --- 5. Idempotent cadence comment --------------------------------
            // One comment per target window — re-runs for the same target do not
            // double-post.
            if (tracker) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: tracker.number, per_page: 100,
              });
              const already = comments.some(c => (c.body || '').includes(cadenceMarker));
              const rollFwd = openNextMinor.length
                ? openNextMinor.map(i => `#${i.number}`).join(', ')
                : '_none_';
              const gateLine = cutGateClear
                ? `✅ Cut gate clear — a green nightly self-host verified HEAD \`${headSha.slice(0, 8)}\`.`
                : `⛔ Cut gate NOT clear — no green nightly for HEAD \`${headSha.slice(0, 8)}\` yet; hold the cut.`;
              const dispatchLine = cutGateClear
                ? (isSchedule
                    ? `**Auto-dispatching.** This scheduled train run will cut the stable release (\`channel=stable bump=${bump}\` → \`${target}\`).`
                    : `**Ready to cut.** To dispatch the stable release (\`channel=stable bump=${bump}\` → \`${target}\`), re-run the **Release Train** workflow with \`confirm_dispatch=true\`.`)
                : `**Not cutting.** The train rolls forward; it will re-evaluate next cadence boundary once main is green.`;
              const cadenceBody = [
                `${cadenceMarker}`, '',
                `Weekly stable train boundary reached for **${target}**.`, '',
                gateLine, '',
                `Rolling forward (not blocking): ${rollFwd}`, '',
                dispatchLine,
              ].join('\n');
              if (dryRun) {
                note(`[dry-run] would ${already ? 'SKIP (already posted)' : 'POST'} the cadence comment on #${tracker.number}.`);
              } else if (already) {
                note(`Cadence comment for ${target} already on #${tracker.number}; skipping.`);
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: tracker.number, body: cadenceBody });
                note(`Posted cadence comment on #${tracker.number}.`);
              }
            }

            // --- 6. Cut decision ----------------------------------------------
            // Cut only when (a) the weekly cadence boundary has elapsed since the
            // last stable, and (b) a green nightly has verified current HEAD.
            // Timing sources:
            //   - schedule (Mon 09:00) — the cadence boundary itself;
            //   - workflow_run (a nightly finished) — re-evaluate so a HEAD-
            //     verified green nightly cuts promptly instead of waiting a week;
            //   - workflow_dispatch + confirm_dispatch — a deliberate off-clock cut.
            // On a scheduled/manual run whose HEAD is not yet nightly-verified we
            // DISPATCH a fresh nightly (if none is in-flight); its completion
            // re-triggers this workflow via workflow_run, which then cuts. The
            // workflow_run path never re-dispatches a nightly, so there is no
            // dispatch loop.
            async function daysSinceLastStable() {
              try {
                const rel = await github.rest.repos.getLatestRelease({ owner, repo });
                return (Date.now() - new Date(rel.data.published_at).getTime()) / 86400000;
              } catch (e) {
                return Infinity; // no stable release yet → cadence is due
              }
            }
            const cadenceDays = 6;
            const age = await daysSinceLastStable();
            const cadenceDue = confirmDispatch || age >= cadenceDays;
            note(`Days since last stable: ${age === Infinity ? 'none' : age.toFixed(1)} (cadence due: ${cadenceDue}).`);

            const shouldConsiderCut = isSchedule || isNightlyDone || confirmDispatch;
            if (!shouldConsiderCut) {
              note('Manual run without confirm_dispatch — surfaced readiness only.');
            } else if (!cadenceDue) {
              note(`Cadence not yet due (< ${cadenceDays} days since last stable) — not cutting.`);
            } else if (dryRun) {
              note(`[dry-run] would ${cutGateClear ? 'cut' : 'dispatch a fresh nightly and hold'} for ${target}.`);
            } else if (await tagExists(target)) {
              note(`Release tag ${target} already exists — skipping.`);
            } else if (cutGateClear) {
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'release.yml', ref: defaultBranch,
                inputs: { channel: 'stable', bump, dry_run: 'false' },
              });
              note(`Dispatched release.yml (channel=stable bump=${bump}) → ${target}.`);
              await postSlack(`:rocket: Sailfin release train dispatched ${target} (channel=stable bump=${bump}) — HEAD ${headSha.slice(0, 8)} verified green.\nTracker: ${tracker ? tracker.html_url : trackerTitle}\nRun: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`);
            } else if (isNightlyDone) {
              // A nightly just finished but HEAD is not (yet) verified green — main
              // likely advanced past it, or it failed. Do NOT re-dispatch from the
              // workflow_run path (loop guard); the next nightly re-evaluates.
              note(`Nightly finished but HEAD ${headSha.slice(0, 8)} is not verified green — holding; the next nightly will re-evaluate.`);
              await postSlack(`:warning: Sailfin release train holding ${target}. HEAD ${headSha.slice(0, 8)} has no green nightly yet.\nTracker: ${tracker ? tracker.html_url : trackerTitle}`);
            } else if (nightlyInFlight) {
              note(`HEAD not verified yet, but a nightly is already in-flight — holding for its completion.`);
            } else {
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'nightly-selfhost.yml', ref: defaultBranch,
              });
              note(`HEAD ${headSha.slice(0, 8)} has no nightly yet — dispatched a fresh nightly self-host; its completion will re-trigger the cut.`);
              await postSlack(`:hourglass_flowing_sand: Sailfin release train armed for ${target}. Dispatched a fresh nightly self-host for HEAD ${headSha.slice(0, 8)}; the cut fires when it goes green.\nTracker: ${tracker ? tracker.html_url : trackerTitle}`);
            }

            core.summary
              .addRaw(`## Release Train — ${target}\n\n` + summary.map(s => '- ' + s).join('\n'))
              .write();
