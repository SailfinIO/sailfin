name: Release (tag)

# The pinned seed version normally lives in `bootstrap.toml`
# (`[seed].version`) at the repo root. The build job reads that key from
# the tag's checkout and exports the resolved value as
# `steps.seed.outputs.seed_version`. Since older tags predate
# `bootstrap.toml`, the `seed_version` workflow input takes precedence when
# set — use it to retroactively rebuild any pre-`bootstrap.toml` tag
# (older tags carried a different seed-pin file, no longer read here). In-tree
# tags cut after `bootstrap.toml` landed can dispatch with a blank override.

env:
  # Tag to build/upload (e.g. v0.1.1)
  RELEASE_TAG: ${{ inputs.tag }}

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. v0.1.1-alpha.132)"
        required: true
        type: string
      seed_version:
        description: "Optional seed-version override (blank → read bootstrap.toml [seed].version from the tag checkout)."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build (e.g. v0.1.1-alpha.132)"
        required: true
      seed_version:
        description: "Optional seed-version override (blank → read bootstrap.toml [seed].version from the tag checkout). Required for tags older than `bootstrap.toml`."
        required: false
        default: ""

concurrency:
  group: "release-tag-${{ inputs.tag }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build + Package [${{ matrix.package_label }}]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26: adopted after the 2026-06-15 `macos-latest`
          # migration left macos-15 runners scarce (release jobs stalled
          # waiting for a host). These jobs produce the shipped macos-arm64
          # binaries (pinned as seeds); the nightly-selfhost canary has
          # been validating the triple-pass fixed point on macos-26, and PR
          # CI moved to it in the same change (#1409 dirent / #1410
          # child-env-linking fixes). The published binary's minimum
          # deployment target follows the macOS 26 SDK default.
          - os: macos-26
            package_label: macos-arm64
            clang: clang
            # 3-vCPU / 7GB hosted runner: 2 parallel test children is the
            # safe RAM budget (each child runs under the 8GB per-process
            # cap; see the test_jobs input in actions/sailfin-build).
            test_jobs: 2
          - os: ubuntu-24.04
            package_label: linux-x86_64
            clang: clang-18
            # 4-vCPU / 16GB hosted runner.
            test_jobs: 4

    steps:
      - name: Checkout repository (tag)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify tag checkout
        shell: bash
        run: |
          set -euo pipefail
          current="$(git describe --tags --exact-match)"
          if [ "$current" != "${RELEASE_TAG}" ]; then
            echo "[ci][error] expected ${RELEASE_TAG}, got $current" >&2
            exit 1
          fi

      - name: Resolve seed version (input override → bootstrap.toml)
        id: seed
        shell: bash
        env:
          INPUT_SEED_VERSION: ${{ inputs.seed_version }}
        run: |
          set -euo pipefail
          override="$(printf '%s' "$INPUT_SEED_VERSION" | tr -d '[:space:]')"
          if [ -n "$override" ]; then
            echo "[seed-pin] using seed $override (workflow input override)"
            pin="$override"
          else
            if [ ! -f bootstrap.toml ]; then
              echo "[seed-pin][error] tag ${RELEASE_TAG} predates bootstrap.toml." >&2
              echo "[seed-pin][error] re-run this workflow with the 'seed_version' input set." >&2
              exit 1
            fi
            pin="$(awk '
              /^\[[^]]+\]/ { section=$0 }
              section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
            ' bootstrap.toml)"
            if [ -z "$pin" ]; then
              echo "[seed-pin][error] bootstrap.toml has no [seed].version at tag ${RELEASE_TAG}" >&2
              exit 1
            fi
            echo "[seed-pin] using seed $pin from bootstrap.toml at ${RELEASE_TAG}"
          fi
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      - name: Install jq + LLVM tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install jq llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      # Slim release gate (#843, extended to stable tags): every release
      # tag — prerelease AND stable — is a mechanical version bump on a
      # main SHA that already passed full PR CI + push:main validation,
      # and a stable cut additionally clears the release-train's
      # green-nightly self-host gate (release-train.yml). So all release
      # legs build + package + smoke and delegate full-suite coverage to
      # main CI and the nightly self-host, rather than re-running the whole
      # suite here. The former stable-only `full` path re-ran the suite as
      # a belt-and-braces GA gate, but the macOS-arm64 full-suite leg grew
      # past the 120-minute job timeout and cancelled the cut; the coverage
      # it added is already provided by the gates above. `test_jobs` is
      # unused on this path (it only fed the retired full-suite run).
      - name: Build + test + package (via Makefile)
        uses: ./.github/actions/sailfin-build
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        with:
          target: ${{ matrix.package_label }}
          clang: ${{ matrix.clang }}
          seed_version: ${{ steps.seed.outputs.seed_version }}
          test_jobs: ${{ matrix.test_jobs }}
          mode: build-package

      # Smoke-test the built compiler end-to-end (compile + link + run a
      # real program). Together with the two version verifications below
      # this is the release-leg acceptance surface on the slim path.
      - name: Smoke-test built compiler (hello-world)
        shell: bash {0}
        run: |
          set -euo pipefail
          # The compiler self-applies its 8 GiB memory budget on Linux
          # (#1291) — no step-level ulimit needed.
          out="$(build/bin/sfn run examples/basics/hello-world.sfn)"
          echo "$out"
          if ! printf '%s' "$out" | grep -q "Hello, Sailfin!"; then
            echo "[ci][error] hello-world smoke failed: expected 'Hello, Sailfin!' in output" >&2
            exit 1
          fi

      - name: Verify compiler version matches tag
        shell: bash {0}
        run: |
          set -euo pipefail
          expected="${RELEASE_TAG#v}"
          file_version="$(sed -n 's/^version *= *"\(.*\)"/\1/p' compiler/capsule.toml)"
          if [ "$file_version" != "$expected" ]; then
            echo "[ci][error] compiler/capsule.toml has '$file_version', expected '$expected'" >&2
            exit 1
          fi
          actual="$(build/bin/sfn version | sed -n 's/.*sfn //p')"
          if [ "$actual" != "$expected" ]; then
            echo "[ci][error] built compiler reports '$actual', expected '$expected'" >&2
            exit 1
          fi

      - name: Verify installer payload version
        shell: bash {0}
        run: |
          set -euo pipefail
          expected="${RELEASE_TAG#v}"
          rm -rf _installer_check
          mkdir -p _installer_check
          tar -xzf "dist/installer-${{ matrix.package_label }}.tar.gz" -C _installer_check
          chmod +x _installer_check/bin/sfn || true
          actual="$(_installer_check/bin/sfn version | sed -n 's/.*sfn //p')"
          if [ "$actual" != "$expected" ]; then
            echo "[ci][error] installer contains compiler '$actual', expected '$expected'" >&2
            exit 1
          fi

      # --- Cross-compile Windows binary from Linux LLVM IR ---
      - name: Cache MinGW-w64 apt packages
        if: matrix.package_label == 'linux-x86_64'
        uses: actions/cache@v6
        with:
          path: ~/.cache/mingw-debs
          key: apt-mingw-w64-x86-64-${{ runner.os }}-v1

      - name: Install MinGW-w64 cross-compiler (Linux)
        if: matrix.package_label == 'linux-x86_64'
        run: |
          set -euo pipefail
          # Only the x86-64 C cross toolchain is used by `make
          # ci-cross-windows`; the `mingw-w64` metapackage pulls ~277 MB of
          # i686 / g++ / win32 packages this build never touches and which
          # stalled the Ubuntu/Azure mirror fetch (#1402). Install just
          # `gcc-mingw-w64-x86-64` and cache the resolved `.deb`s so a cache
          # hit skips the mirror; on a miss, download is bounded + retried.
          DEB_DIR="$HOME/.cache/mingw-debs"
          mkdir -p "$DEB_DIR"
          if ! find "$DEB_DIR" -maxdepth 1 -type f -name '*.deb' -print -quit | grep -q .; then
            for attempt in 1 2 3; do
              echo "[mingw] download attempt ${attempt}/3"
              if sudo timeout 300 apt-get update \
                && sudo timeout 300 apt-get install -y --no-install-recommends \
                     -o Acquire::Retries=3 \
                     -o Dir::Cache::archives="$DEB_DIR" \
                     --download-only gcc-mingw-w64-x86-64; then
                break
              fi
              if [ "${attempt}" = 3 ]; then
                echo "[mingw] download failed after 3 attempts" >&2
                exit 1
              fi
              echo "[mingw] attempt ${attempt} failed or timed out; backing off"
              sleep $((attempt * 15))
            done
            sudo rm -rf "$DEB_DIR/partial"
            sudo chown -R "$(id -u):$(id -g)" "$DEB_DIR"
          else
            deb_count="$(find "$DEB_DIR" -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d ' ')"
            echo "[mingw] cache hit: ${deb_count} package(s)"
          fi
          sudo dpkg -i "$DEB_DIR"/*.deb \
            || sudo apt-get install -y --no-install-recommends -f
          x86_64-w64-mingw32-gcc --version | head -1

      - name: Cross-compile for Windows (Linux)
        if: matrix.package_label == 'linux-x86_64'
        shell: bash {0}
        run: |
          set -euo pipefail
          make ci-cross-windows

      - name: Upload native artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-native-${{ matrix.package_label }}
          path: |
            dist/sailfin-native-${{ matrix.package_label }}-*.tar.gz
            dist/sailfin-native-${{ matrix.package_label }}-*.tar.gz.sha256
            dist/sailfin-native-${{ matrix.package_label }}-*.manifest.json
          if-no-files-found: error

      - name: Upload installer archive
        uses: actions/upload-artifact@v7
        with:
          name: release-installer-${{ matrix.package_label }}
          path: dist/installer-${{ matrix.package_label }}.tar.gz
          if-no-files-found: error

      - name: Upload Windows installer archive
        if: matrix.package_label == 'linux-x86_64'
        uses: actions/upload-artifact@v7
        with:
          name: release-installer-windows-x86_64
          path: dist/installer-windows-x86_64.tar.gz
          if-no-files-found: error

  upload:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (signing script + committed public key)
        uses: actions/checkout@v7
        with:
          # Pin to the released tag so the signing script and the committed
          # public key come from the same commit the binaries were built at
          # (the build job checks out this ref too) — matters for retroactive
          # rebuilds and key-rotation windows.
          ref: ${{ env.RELEASE_TAG }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "release-*"
          merge-multiple: true
          path: .

      - name: Normalize artifact layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find . -maxdepth 3 -type f -name 'sailfin-native-*.tar.gz' -exec mv -f {} dist/ \;
          find . -maxdepth 3 -type f -name 'sailfin-native-*.tar.gz.sha256' -exec mv -f {} dist/ \;
          find . -maxdepth 3 -type f -name 'sailfin-native-*.manifest.json' -exec mv -f {} dist/ \;
          find . -maxdepth 3 -type f -name 'installer-*.tar.gz' -exec mv -f {} dist/ \;

      - name: Prepare installer assets
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          while IFS= read -r -d '' payload; do
            label="$(basename "$payload" .tar.gz)"
            case "$label" in
              *linux-x86_64*)
                os="linux"
                arch="x86_64"
                ;;
              *macos-arm64*)
                os="macos"
                arch="arm64"
                ;;
              *windows-x86_64*)
                os="windows"
                arch="x86_64"
                ;;
              *)
                echo "unknown installer payload $label" >&2
                continue
                ;;
            esac
            installer_name="sailfin_${version}_${os}_${arch}.tar.gz"
            mv -f "$payload" "dist/${installer_name}"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "dist/${installer_name}" > "dist/${installer_name}.sha256"
            else
              shasum -a 256 "dist/${installer_name}" > "dist/${installer_name}.sha256"
            fi
          done < <(find dist -maxdepth 1 -type f -name 'installer-*.tar.gz' -print0)

      # Supply-chain root: publish a signed SHA256SUMS manifest over the release
      # assets so `sfn` can verify a fetched toolchain against the public key
      # embedded in the binary. Trust model: docs/release-signing.md, SFEP-0046 §3.5.
      # The self-verify inside the script fails the release if the CI signing key
      # and the committed public key drift apart.
      - name: Sign release manifest (SHA256SUMS)
        shell: bash
        env:
          SAILFIN_RELEASE_SIGNING_KEY: ${{ secrets.SAILFIN_RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          bash scripts/sign-release-manifest.sh dist

      - name: Remove existing assets (repair runs)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! command -v gh >/dev/null 2>&1; then
            echo "[ci][error] gh CLI not available on runner" >&2
            exit 1
          fi
          for f in dist/*; do
            name="$(basename "$f")"
            gh release delete-asset "${RELEASE_TAG}" "${name}" -y >/dev/null 2>&1 || true
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          make_latest: ${{ !contains(env.RELEASE_TAG, '-') }}
          files: |
            dist/sailfin-native-*.tar.gz
            dist/sailfin-native-*.tar.gz.sha256
            dist/sailfin-native-*.manifest.json
            dist/sailfin_*.tar.gz
            dist/sailfin_*.tar.gz.sha256
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

  notify-slack-failure:
    name: Notify Slack on release asset failure
    needs: [build, upload]
    if: failure()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Post Slack notification
        shell: bash
        env:
          SLACK_RELEASE_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_RELEASE_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          python3 - <<'PY' > /tmp/slack-payload.json
          import json
          import os
          tag = os.environ["RELEASE_TAG"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          print(json.dumps({
              "text": f":x: Sailfin release asset build/upload failed for {tag}.\\nRun: {run_url}"
          }))
          PY
          curl -fsS -X POST \
            -H 'Content-type: application/json' \
            --data @/tmp/slack-payload.json \
            "$SLACK_RELEASE_WEBHOOK_URL" >/dev/null || true

  notify-slack-success:
    name: Notify Slack on release published
    needs: [build, upload]
    if: success()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Post Slack notification
        shell: bash
        env:
          SLACK_RELEASE_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
          IS_PRERELEASE: ${{ contains(env.RELEASE_TAG, '-') }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_RELEASE_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          python3 - <<'PY' > /tmp/slack-payload.json
          import json
          import os
          tag = os.environ["RELEASE_TAG"]
          prerelease = os.environ.get("IS_PRERELEASE", "false") == "true"
          repo = os.environ["GITHUB_REPOSITORY"]
          rel_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/releases/tag/{tag}"
          if prerelease:
              text = f":package: Sailfin prerelease {tag} published with assets.\nRelease: {rel_url}"
          else:
              text = f":tada: Sailfin STABLE {tag} published with assets.\nRelease: {rel_url}"
          print(json.dumps({"text": text}))
          PY
          curl -fsS -X POST \
            -H 'Content-type: application/json' \
            --data @/tmp/slack-payload.json \
            "$SLACK_RELEASE_WEBHOOK_URL" >/dev/null || true
