# Build Quality gate (issue #781).
#
# Asserts the two structural contracts the cache + emit pipeline must
# uphold but which PR-time CI doesn't check directly:
#
#   1. Determinism. A second `sfn build -p compiler` pass against a
#      sibling work-dir must produce byte-identical artifacts and an
#      identical per-module `cache_key` set (via `--check-determinism`
#      from #779). The first-pass binary is the self-hosted compiler
#      produced by `make compile` earlier in the job, so any cache
#      regression that lands the same day surfaces here even before a
#      seed bump.
#   2. Cache effectiveness. The second pass runs WITH cache. A clean
#      no-source-change rerun must keep `cache.hit_rate` at or above
#      0.95 (via the `cache.hit_rate` field from #780). A drop below
#      that gate is the canonical signal for cache-key drift caused by
#      a non-canonical-artifact regression.
#
# Both gates were originally scoped as per-PR gates in #341 + #342; the
# architect verdict on #339 (locked decision Q4, 2026-05-06) bundled
# them into a single workflow that runs on `push: branches: [main]` plus
# a nightly cron — see #339 for the rationale (per-PR wall-time budget
# vs. signal-to-noise tradeoff). The failure-mode wiring (issue
# creation, PR comments) lands separately in #782; this workflow's
# permissions block is deliberately scoped to `contents: read` so the
# gate ships safely ahead of that work.
#
# Linux x86_64 only for now. macOS arm64 coverage is deferred until
# #613 closes — that epic tracks the exit-code corruption on macOS
# arm64 (suspected Bool/int ABI hazard across module boundaries) that
# would let this gate's `--check-determinism` failure paths exit 0 and
# silently pass. There is also a separate, independent macOS issue: the
# Mach-O linker embeds a per-link UUID (LC_UUID), so byte-for-byte
# binary equality isn't a stable determinism signal on macOS — see the
# `Fixed-point rebuild check` step in `.github/workflows/ci.yml` for
# the precedent (smoke-test instead of byte-cmp). When #613 closes,
# adding the `macos-arm64` matrix entry also needs an analogous
# byte-equality workaround for the determinism step.

name: Build Quality (determinism + cache hit-rate)

env:
  # Mirrors `.github/workflows/ci.yml`. Belt-and-suspenders pin so a
  # future change to the runtime default — or a caller that scrubs
  # env — can't silently regress this gate onto the malloc path.
  # See docs/build-performance.md → "Arena Allocator Default-On".
  SAILFIN_USE_ARENA: "1"

permissions:
  contents: read

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 05:00 UTC. Picks a slot before the existing
    # nightly-selfhost cron at 07:00 UTC so we don't double-tax the
    # runner pool, and keeps the two signals on independent schedules
    # for easier triage.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs: {}

concurrency:
  group: build-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-quality:
    name: Build quality (linux-x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # `gate_name` is the stable suffix consumed by `notify-failure` to
    # dedup regression issues. The `Identify failed gate` step always
    # writes one of `determinism`, `cache-hit-rate`, or `build-setup`
    # (the catch-all for failures upstream of the gates — seed setup,
    # `make compile`, first pass) so main-branch breakage of the gate
    # workflow itself still surfaces as a tracked regression rather
    # than passing without one.
    outputs:
      gate_name: ${{ steps.identify_failed_gate.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve seed version from .seed-version
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .seed-version ]; then
            echo "[seed-pin] .seed-version is missing from checkout" >&2
            exit 1
          fi
          pin="$(tr -d '[:space:]' < .seed-version)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] .seed-version is empty" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang + llvm + jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      # Cache priming for PR CI. This job runs on push:main, so the
      # caches it saves land in the default-branch scope that every PR
      # can restore from (GitHub scopes caches to the current branch +
      # base/default branch). Keys mirror `.github/actions/sailfin-build`
      # exactly (target=linux-x86_64) so the PR action's restore-keys
      # prefix-match them. See that action for the content-addressed
      # cache-key rationale.
      #
      # The seed is restored+saved here (harmless to the gates below).
      # The build cache is deliberately NOT restored here: this job's
      # determinism gate must build cold so a latent nondeterminism bug
      # can't be masked by warm cached artifacts. The build cache is
      # instead SAVED after the gates pass (save-only, no `if:`), so a
      # failed gate never poisons the cache PRs consume.
      - name: Restore seed cache
        uses: actions/cache@v4
        with:
          path: build/seed
          key: sailfin-seed-linux-x86_64-${{ steps.seed.outputs.seed_version }}

      - name: Fetch released seed compiler
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_VERSION: ${{ steps.seed.outputs.seed_version }}
        run: |
          set -euo pipefail
          if [ -x build/seed/bin/sailfin ] && build/seed/bin/sailfin version >/dev/null 2>&1; then
            echo "[ci] seed cache hit ($SEED_VERSION) — skipping fetch"
          else
            make fetch-seed SEED_VERSION="$SEED_VERSION"
          fi
          build/seed/bin/sailfin version

      - name: Self-host the compiler (make compile)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Memory cap matches .claude/rules/compiler-safety.md. Per
          # the rules: 8GB ceiling on any compiler invocation, so a
          # runaway compile can't take down the runner before the
          # job timeout fires.
          ulimit -v 8388608
          make compile \
            CLANG="${CLANG:-clang-18}" \
            SEED_NATIVE="build/seed/bin/sailfin"
          build/native/sailfin version

      - name: First pass (warm the cache)
        shell: bash
        run: |
          set -euo pipefail
          ulimit -v 8388608
          # Cold build into a dedicated work-dir. Populates
          # `build/cache/v1` with every content-addressed entry the
          # determinism pass needs in step 4. The BuildReport JSON is
          # captured but unused — the gate assertions read pass2.json,
          # which contains the warm-cache run plus the determinism
          # diff. Keeping pass1.json on disk makes failures easier to
          # bisect after the fact (the diff of pass1.cache vs.
          # pass2.cache is the smoking gun for cache-key drift).
          build/native/sailfin build -p compiler \
            --work-dir build/det-pass1 --json | tee pass1.json
          echo ""
          echo "[pass1] cache summary:"
          jq -s '.[0].cache' pass1.json

      - name: Determinism gate (sfn build --check-determinism)
        id: determinism_gate
        shell: bash
        run: |
          set -euo pipefail
          ulimit -v 8388608
          # Second pass against a sibling `--work-dir`. The
          # `--check-determinism` flag internally re-invokes this
          # compiler against a sibling-of-the-sibling work-dir, snapshots
          # the per-capsule manifest sidecars, sha256s both linked
          # binaries, and emits a structured diff on stdout
          # (cli_main.sfn::_do_determinism_check + build_report.sfn::
          # determinism_diff_to_json).
          #
          # In --json mode the inner pass's output is silenced so this
          # stream contains exactly two JSON objects on its own lines:
          # the outer BuildReport (used by the next step for hit-rate
          # assertion) and the determinism diff (printed for triage).
          # Non-zero exit on mismatch — `set -o pipefail` (already on
          # via `set -euo pipefail`) makes tee propagate the failure
          # even though tee itself always returns 0.
          #
          # Caveat: the compiler self-host's `[capsule].name = "sailfin"`
          # is single-segment, so `_emit_capsule_artifact_sidecar`
          # skips sidecar emission and the determinism check degrades
          # to a binary-sha256 comparison only (cli_main.sfn:343-350).
          # Mismatches still fail the gate, but `module_diffs` will be
          # empty — triage via the printed `binary_sha256_{a,b}` and
          # `binary_path_{a,b}` instead. Foreign `-p` builds with
          # scope/name form get full per-module diffs.
          build/native/sailfin build -p compiler \
            --check-determinism \
            --work-dir build/det-pass2 \
            --json | tee pass2.json
          echo ""
          echo "[determinism] diff summary:"
          jq -s '.[] | select(.check == "determinism")' pass2.json

      - name: Cache hit-rate gate (>= 0.95 on warm second pass)
        id: hit_rate_gate
        shell: bash
        run: |
          set -euo pipefail
          # pass2.json contains the outer-pass BuildReport followed by
          # the determinism-diff object. The BuildReport is the only
          # one with `cache.hit_rate`; `jq -s` slurps both objects into
          # an array, `.[0]` picks the BuildReport.
          observed=$(jq -s '.[0].cache.hit_rate' pass2.json)
          echo "[hit-rate] observed cache.hit_rate: ${observed} (threshold: 0.95)"
          ok=$(jq -s '.[0].cache.hit_rate >= 0.95' pass2.json)
          if [ "$ok" != "true" ]; then
            echo "[hit-rate][error] cache hit rate below threshold (${observed} < 0.95)" >&2
            echo "[hit-rate][error] full cache stats:" >&2
            jq -s '.[0].cache' pass2.json >&2
            exit 1
          fi
          echo "[hit-rate] gate passed"

      # Save the validated, fully-warm build cache for PR CI to restore.
      # Save-only (no `if:`) so it runs only when every prior step —
      # including both gates — succeeded; a failed gate leaves the
      # previous (good) cache in place. `make compile` + both
      # determinism passes have populated `build/cache/` by now. The key
      # matches `.github/actions/sailfin-build`'s exact key; if it
      # already exists (no source change since the last main run) the
      # save is a no-op.
      - name: Save build cache for PR CI
        uses: actions/cache/save@v4
        with:
          path: build/cache
          key: sailfin-buildcache-linux-x86_64-${{ steps.seed.outputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'compiler/capsule.toml', '.seed-version') }}

      # Failure-mode wiring (issue #782). Identifying which gate failed
      # has to happen in the gate job (only it can see per-step
      # `conclusion`), and the result is exported as a job output so the
      # downstream `notify-failure` job can open or append the right
      # dedup'd regression issue. When neither gate step ran (the
      # failure happened upstream — seed fetch, `make compile`, first
      # pass) the catch-all `build-setup` suffix is emitted so
      # main-branch breakage of the workflow itself still surfaces as
      # a tracked regression.
      - name: Identify failed gate
        id: identify_failed_gate
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.determinism_gate.conclusion }}" = "failure" ]; then
            echo "name=determinism" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.hit_rate_gate.conclusion }}" = "failure" ]; then
            echo "name=cache-hit-rate" >> "$GITHUB_OUTPUT"
          else
            echo "name=build-setup" >> "$GITHUB_OUTPUT"
          fi

      # Upload both pass artifacts on failure so `notify-failure` can
      # embed a diff excerpt in the regression-issue body. The action
      # tolerates missing files (e.g. failure before pass1 ran) via
      # `if-no-files-found: warn`.
      - name: Upload pass artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-quality-passes
          path: |
            pass1.json
            pass2.json
          if-no-files-found: warn
          retention-days: 14

  # Failure-mode job (issue #782). Runs only when `build-quality` fails.
  # Elevated permissions are scoped to this job alone so the gate job
  # itself stays `contents: read` (architect verdict on #339 Q4).
  #
  # Responsibilities:
  #   1. Open or append a dedup'd regression issue tagged
  #      `priority:critical`, `area:architecture`, and the stable marker
  #      `build-quality-regression`. Title prefix
  #      `build-quality regression:` + gate-name suffix lets later runs
  #      append a comment rather than open a duplicate.
  #   2. On `push: main` only, look up the merging PR (`/commits/{sha}/
  #      pulls`) and post a comment linking the regression issue + the
  #      failing run. `schedule:` and `workflow_dispatch:` runs are not
  #      tied to a single merging PR, so they skip the PR side-effect.
  #
  # Triage runbook lives at `docs/runbooks/build-quality.md`.
  notify-failure:
    name: Open regression issue + PR comment on failure
    needs: build-quality
    if: failure() && needs.build-quality.result == 'failure'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      GATE_NAME: ${{ needs.build-quality.outputs.gate_name }}
      FAIL_SHA: ${{ github.sha }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      EVENT_NAME: ${{ github.event_name }}
      REF: ${{ github.ref }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download pass artifacts (best-effort)
        uses: actions/download-artifact@v8
        with:
          name: build-quality-passes
          path: build-quality-passes
        continue-on-error: true

      - name: Build diff excerpt
        id: excerpt
        shell: bash
        run: |
          set -euo pipefail
          # Cap the embedded diff at ~50 lines per issue scope. The full
          # JSON is preserved as the workflow artifact (14-day retention),
          # so triage can pull the rest from there. Markers below let the
          # next run's dedup-append step trim or re-render the excerpt.
          excerpt_file="excerpt.md"
          : > "$excerpt_file"
          gate="${GATE_NAME:-build-setup}"
          # Only pass2.json contributes to the embedded excerpt
          # (determinism diff lives there, and so does the BuildReport
          # the hit-rate gate reads from). pass1.json is still
          # uploaded as a workflow artifact for offline triage.
          pass2="build-quality-passes/pass2.json"
          case "$gate" in
            determinism)
              echo "<!-- gate:determinism -->" >> "$excerpt_file"
              echo '```json' >> "$excerpt_file"
              if [ -f "$pass2" ]; then
                # The determinism object is the second JSON value in
                # pass2.json (the first is the outer BuildReport).
                jq -s '.[] | select(.check == "determinism")' "$pass2" \
                  | head -n 50 >> "$excerpt_file" || true
              else
                echo "(pass2.json artifact missing — see job log)" >> "$excerpt_file"
              fi
              echo '```' >> "$excerpt_file"
              ;;
            cache-hit-rate)
              echo "<!-- gate:cache-hit-rate -->" >> "$excerpt_file"
              echo '```json' >> "$excerpt_file"
              if [ -f "$pass2" ]; then
                jq -s '.[0].cache' "$pass2" | head -n 50 >> "$excerpt_file" || true
              else
                echo "(pass2.json artifact missing — see job log)" >> "$excerpt_file"
              fi
              echo '```' >> "$excerpt_file"
              ;;
            *)
              echo "<!-- gate:build-setup -->" >> "$excerpt_file"
              echo "_No gate-level diff captured: the failure occurred before either gate ran (seed fetch, \`make compile\`, or first-pass build)._" >> "$excerpt_file"
              ;;
          esac
          echo "file=$excerpt_file" >> "$GITHUB_OUTPUT"
          echo "gate=$gate" >> "$GITHUB_OUTPUT"

      - name: Open or append regression issue
        id: regression_issue
        shell: bash
        run: |
          set -euo pipefail
          gate="${{ steps.excerpt.outputs.gate }}"
          title="build-quality regression: ${gate}"
          excerpt="$(cat "${{ steps.excerpt.outputs.file }}")"

          # Dedup anchor is the `build-quality-regression` label plus
          # exact title equality. List all open issues with the marker
          # label and filter by title in jq — that avoids both gh's
          # quoting quirks around `--search "in:title ..."` and the
          # risk of a substring match shadowing a sibling gate's issue.
          existing="$(gh issue list \
            --repo "$REPO" \
            --state open \
            --label build-quality-regression \
            --limit 100 \
            --json number,title \
            --jq "[.[] | select(.title == \"${title}\")] | .[0].number // empty")"

          {
            echo "**Failure run:** ${RUN_URL}"
            echo "**Commit:** \`${FAIL_SHA}\`"
            echo "**Event:** \`${EVENT_NAME}\` on \`${REF}\`"
            echo "**Gate:** \`${gate}\`"
            echo ""
            echo "${excerpt}"
          } > regression-body.md

          if [ -n "$existing" ]; then
            echo "[notify] appending comment to existing regression issue #${existing}"
            gh issue comment "$existing" --repo "$REPO" --body-file regression-body.md
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            # New issue: full body starts with the human-readable
            # description, then the per-failure block above.
            {
              echo "# build-quality regression: ${gate}"
              echo ""
              echo "The \`build-quality.yml\` gate failed on \`${gate}\`. This issue tracks the regression and aggregates additional failures via comments — see \`docs/runbooks/build-quality.md\` for the triage runbook (reproduce locally, bisect, file a \`seed-blocker\`-labeled fix issue)."
              echo ""
              echo "## Latest failure"
              echo ""
              cat regression-body.md
            } > regression-new-body.md
            new_number="$(gh issue create \
              --repo "$REPO" \
              --title "$title" \
              --label "priority:critical" \
              --label "area:architecture" \
              --label "build-quality-regression" \
              --body-file regression-new-body.md \
              | awk -F/ '/^https:/{print $NF}')"
            echo "[notify] opened new regression issue #${new_number}"
            echo "number=$new_number" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      # Per scope: PR comment only on `push: main` events. Schedule and
      # manual dispatches aren't tied to a single merging PR.
      - name: Comment on merging PR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail
          issue_number="${{ steps.regression_issue.outputs.number }}"
          # `/commits/{sha}/pulls` returns every PR the commit appears
          # in; for a merge to main the first entry is the merging PR.
          # gh exits 0 even when the array is empty, so guard against
          # missing data instead of relying on exit codes.
          pr_number="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/commits/${FAIL_SHA}/pulls" \
            --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            echo "[notify] no merging PR found for ${FAIL_SHA}; skipping PR comment"
            exit 0
          fi
          echo "[notify] commenting on merging PR #${pr_number}"
          {
            echo "build-quality gate failed on this merge: \`${GATE_NAME:-build-setup}\`."
            echo ""
            echo "- Tracking issue: #${issue_number}"
            echo "- Failing run: ${RUN_URL}"
            echo "- Runbook: \`docs/runbooks/build-quality.md\`"
          } > pr-comment.md
          gh pr comment "$pr_number" --repo "$REPO" --body-file pr-comment.md
