# Build Quality gate (issue #781).
#
# Asserts the two structural contracts the cache + emit pipeline must
# uphold but which PR-time CI doesn't check directly:
#
#   1. Determinism. A second `sfn build -p compiler` pass against a
#      sibling work-dir must produce byte-identical artifacts and an
#      identical per-module `cache_key` set (via `--check-determinism`
#      from #779). The first-pass binary is the self-hosted compiler
#      produced by `make compile` earlier in the job, so any cache
#      regression that lands the same day surfaces here even before a
#      seed bump.
#   2. Cache effectiveness. The second pass runs WITH cache. A clean
#      no-source-change rerun must keep `cache.hit_rate` at or above
#      0.95 (via the `cache.hit_rate` field from #780). A drop below
#      that gate is the canonical signal for cache-key drift caused by
#      a non-canonical-artifact regression.
#
# Both gates were originally scoped as per-PR gates in #341 + #342; the
# architect verdict on #339 (locked decision Q4, 2026-05-06) bundled
# them into a single workflow that runs on `push: branches: [main]` plus
# a nightly cron — see #339 for the rationale (per-PR wall-time budget
# vs. signal-to-noise tradeoff). The failure-mode wiring (issue
# creation, PR comments) lands separately in #782; this workflow's
# permissions block is deliberately scoped to `contents: read` so the
# gate ships safely ahead of that work.
#
# Linux x86_64 only for now. macOS arm64 coverage is deferred until
# #613 closes — that epic tracks the exit-code corruption on macOS
# arm64 (suspected Bool/int ABI hazard across module boundaries) that
# would let this gate's `--check-determinism` failure paths exit 0 and
# silently pass. There is also a separate, independent macOS issue: the
# Mach-O linker embeds a per-link UUID (LC_UUID), so byte-for-byte
# binary equality isn't a stable determinism signal on macOS — see the
# `Fixed-point rebuild check` step in `.github/workflows/ci.yml` for
# the precedent (smoke-test instead of byte-cmp). When #613 closes,
# adding the `macos-arm64` matrix entry also needs an analogous
# byte-equality workaround for the determinism step.

name: Build Quality (determinism + cache hit-rate)

env:
  # Mirrors `.github/workflows/ci.yml`. Belt-and-suspenders pin so a
  # future change to the runtime default — or a caller that scrubs
  # env — can't silently regress this gate onto the malloc path.
  # See docs/proposals/0006-build-architecture.md → "Arena Allocator Default-On".
  SAILFIN_USE_ARENA: "1"

permissions:
  contents: read

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 05:00 UTC. Picks a slot before the existing
    # nightly-selfhost cron at 07:00 UTC so we don't double-tax the
    # runner pool, and keeps the two signals on independent schedules
    # for easier triage.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs: {}

# Concurrency is scoped per-job (below), not workflow-wide, so the two jobs
# get different supersede semantics (SFN-395). On `main`, `github.ref` is
# constant (`refs/heads/main`), so a single workflow-level group with
# `cancel-in-progress: true` cancelled the previous still-running run on every
# back-to-back merge. That is fine for the determinism/hit-rate gate (only the
# latest main matters for that signal) but wrong for the `test-bin-baseline`
# warmer, which must run to completion so its `Save test-bin cache` step lands
# — a mid-warm cancel wastes ~40-50 min and leaves the default-branch test-bin
# cache stale for PRs to consume. Each job therefore declares its own
# `concurrency:` block.

jobs:
  build-quality:
    name: Build quality (linux-x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Determinism + cache-hit-rate gate: only the latest main commit's signal
    # matters, so a newer run may supersede an in-flight one (SFN-395).
    concurrency:
      group: build-quality-gate-${{ github.ref }}
      cancel-in-progress: true
    # `gate_name` is the stable suffix consumed by `notify-failure` to
    # dedup regression issues. The `Identify failed gate` step always
    # writes one of `determinism`, `cache-hit-rate`, or `build-setup`
    # (the catch-all for failures upstream of the gates — seed setup,
    # `make compile`, first pass) so main-branch breakage of the gate
    # workflow itself still surfaces as a tracked regression rather
    # than passing without one.
    outputs:
      gate_name: ${{ steps.identify_failed_gate.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version from bootstrap.toml
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bootstrap.toml ]; then
            echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
            exit 1
          fi
          pin="$(awk '
            /^\[[^]]+\]/ { section=$0 }
            section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
          ' bootstrap.toml)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang + llvm + jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      # Cache priming for PR CI. This job runs on push:main, so the
      # caches it saves land in the default-branch scope that every PR
      # can restore from (GitHub scopes caches to the current branch +
      # base/default branch). Keys mirror `.github/actions/sailfin-build`
      # exactly (target=linux-x86_64) so the PR action's restore-keys
      # prefix-match them. See that action for the content-addressed
      # cache-key rationale.
      #
      # The seed is restored+saved here (harmless to the gates below).
      # The build cache is deliberately NOT restored here: this job's
      # determinism gate must build cold so a latent nondeterminism bug
      # can't be masked by warm cached artifacts. The build cache is
      # instead SAVED after the gates pass (save-only, no `if:`), so a
      # failed gate never poisons the cache PRs consume.
      - name: Restore seed cache
        uses: actions/cache@v6
        with:
          path: build/toolchains/seed
          key: sailfin-seed-store-linux-x86_64-${{ steps.seed.outputs.seed_version }}

      - name: Fetch released seed compiler
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_VERSION: ${{ steps.seed.outputs.seed_version }}
        run: |
          set -euo pipefail
          if [ -x build/toolchains/seed/bin/sfn ] && build/toolchains/seed/bin/sfn version >/dev/null 2>&1; then
            echo "[ci] seed cache hit ($SEED_VERSION) — skipping fetch"
          else
            make fetch-seed SEED_VERSION="$SEED_VERSION"
          fi
          build/toolchains/seed/bin/sfn version

      - name: Self-host the compiler (make compile)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # No step-level ulimit: since seed 0.7.0-alpha.33 the
          # compiler self-applies an 8 GiB RLIMIT_AS at startup
          # (#1291), so a runaway compile can't take down the runner.
          make compile \
            CLANG="${CLANG:-clang-18}" \
            SEED_NATIVE="build/toolchains/seed/bin/sfn"
          build/bin/sfn version

      - name: First pass (warm the cache)
        shell: bash
        run: |
          set -euo pipefail
          # Cold build into a dedicated work-dir. Populates
          # `build/cache/v2` with every content-addressed entry the
          # determinism pass needs in step 4. The BuildReport JSON is
          # captured but unused — the gate assertions read pass2.json,
          # which contains the warm-cache run plus the determinism
          # diff. Keeping pass1.json on disk makes failures easier to
          # bisect after the fact (the diff of pass1.cache vs.
          # pass2.cache is the smoking gun for cache-key drift).
          build/bin/sfn build -p compiler \
            --work-dir build/det-pass1 --json | tee pass1.json
          echo ""
          echo "[pass1] cache summary:"
          jq -s '.[0].cache' pass1.json

      - name: Determinism gate (sfn build --check-determinism)
        id: determinism_gate
        shell: bash
        run: |
          set -euo pipefail
          # Second pass against a sibling `--work-dir`. The
          # `--check-determinism` flag internally re-invokes this
          # compiler against a sibling-of-the-sibling work-dir, snapshots
          # the per-capsule manifest sidecars, sha256s both linked
          # binaries, and emits a structured diff on stdout
          # (cli_main.sfn::_do_determinism_check + build_report.sfn::
          # determinism_diff_to_json).
          #
          # In --json mode the inner pass's output is silenced so this
          # stream contains exactly two JSON objects on its own lines:
          # the outer BuildReport (used by the next step for hit-rate
          # assertion) and the determinism diff (printed for triage).
          # Non-zero exit on mismatch — `set -o pipefail` (already on
          # via `set -euo pipefail`) makes tee propagate the failure
          # even though tee itself always returns 0.
          #
          # Caveat: the compiler self-host's `[capsule].name = "sailfin"`
          # is single-segment, so `_emit_capsule_artifact_sidecar`
          # skips sidecar emission and the determinism check degrades
          # to a binary-sha256 comparison only (cli_main.sfn:343-350).
          # Mismatches still fail the gate, but `module_diffs` will be
          # empty — triage via the printed `binary_sha256_{a,b}` and
          # `binary_path_{a,b}` instead. Foreign `-p` builds with
          # scope/name form get full per-module diffs.
          build/bin/sfn build -p compiler \
            --check-determinism \
            --work-dir build/det-pass2 \
            --json | tee pass2.json
          echo ""
          echo "[determinism] diff summary:"
          jq -s '.[] | select(.check == "determinism")' pass2.json

      - name: Cache hit-rate gate (>= 0.95 on warm second pass)
        id: hit_rate_gate
        shell: bash
        run: |
          set -euo pipefail
          # pass2.json contains the outer-pass BuildReport followed by
          # the determinism-diff object. The BuildReport is the only
          # one with `cache.hit_rate`; `jq -s` slurps both objects into
          # an array, `.[0]` picks the BuildReport.
          observed=$(jq -s '.[0].cache.hit_rate' pass2.json)
          echo "[hit-rate] observed cache.hit_rate: ${observed} (threshold: 0.95)"
          ok=$(jq -s '.[0].cache.hit_rate >= 0.95' pass2.json)
          if [ "$ok" != "true" ]; then
            echo "[hit-rate][error] cache hit rate below threshold (${observed} < 0.95)" >&2
            echo "[hit-rate][error] full cache stats:" >&2
            jq -s '.[0].cache' pass2.json >&2
            exit 1
          fi
          echo "[hit-rate] gate passed"

      # Save the validated, fully-warm build cache for PR CI to restore.
      # Save-only (no `if:`) so it runs only when every prior step —
      # including both gates — succeeded; a failed gate leaves the
      # previous (good) cache in place. `make compile` + both
      # determinism passes have populated `build/cache/` by now. The key
      # matches `.github/actions/sailfin-build`'s exact key; if it
      # already exists (no source change since the last main run) the
      # save is a no-op.
      - name: Save build cache for PR CI
        uses: actions/cache/save@v6
        with:
          path: build/cache
          key: sailfin-buildcache-linux-x86_64-${{ steps.seed.outputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'compiler/capsule.toml', 'bootstrap.toml') }}

      # Failure-mode wiring (issue #782). Identifying which gate failed
      # has to happen in the gate job (only it can see per-step
      # `conclusion`), and the result is exported as a job output so the
      # downstream `notify-failure` job can open or append the right
      # dedup'd regression issue. When neither gate step ran (the
      # failure happened upstream — seed fetch, `make compile`, first
      # pass) the catch-all `build-setup` suffix is emitted so
      # main-branch breakage of the workflow itself still surfaces as
      # a tracked regression.
      - name: Identify failed gate
        id: identify_failed_gate
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.determinism_gate.conclusion }}" = "failure" ]; then
            echo "name=determinism" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.hit_rate_gate.conclusion }}" = "failure" ]; then
            echo "name=cache-hit-rate" >> "$GITHUB_OUTPUT"
          else
            echo "name=build-setup" >> "$GITHUB_OUTPUT"
          fi

      # Upload both pass artifacts on failure so `notify-failure` can
      # embed a diff excerpt in the regression-issue body. The action
      # tolerates missing files (e.g. failure before pass1 ran) via
      # `if-no-files-found: warn`.
      - name: Upload pass artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-quality-passes
          path: |
            pass1.json
            pass2.json
          if-no-files-found: warn
          retention-days: 14

  # Per-test binary cache baseline producer (#1233, sequencing step 5 of
  # docs/proposals/0011-ci-test-speed.md). The PR build action
  # (.github/actions/sailfin-build) restores `build/cache/test-bin` under
  # the `sailfin-testbin-...` key, but until this job nothing populated
  # it: the `build-quality` gate above runs no tests, and the nightly
  # `make check` runs with `--no-test-cache`. This job runs the full
  # `.sfn` suite with the test-bin cache ENABLED and saves
  # `build/cache/test-bin` into the default-branch cache scope, so a PR's
  # first run hits for every unchanged test. Cross-commit hits work
  # because the per-test binary cache identity is the commit-stable
  # capsule version (#1233 compiler change), so a baseline cut at one
  # commit warms a PR built at another.
  #
  # Independent of the determinism + cache.hit_rate gates above (those are
  # untouched): this job has no cold-build requirement, so it restores both
  # the warm module-IR cache AND its own prior test-bin cache (SFN-431) and
  # builds INCREMENTALLY — recompiling only test binaries whose source
  # changed and hitting the rest, instead of recompiling the whole suite
  # cold on every merge. The save is gated on a green suite (save-only step,
  # no `if:`, runs only when every prior step succeeded) so a failing
  # baseline can never poison the cache PRs consume — the previous good
  # cache stays in place.
  #
  # Linux x86_64 only for now (mirrors the gate job); macOS cache tuning
  # is deferred (#1233 Out:). The full-suite `make check` / determinism
  # gates remain the cold-build correctness backstop — this cache is read
  # only by the `sfn test` runner, never by those gates.
  test-bin-baseline:
    name: Warm test-bin cache (linux-x86_64)
    runs-on: ubuntu-24.04
    # Cache producer: never cancel in-progress (SFN-395). A mid-warm cancel
    # skips `Save test-bin cache`, so back-to-back merges could otherwise leave
    # the default-branch test-bin cache stale for PRs. A distinct group from the
    # gate job keeps the gate's supersede-latest semantics from reaching here.
    # Runs keyed by `github.ref` serialize (one warmer at a time on main) and
    # each completes its save; if sources are unchanged the save is a no-op
    # (the content-addressed key already exists).
    concurrency:
      group: build-quality-testbin-${{ github.ref }}
      cancel-in-progress: false
    # The warm step runs the whole `.sfn` suite INCREMENTALLY: the
    # `Restore test-bin cache` step above restores this job's own prior
    # test-bin cache, so `make test` recompiles only the test binaries whose
    # source changed and hits the rest, then saves a fresh, complete cache
    # (SFN-431 — this reverses the earlier cold-producer choice; the cold
    # build was producer hygiene, never a soundness requirement, which
    # belongs only to the `build-quality` determinism gate). The suite runs
    # in ONE parallel pool (`make test` sizes its `--jobs` budget to the
    # runner via scripts/detect_test_jobs.sh), not the old serial-shard `for`
    # loop whose ~53-min cold floor (shards run one-at-a-time, files serial
    # within each) kept tipping past the cap and leaving the cache unsaved,
    # so the next run paid the cold cost again (SFN-394).
    #
    # `timeout-minutes` stays at 90 as a hung-pool backstop, NOT the suite's
    # wall-time budget. The incremental warmer should finish in minutes on a
    # typical merge, but the first warm after a compiler-source change (which
    # rolls the content-addressed test-bin key and forces a broader recompile)
    # still approaches the historical cold ceiling — the 4-core `ubuntu-24.04`
    # cold full suite was observed at 56-58 min (killed mid-e2e under the old
    # 60-min cap before PR #2492 raised it to 90). Keep the headroom for that
    # path plus the retry-once flake path (#892); revisit lowering it once a
    # warm run has been measured in the run logs (SFN-431 Scope). See
    # docs/proposals/0011-ci-test-speed.md.
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve seed version from bootstrap.toml
        id: seed
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f bootstrap.toml ]; then
            echo "[seed-pin] bootstrap.toml is missing from checkout" >&2
            exit 1
          fi
          pin="$(awk '
            /^\[[^]]+\]/ { section=$0 }
            section == "[seed]" && /^version[[:space:]]*=/ { gsub(/"/, "", $3); print $3; exit }
          ' bootstrap.toml)"
          if [ -z "$pin" ]; then
            echo "[seed-pin] bootstrap.toml [seed].version is empty or missing" >&2
            exit 1
          fi
          echo "[seed-pin] using seed $pin"
          echo "seed_version=$pin" >> "$GITHUB_OUTPUT"

      - name: Install clang + llvm + jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 jq
          echo "CLANG=clang-18" >> "$GITHUB_ENV"

      - name: Restore seed cache
        uses: actions/cache@v6
        with:
          path: build/toolchains/seed
          key: sailfin-seed-store-linux-x86_64-${{ steps.seed.outputs.seed_version }}

      - name: Fetch released seed compiler
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_VERSION: ${{ steps.seed.outputs.seed_version }}
        run: |
          set -euo pipefail
          if [ -x build/toolchains/seed/bin/sfn ] && build/toolchains/seed/bin/sfn version >/dev/null 2>&1; then
            echo "[ci] seed cache hit ($SEED_VERSION) — skipping fetch"
          else
            make fetch-seed SEED_VERSION="$SEED_VERSION"
          fi
          build/toolchains/seed/bin/sfn version

      # Warm module-IR cache for a fast compile. Unlike the determinism
      # gate, this job has no cold-build requirement, so restoring is safe
      # and desirable. Keys mirror `.github/actions/sailfin-build`.
      - name: Restore build cache (content-addressed module IR)
        uses: actions/cache@v6
        with:
          path: build/cache
          key: sailfin-buildcache-linux-x86_64-${{ steps.seed.outputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'compiler/capsule.toml', 'bootstrap.toml') }}
          restore-keys: |
            sailfin-buildcache-linux-x86_64-${{ steps.seed.outputs.seed_version }}-
            sailfin-buildcache-linux-x86_64-

      # Restore this job's OWN prior test-bin cache so the warm step below
      # recompiles only test binaries whose source changed and hits the rest
      # (SFN-431). The warmer is this cache's producer, but it has no
      # cold-build correctness requirement — that invariant belongs only to
      # the determinism gate in the `build-quality` job above, which builds
      # the *compiler* cold (`--check-determinism`) and reads test binaries
      # never (docs/proposals/0011-ci-test-speed.md: the test-bin cache is
      # "read only by the runner" and the full-suite gate cold-builds test
      # binaries via `--no-test-cache`). A cross-commit restore can never
      # produce a *wrong* binary: each per-test entry is content-addressed by
      # the commit-stable capsule version + source content (#1233), so a
      # changed test file rolls its own entry's identity and misses → recompile.
      # RESTORE-ONLY (`actions/cache/restore`, not `actions/cache`): the sole
      # save is the explicit `Save test-bin cache for PR CI` step below, which
      # is gated on a green suite so a failed baseline can't poison the cache.
      # A combined `actions/cache` would add a post-job save that runs on
      # failure too, defeating that guard. Keys mirror the module-IR restore
      # above and the PR action's `sailfin-testbin-...` key exactly, so the
      # exact-key hit lands on an unchanged tree and the prefix `restore-keys`
      # fall back to the most recent prior baseline after a source change.
      - name: Restore test-bin cache (per-test linked binaries)
        uses: actions/cache/restore@v6
        with:
          path: build/cache/test-bin
          key: sailfin-testbin-linux-x86_64-${{ steps.seed.outputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'runtime/capsule.toml', 'runtime/ir/**', 'compiler/capsule.toml', 'bootstrap.toml') }}
          restore-keys: |
            sailfin-testbin-linux-x86_64-${{ steps.seed.outputs.seed_version }}-
            sailfin-testbin-linux-x86_64-

      - name: Self-host the compiler (make compile)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          make compile \
            CLANG="${CLANG:-clang-18}" \
            SEED_NATIVE="build/toolchains/seed/bin/sfn"
          build/bin/sfn version

      # Run the full `.sfn` suite in ONE parallel pool with the test-bin
      # cache ENABLED (no `--no-test-cache`), populating
      # `build/cache/test-bin/v<schema>`. `make test` walks the same
      # unit+integration+e2e+capsules union the old serial-shard `for` loop
      # covered (shard-cover parity, `sfn dev shard cover`), so no coverage
      # is lost, and it sizes its `--jobs` budget to the runner's CPU/RAM
      # (scripts/detect_test_jobs.sh) instead of running shards one-at-a-time
      # with serial files inside each — the ~53-min cold floor this job kept
      # hitting (SFN-394). The saved cache is content-addressed by the
      # commit-stable capsule version (#1233), so entries this pass produces
      # are byte-identical to what a PR's `sfn test` / `sfn dev shard run`
      # looks up. Retry-once mirrors the PR action's #892 flake mitigation so
      # one non-deterministic codegen flake doesn't skip the save; the retry
      # reruns against the now-warm test-bin cache, so it is cheap. A
      # persistent failure still fails → no save.
      - name: Warm test-bin cache (full suite, parallel, cache enabled)
        shell: bash
        run: |
          set -euo pipefail
          run_suite() { make test; }
          if ! run_suite; then
            echo "::warning title=test flake (likely #892)::suite failed on attempt 1; retrying once."
            echo "[warm] retrying suite once (attempt 2/2) — see #892"
            run_suite
          fi

      # Save the warmed test-bin cache for PR CI to restore. Save-only (no
      # `if:`) so it runs only when every prior step — including the suite
      # — succeeded; a failed baseline leaves the previous good cache in
      # place (no poisoning). Key matches the PR action's
      # `sailfin-testbin-...` key exactly; if it already exists (no source
      # change since the last main run) the save is a no-op.
      # Key matches the PR action's `sailfin-testbin-...` key exactly,
      # including `runtime/capsule.toml` + `runtime/ir/**` (manifest and
      # cross-windows link stub) so a runtime edit rolls the key and the
      # baseline can publish a fresh entry (an existing key makes
      # `cache/save` a no-op). (`runtime/native/**` retired in #823.)
      - name: Save test-bin cache for PR CI
        uses: actions/cache/save@v6
        with:
          path: build/cache/test-bin
          key: sailfin-testbin-linux-x86_64-${{ steps.seed.outputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'runtime/capsule.toml', 'runtime/ir/**', 'compiler/capsule.toml', 'bootstrap.toml') }}

  # Failure-mode job (issue #782). Runs only when `build-quality` fails.
  # Elevated permissions are scoped to this job alone so the gate job
  # itself stays `contents: read` (architect verdict on #339 Q4).
  #
  # Responsibilities:
  #   1. Open or append a dedup'd regression issue tagged
  #      `area:architecture` and the stable marker
  #      `build-quality-regression` (a build-quality regression is
  #      inherently release-critical; priority is a Linear-native field, not
  #      a GitHub label — `linear-priority-sync.yml` backfills the mirror's
  #      priority to Urgent from this marker). Title prefix
  #      `build-quality regression:` + gate-name suffix lets later runs
  #      append a comment rather than open a duplicate.
  #   2. On `push: main` only, look up the merging PR (`/commits/{sha}/
  #      pulls`) and post a comment linking the regression issue + the
  #      failing run. `schedule:` and `workflow_dispatch:` runs are not
  #      tied to a single merging PR, so they skip the PR side-effect.
  #
  # Triage runbook lives at `docs/runbooks/build-quality.md`.
  notify-failure:
    name: Open regression issue + PR comment on failure
    needs: [build-quality, test-bin-baseline]
    # Fire on a genuine gate failure OR a warmer failure/timeout.
    #
    # `always()` (not `!cancelled()`) is required: a `test-bin-baseline`
    # `timeout-minutes` expiry surfaces as a `cancelled` job conclusion and
    # rolls the whole run up to `cancelled` (the run-1010 symptom, fixed by
    # raising the cap in PR #2492). `!cancelled()` would suppress exactly the
    # signal this job exists to report, which is how the warmer timeout went
    # untracked in the first place. On a green run every result is `success`
    # so the parenthesised test is false and this job is skipped.
    #
    # Concurrency-supersede does NOT spam (SFN-395), distinguished purely by
    # the per-job `concurrency:` semantics already in this file:
    #   - The gate job runs `cancel-in-progress: true`, so a superseded gate
    #     lands as `cancelled` — and this `if:` only acts on the gate for
    #     `== 'failure'`, so a supersede is ignored.
    #   - The warmer job runs `cancel-in-progress: false`, so it is never
    #     supersede-cancelled; any `cancelled` there is a real timeout.
    if: >-
      always() &&
      (needs.build-quality.result == 'failure' ||
       needs.test-bin-baseline.result == 'failure' ||
       needs.test-bin-baseline.result == 'cancelled')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      # When the gate failed, use its per-gate suffix (`determinism` /
      # `cache-hit-rate` / `build-setup`); otherwise this run fired for the
      # warmer path, so use the stable `test-bin-warmer` suffix. The gate's
      # `Identify failed gate` step always writes a non-empty name whenever
      # `build-quality.result == 'failure'`, so this select never falls
      # through to the warmer suffix on a real gate failure. The suffix is
      # resolved here rather than as a warmer-job output because a warmer
      # timeout cancels the job before an `if: failure()` output step could
      # run, and a cancelled job's outputs are not reliably propagated.
      GATE_NAME: ${{ needs.build-quality.result == 'failure' && needs.build-quality.outputs.gate_name || 'test-bin-warmer' }}
      FAIL_SHA: ${{ github.sha }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      EVENT_NAME: ${{ github.event_name }}
      REF: ${{ github.ref }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download pass artifacts (best-effort)
        uses: actions/download-artifact@v8
        with:
          name: build-quality-passes
          path: build-quality-passes
        continue-on-error: true

      - name: Build diff excerpt
        id: excerpt
        shell: bash
        run: |
          set -euo pipefail
          # Cap the embedded diff at ~50 lines per issue scope. The full
          # JSON is preserved as the workflow artifact (14-day retention),
          # so triage can pull the rest from there. Markers below let the
          # next run's dedup-append step trim or re-render the excerpt.
          excerpt_file="excerpt.md"
          : > "$excerpt_file"
          gate="${GATE_NAME:-build-setup}"
          # Only pass2.json contributes to the embedded excerpt
          # (determinism diff lives there, and so does the BuildReport
          # the hit-rate gate reads from). pass1.json is still
          # uploaded as a workflow artifact for offline triage.
          pass2="build-quality-passes/pass2.json"
          case "$gate" in
            determinism)
              echo "<!-- gate:determinism -->" >> "$excerpt_file"
              echo '```json' >> "$excerpt_file"
              if [ -f "$pass2" ]; then
                # The determinism object is the second JSON value in
                # pass2.json (the first is the outer BuildReport).
                jq -s '.[] | select(.check == "determinism")' "$pass2" \
                  | head -n 50 >> "$excerpt_file" || true
              else
                echo "(pass2.json artifact missing — see job log)" >> "$excerpt_file"
              fi
              echo '```' >> "$excerpt_file"
              ;;
            cache-hit-rate)
              echo "<!-- gate:cache-hit-rate -->" >> "$excerpt_file"
              echo '```json' >> "$excerpt_file"
              if [ -f "$pass2" ]; then
                jq -s '.[0].cache' "$pass2" | head -n 50 >> "$excerpt_file" || true
              else
                echo "(pass2.json artifact missing — see job log)" >> "$excerpt_file"
              fi
              echo '```' >> "$excerpt_file"
              ;;
            test-bin-warmer)
              # The warmer job produces no pass1/pass2 artifact, so there is
              # no determinism/hit-rate diff to embed. Point triage at the
              # `Warm test-bin cache` job log instead (suite failure or
              # `timeout-minutes` expiry).
              echo "<!-- gate:test-bin-warmer -->" >> "$excerpt_file"
              echo "_The \`test-bin-baseline\` cache-warmer job failed or timed out (a \`cancelled\` job conclusion is a \`timeout-minutes\` expiry — the warmer never supersede-cancels). No determinism/hit-rate diff applies. Inspect the \`Warm test-bin cache\` job log in the failing run and follow \`docs/runbooks/build-quality.md\` → \"test-bin warmer timeout\"._" >> "$excerpt_file"
              ;;
            *)
              echo "<!-- gate:build-setup -->" >> "$excerpt_file"
              echo "_No gate-level diff captured: the failure occurred before either gate ran (seed fetch, \`make compile\`, or first-pass build)._" >> "$excerpt_file"
              ;;
          esac
          echo "file=$excerpt_file" >> "$GITHUB_OUTPUT"
          echo "gate=$gate" >> "$GITHUB_OUTPUT"

      - name: Open or append regression issue
        id: regression_issue
        shell: bash
        run: |
          set -euo pipefail
          gate="${{ steps.excerpt.outputs.gate }}"
          title="build-quality regression: ${gate}"
          excerpt="$(cat "${{ steps.excerpt.outputs.file }}")"

          # Dedup anchor is the `build-quality-regression` label plus
          # exact title equality. List all open issues with the marker
          # label and filter by title in jq — that avoids both gh's
          # quoting quirks around `--search "in:title ..."` and the
          # risk of a substring match shadowing a sibling gate's issue.
          existing="$(gh issue list \
            --repo "$REPO" \
            --state open \
            --label build-quality-regression \
            --limit 100 \
            --json number,title \
            --jq "[.[] | select(.title == \"${title}\")] | .[0].number // empty")"

          {
            echo "**Failure run:** ${RUN_URL}"
            echo "**Commit:** \`${FAIL_SHA}\`"
            echo "**Event:** \`${EVENT_NAME}\` on \`${REF}\`"
            echo "**Gate:** \`${gate}\`"
            echo ""
            echo "${excerpt}"
          } > regression-body.md

          if [ -n "$existing" ]; then
            echo "[notify] appending comment to existing regression issue #${existing}"
            gh issue comment "$existing" --repo "$REPO" --body-file regression-body.md
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            # New issue: full body starts with the human-readable
            # description, then the per-failure block above.
            {
              echo "# build-quality regression: ${gate}"
              echo ""
              echo "The \`build-quality.yml\` gate failed on \`${gate}\`. This issue tracks the regression and aggregates additional failures via comments — see \`docs/runbooks/build-quality.md\` for the triage runbook (reproduce locally, bisect, file a \`seed-blocker\`-labeled fix issue)."
              echo ""
              echo "## Latest failure"
              echo ""
              cat regression-body.md
            } > regression-new-body.md
            new_number="$(gh issue create \
              --repo "$REPO" \
              --title "$title" \
              --label "area:architecture" \
              --label "build-quality-regression" \
              --body-file regression-new-body.md \
              | awk -F/ '/^https:/{print $NF}')"
            echo "[notify] opened new regression issue #${new_number}"
            echo "number=$new_number" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      # Per scope: PR comment only on `push: main` events. Schedule and
      # manual dispatches aren't tied to a single merging PR.
      - name: Comment on merging PR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail
          issue_number="${{ steps.regression_issue.outputs.number }}"
          # `/commits/{sha}/pulls` returns every PR the commit appears
          # in; for a merge to main the first entry is the merging PR.
          # gh exits 0 even when the array is empty, so guard against
          # missing data instead of relying on exit codes.
          pr_number="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/commits/${FAIL_SHA}/pulls" \
            --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            echo "[notify] no merging PR found for ${FAIL_SHA}; skipping PR comment"
            exit 0
          fi
          echo "[notify] commenting on merging PR #${pr_number}"
          {
            echo "build-quality gate failed on this merge: \`${GATE_NAME:-build-setup}\`."
            echo ""
            echo "- Tracking issue: #${issue_number}"
            echo "- Failing run: ${RUN_URL}"
            echo "- Runbook: \`docs/runbooks/build-quality.md\`"
          } > pr-comment.md
          gh pr comment "$pr_number" --repo "$REPO" --body-file pr-comment.md
