name: "Sailfin Build + Package"
description: "Builds the native compiler from a seed, prepares test artifacts, runs tests, validates seedcheck, and produces dist/ packages + installer archive."
inputs:
  target:
    description: "Packaging target label (e.g. linux-x86_64, macos-arm64)"
    required: true
  clang:
    description: "Clang executable"
    required: false
    default: "clang"
  seed_repo:
    description: "Repo used by install.sh for seed fetching"
    required: false
    default: "SailfinIO/sailfin"
  seed_version:
    description: "Seed version tag (without v), or 'latest'"
    required: false
    default: "latest"
  seed_exclude_tag:
    description: "Optional tag to exclude"
    required: false
    default: ""
  run_seedcheck:
    description: "Whether to build and test the seedcheck binary (expensive, skip on PRs)"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Fetch released seed compiler
      shell: bash -l {0}
      run: |
        set -euo pipefail
        seed_version="${{ inputs.seed_version }}"
        seed_exclude_tag="${{ inputs.seed_exclude_tag }}"
        if [ -z "$seed_version" ]; then
          seed_version="latest"
        fi
        CONDA=$(which conda) \
          make fetch-seed \
            SEED_REPO="${{ inputs.seed_repo }}" \
            SEED_VERSION="$seed_version" \
            SEED_EXCLUDE_TAG="$seed_exclude_tag"
        echo "[ci] seed binary: build/seed/bin/sailfin"
        build/seed/bin/sailfin version

    - name: Build native compiler (selfhost from released seed)
      shell: bash -l {0}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        make rebuild \
          CLANG="${{ inputs.clang }}" \
          SEED_NATIVE="build/seed/bin/sailfin"

    - name: Prepare test artifacts
      shell: bash {0}
      run: |
        set -euo pipefail
        make ci-prepare-test-artifacts

    - name: Run tests (first-pass binary)
      shell: bash {0}
      run: |
        set -euo pipefail
        make test

    - name: Build seedcheck (no Python fixups)
      if: inputs.run_seedcheck == 'true'
      shell: bash {0}
      run: |
        set -euo pipefail
        echo "[ci] building seedcheck with build.sh (zero fixups)..."
        SEED="build/native/sailfin" \
          OUT="build/native/sailfin-seedcheck" \
          OPT="-O0" \
          JOBS=1 \
          CLANG="${{ inputs.clang }}" \
          SEED_TIMEOUT=600 \
          MAX_TOTAL=7200 \
          bash scripts/build.sh
        ls -lh build/native/sailfin-seedcheck
        build/native/sailfin-seedcheck version || true

    - name: Validate seedcheck (hello-world)
      if: inputs.run_seedcheck == 'true'
      shell: bash {0}
      run: |
        set -euo pipefail
        TMOUT="timeout"
        if ! command -v timeout &>/dev/null; then
          if command -v gtimeout &>/dev/null; then TMOUT="gtimeout"; else TMOUT=""; fi
        fi
        if [ -n "$TMOUT" ]; then
          output=$($TMOUT 30 build/native/sailfin-seedcheck run examples/basics/hello-world.sfn 2>&1) || true
        else
          output=$(build/native/sailfin-seedcheck run examples/basics/hello-world.sfn 2>&1) || true
        fi
        if ! echo "$output" | grep -q "Hello, Sailfin!"; then
          echo "[ci][FAIL] seedcheck cannot run hello-world.sfn"
          echo "[ci][FAIL] got: $output"
          exit 1
        fi
        echo "[ci] seedcheck runs hello-world.sfn OK"

    - name: Run tests (seedcheck binary)
      if: inputs.run_seedcheck == 'true'
      shell: bash {0}
      run: |
        set -euo pipefail
        make test NATIVE_BIN=build/native/sailfin-seedcheck

    - name: Package artifacts
      shell: bash {0}
      run: |
        set -euo pipefail
        make ci-package TARGET="${{ inputs.target }}"
