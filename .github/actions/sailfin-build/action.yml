name: "Sailfin Build + Package"
description: "Builds the native compiler from a seed, prepares test artifacts, runs tests, validates seedcheck, and produces dist/ packages + installer archive."
inputs:
  target:
    description: "Packaging target label (e.g. linux-x86_64, macos-arm64)"
    required: true
  clang:
    description: "Clang executable"
    required: false
    default: "clang"
  seed_repo:
    description: "Repo used by install.sh for seed fetching"
    required: false
    default: "SailfinIO/sailfin"
  seed_version:
    description: "Seed version tag (without v), or 'latest'"
    required: false
    default: "latest"
  seed_exclude_tag:
    description: "Optional tag to exclude"
    required: false
    default: ""
  build_jobs:
    description: "Parallel module builds (BUILD_JOBS). Empty = let the Makefile auto-detect via scripts/detect_build_jobs.sh (CPU + RAM heuristic; macOS capped at 2). Set to a specific N to pin (e.g. for a regression bisect)."
    required: false
    default: ""
  shard:
    description: "Test shard to run (unit-a|unit-b|int-e2e-caps|e2e-sh). Empty = run the full `make test` suite. See scripts/test_shards.sh."
    required: false
    default: ""
  package:
    description: "Build + upload dist/ packages ('true'/'false'). Set 'false' on non-primary shard legs so packaging runs once per OS."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    # Restore the fetched seed binary keyed on target + pinned version.
    # The key is exact (no restore-keys): a hit guarantees the binary
    # matches `.seed-version`, so the fetch step below can safely skip
    # the download. Saved automatically in the job's post phase.
    #
    # Gated to a concrete pin: with `seed_version` unset/`latest` the key
    # (`...-latest`) never changes as the moving `latest` tag advances,
    # so a cache hit + the skip-download guard below would pin the runner
    # to a stale seed forever. All current callers pass a resolved
    # `.seed-version` pin; this `if:` keeps a future `latest` caller
    # correct (it just re-downloads every run). The build cache below is
    # not gated — it is self-protecting because `cache_key_for`
    # (compiler/src/build_cache.sfn) embeds the real seed/compiler
    # version in the on-disk digest, so a stale-seed entry simply misses.
    - name: Restore seed cache
      if: ${{ inputs.seed_version != '' && inputs.seed_version != 'latest' }}
      uses: actions/cache@v4
      with:
        path: build/seed
        key: sailfin-seed-${{ inputs.target }}-${{ inputs.seed_version }}

    - name: Fetch released seed compiler
      shell: bash {0}
      run: |
        set -euo pipefail
        seed_version="${{ inputs.seed_version }}"
        seed_exclude_tag="${{ inputs.seed_exclude_tag }}"
        if [ -z "$seed_version" ]; then
          seed_version="latest"
        fi
        # Skip the download on a seed-cache hit. The cache key pins the
        # exact version, so a present + invokable binary is the right one.
        if [ -x build/seed/bin/sailfin ] && build/seed/bin/sailfin version >/dev/null 2>&1; then
          echo "[ci] seed cache hit ($seed_version) — skipping fetch"
        else
          make fetch-seed \
              SEED_REPO="${{ inputs.seed_repo }}" \
              SEED_VERSION="$seed_version" \
              SEED_EXCLUDE_TAG="$seed_exclude_tag"
        fi
        echo "[ci] seed binary: build/seed/bin/sailfin"
        build/seed/bin/sailfin version

    # Restore the content-addressed module IR cache (`build/cache/`,
    # written by `<seed> build -p compiler`). Keys are content-safe:
    # `cache_key_for` (compiler/src/build_cache.sfn) hashes source
    # content + sorted dep-manifest hashes + compiler version + flags —
    # no absolute paths or mtimes — so a restored cache is reusable
    # across runners and runs. Changed modules simply miss and re-emit;
    # stale entries are never looked up (and LRU-evicted by GitHub).
    # restore-keys fall back to the most recent cache for this
    # target+seed (then any cache for this target), so a PR warms from
    # main's cache (primed by build-quality.yml) and from its own
    # earlier pushes.
    - name: Restore build cache (content-addressed module IR)
      uses: actions/cache@v4
      with:
        path: build/cache
        key: sailfin-buildcache-${{ inputs.target }}-${{ inputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'compiler/capsule.toml', '.seed-version') }}
        restore-keys: |
          sailfin-buildcache-${{ inputs.target }}-${{ inputs.seed_version }}-
          sailfin-buildcache-${{ inputs.target }}-

    - name: Build native compiler (selfhost from released seed)
      shell: bash {0}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # Forward build_jobs only when explicitly set; an empty value means
        # "let the Makefile auto-detect" (scripts/detect_build_jobs.sh).
        # The if/else split avoids bash 3.2's "${arr[@]}" empty-array
        # unbound-variable error under set -u (macOS still ships /bin/bash
        # 3.2 by default).
        if [ -n "${{ inputs.build_jobs }}" ]; then
          make rebuild \
            CLANG="${{ inputs.clang }}" \
            SEED_NATIVE="build/seed/bin/sailfin" \
            BUILD_JOBS="${{ inputs.build_jobs }}"
        else
          make rebuild \
            CLANG="${{ inputs.clang }}" \
            SEED_NATIVE="build/seed/bin/sailfin"
        fi

    - name: Prepare test artifacts
      shell: bash {0}
      run: |
        set -euo pipefail
        make ci-prepare-test-artifacts

    - name: Run tests (first-pass binary)
      shell: bash {0}
      run: |
        set -euo pipefail
        # Empty shard = full suite (release workflows + back-compat).
        # A shard name runs only that disjoint slice; the union across
        # legs equals `make test` (asserted by the shard-cover lint).
        if [ -n "${{ inputs.shard }}" ]; then
          make test-shard SHARD="${{ inputs.shard }}"
        else
          make test
        fi

    - name: Package artifacts
      if: ${{ inputs.package == 'true' }}
      shell: bash {0}
      run: |
        set -euo pipefail
        make ci-package TARGET="${{ inputs.target }}"
