name: "Sailfin Build + Package"
description: "Builds the native compiler from a seed, prepares test artifacts, runs tests, validates seedcheck, and produces dist/ packages + installer archive."
inputs:
  target:
    description: "Packaging target label (e.g. linux-x86_64, macos-arm64)"
    required: true
  clang:
    description: "Clang executable"
    required: false
    default: "clang"
  seed_repo:
    description: "Repo used by install.sh for seed fetching"
    required: false
    default: "SailfinIO/sailfin"
  seed_version:
    description: "Seed version tag (without v), or 'latest'"
    required: false
    default: "latest"
  seed_exclude_tag:
    description: "Optional tag to exclude"
    required: false
    default: ""
  build_jobs:
    description: "Parallel module builds (BUILD_JOBS). Empty = let the Makefile auto-detect via scripts/detect_build_jobs.sh (CPU + RAM heuristic; macOS capped at 2). Set to a specific N to pin (e.g. for a regression bisect)."
    required: false
    default: ""
  shard:
    description: "Test shard to run (unit-a|unit-b|unit-c|int-caps|e2e-a|e2e-b|e2e-c|e2e-d). Empty = run the full `make test` suite. See scripts/test_shards.sh."
    required: false
    default: ""
  test_jobs:
    description: "Parallel test children for the full-suite path (TEST_JOBS, forwarded to `make test` — see Makefile). Empty = serial (TEST_JOBS=1). Only consulted when `shard` is empty: the shard path parallelizes across CI legs instead. Pick N for the runner's RAM budget — each child carries its own footprint under the 8GB per-process cap (e.g. 4 on 4-vCPU/16GB ubuntu, 2 on 3-vCPU/7GB macos-15)."
    required: false
    default: ""
  shard_test_jobs:
    description: "Per-file parallelism WITHIN a shard leg (SAILFIN_TEST_JOBS, forwarded to `scripts/test_shards.sh run`). Only consulted when `shard` is set. Empty/1 = serial (byte-identical to the historical shard run). Benchmarked sweet spots: 3 on 4-vCPU/16GB ubuntu, 2 on 3-vCPU/7GB macos-arm64 (no RLIMIT_AS backstop there). Peak RSS stays a fraction of the runner budget because test fixtures emit ~30x lighter than a heavy compiler module."
    required: false
    default: ""
  package:
    description: "Build + upload dist/ packages ('true'/'false'). Set 'false' on non-primary shard legs so packaging runs once per OS."
    required: false
    default: "true"
  mode:
    description: >-
      Pipeline slice to run. 'full' (default) = fetch seed + build + test +
      package (back-compat for release-*.yml / build-quality.yml callers).
      'build-only' = fetch seed + build the compiler, skip tests/packaging —
      used by the shared per-OS build-compiler job in ci.yml. 'skip-build' =
      trust an already-present build/native + build/cache tree (downloaded
      from the build-compiler artifact) and run tests/packaging only; no
      seed fetch, no `make rebuild`. 'build-package' = fetch seed + build +
      package, skip the test suite — the slim release gate (#843): a release
      commit is a mechanical version bump on a main SHA that already passed
      full PR CI + push:main validation, so the release legs verify the
      build/package/smoke surface and delegate suite coverage to main CI
      and the nightly self-host.
    required: false
    default: "full"
runs:
  using: "composite"
  steps:
    # Restore the fetched seed binary keyed on target + pinned version.
    # The key is exact (no restore-keys): a hit guarantees the binary
    # matches `.seed-version`, so the fetch step below can safely skip
    # the download. Saved automatically in the job's post phase.
    #
    # Gated to a concrete pin: with `seed_version` unset/`latest` the key
    # (`...-latest`) never changes as the moving `latest` tag advances,
    # so a cache hit + the skip-download guard below would pin the runner
    # to a stale seed forever. All current callers pass a resolved
    # `.seed-version` pin; this `if:` keeps a future `latest` caller
    # correct (it just re-downloads every run). The build cache below is
    # not gated — it is self-protecting because `cache_key_for`
    # (compiler/src/build_cache.sfn) embeds the real seed/compiler
    # version in the on-disk digest, so a stale-seed entry simply misses.
    - name: Restore seed cache
      if: ${{ inputs.mode != 'skip-build' && inputs.seed_version != '' && inputs.seed_version != 'latest' }}
      uses: actions/cache@v4
      with:
        path: build/seed
        key: sailfin-seed-${{ inputs.target }}-${{ inputs.seed_version }}

    - name: Fetch released seed compiler
      if: ${{ inputs.mode != 'skip-build' }}
      shell: bash {0}
      run: |
        set -euo pipefail
        seed_version="${{ inputs.seed_version }}"
        seed_exclude_tag="${{ inputs.seed_exclude_tag }}"
        if [ -z "$seed_version" ]; then
          seed_version="latest"
        fi
        # Skip the download on a seed-cache hit. The cache key pins the
        # exact version, so a present + invokable binary is the right one.
        if [ -x build/seed/bin/sailfin ] && build/seed/bin/sailfin version >/dev/null 2>&1; then
          echo "[ci] seed cache hit ($seed_version) — skipping fetch"
        else
          make fetch-seed \
              SEED_REPO="${{ inputs.seed_repo }}" \
              SEED_VERSION="$seed_version" \
              SEED_EXCLUDE_TAG="$seed_exclude_tag"
        fi
        echo "[ci] seed binary: build/seed/bin/sailfin"
        build/seed/bin/sailfin version

    # Restore the content-addressed module IR cache (`build/cache/`,
    # written by `<seed> build -p compiler`). Keys are content-safe:
    # `cache_key_for` (compiler/src/build_cache.sfn) hashes source
    # content + sorted dep-manifest hashes + compiler version + flags —
    # no absolute paths or mtimes — so a restored cache is reusable
    # across runners and runs. Changed modules simply miss and re-emit;
    # stale entries are never looked up (and LRU-evicted by GitHub).
    # restore-keys fall back to the most recent cache for this
    # target+seed (then any cache for this target), so a PR warms from
    # main's cache (primed by build-quality.yml) and from its own
    # earlier pushes.
    - name: Restore build cache (content-addressed module IR)
      if: ${{ inputs.mode != 'skip-build' }}
      uses: actions/cache@v4
      with:
        path: build/cache
        key: sailfin-buildcache-${{ inputs.target }}-${{ inputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'compiler/capsule.toml', '.seed-version') }}
        restore-keys: |
          sailfin-buildcache-${{ inputs.target }}-${{ inputs.seed_version }}-
          sailfin-buildcache-${{ inputs.target }}-

    # Restore the per-test linked-binary cache (`build/cache/test-bin`,
    # #1230/#1233) under its OWN key prefix, separate from the module-IR
    # cache above. This is deliberate: a shared `sailfin-buildcache-`
    # prefix would let a test-bin-only entry shadow the module-IR cache on
    # a restore-keys prefix match and force a cold compiler build. The
    # producer is the `test-bin-baseline` job in `build-quality.yml`
    # (push:main + nightly), which runs the full `.sfn` suite with the
    # cache ENABLED and `cache/save`s `build/cache/test-bin` under this
    # exact key. GitHub scopes caches to the branch + default branch, so a
    # PR's first run restores main's baseline. This step runs AFTER the
    # module-IR restore so the populated test-bin subtree overlays the
    # (empty) test-bin the module-IR save carries. Cross-commit hits work
    # because the test-bin cache identity is the commit-STABLE capsule
    # version (#1233): a baseline at one commit warms a PR at another.
    # The hashFiles set includes the runtime capsule manifest
    # (`runtime/capsule.toml`) and `runtime/ir/**` (the cross-windows
    # link stub) on top of the `.sfn` trees, because those inputs change
    # the linked runtime objects baked into a cached test binary.
    # (`runtime/native/**` retired in #823 when that directory was
    # deleted.) `actions/cache/save` is a no-op when a key already exists,
    # so omitting them would pin PRs to a stale baseline after a runtime
    # edit (and the baseline job could never publish a fresh entry). They
    # are also folded into the per-test cache key by content
    # (`runtime_link_inputs_identity`), so this is belt-and-braces.
    - name: Restore test-bin cache (per-test linked binaries)
      if: ${{ inputs.mode != 'build-only' && inputs.mode != 'build-package' }}
      uses: actions/cache@v4
      with:
        path: build/cache/test-bin
        key: sailfin-testbin-${{ inputs.target }}-${{ inputs.seed_version }}-${{ hashFiles('compiler/src/**/*.sfn', 'runtime/**/*.sfn', 'runtime/capsule.toml', 'runtime/ir/**', 'compiler/capsule.toml', '.seed-version') }}
        restore-keys: |
          sailfin-testbin-${{ inputs.target }}-${{ inputs.seed_version }}-
          sailfin-testbin-${{ inputs.target }}-

    # OpenSSL link path (macOS only). The native runtime now links
    # `-lssl -lcrypto` (TLS, SFEP-0036 #1782), so every Sailfin binary —
    # incl. the compiler — links OpenSSL. On Linux `libssl-dev` is on the
    # default search path; on macOS Homebrew's `openssl@3` is keg-only
    # (not symlinked into a default `-l` search dir), so clang reports
    # `ld: library 'ssl' not found`. Export the keg's lib dir via
    # `LIBRARY_PATH` (clang honours it for `-l` resolution) and
    # `DYLD_FALLBACK_LIBRARY_PATH` (so the built binary loads the dylib at
    # run time) into $GITHUB_ENV so the build + test steps inherit it.
    # macOS-gated: Linux/Windows legs are byte-identical.
    - name: Provision OpenSSL link path (macOS)
      if: ${{ inputs.mode != 'skip-build' && inputs.target == 'macos-arm64' }}
      shell: bash {0}
      run: |
        set -euo pipefail
        prefix="$(brew --prefix openssl@3 2>/dev/null || true)"
        if [ -z "$prefix" ] || [ ! -d "$prefix/lib" ]; then
          brew install openssl@3
          prefix="$(brew --prefix openssl@3)"
        fi
        echo "LIBRARY_PATH=${prefix}/lib:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
        echo "DYLD_FALLBACK_LIBRARY_PATH=${prefix}/lib:${DYLD_FALLBACK_LIBRARY_PATH:-/usr/local/lib:/usr/lib}" >> "$GITHUB_ENV"
        echo "[ci] macOS OpenSSL link path: ${prefix}/lib"

    - name: Build native compiler (selfhost from released seed)
      if: ${{ inputs.mode != 'skip-build' }}
      shell: bash {0}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # #1235 measurement (macOS only — the issue scopes Linux OUT).
        # Time the build phase and flip on the existing SAILFIN_AGENT_REPORT
        # gate (Makefile rebuild-impl, #1120) so the seed emits its module-IR
        # BuildReport to build/native/.build-report.json — that is where
        # `cache.hit_rate` lives. Purely additive + macOS-scoped: the two
        # `date` calls are no-ops and every write is behind `_measure`, so
        # Linux / release builds stay byte-identical.
        _measure=0
        if [ "${{ inputs.target }}" = "macos-arm64" ]; then
          _measure=1
          export SAILFIN_AGENT_REPORT=1
        fi
        _t0=$(date +%s)
        # Forward build_jobs only when explicitly set; an empty value means
        # "let the Makefile auto-detect" (scripts/detect_build_jobs.sh).
        # The if/else split avoids bash 3.2's "${arr[@]}" empty-array
        # unbound-variable error under set -u (macOS still ships /bin/bash
        # 3.2 by default).
        if [ -n "${{ inputs.build_jobs }}" ]; then
          make rebuild \
            CLANG="${{ inputs.clang }}" \
            SEED_NATIVE="build/seed/bin/sailfin" \
            BUILD_JOBS="${{ inputs.build_jobs }}"
        else
          make rebuild \
            CLANG="${{ inputs.clang }}" \
            SEED_NATIVE="build/seed/bin/sailfin"
        fi
        _t1=$(date +%s)
        if [ "$_measure" = "1" ]; then
          _build_s=$(( _t1 - _t0 ))
          _hit_rate="n/a"
          if command -v jq >/dev/null 2>&1 && [ -f build/native/.build-report.json ]; then
            _hit_rate="$(jq -r '.cache.hit_rate // "n/a"' build/native/.build-report.json 2>/dev/null || echo n/a)"
          fi
          mkdir -p build
          {
            echo "ci_metrics_phase=build"
            echo "ci_metrics_target=${{ inputs.target }}"
            echo "build_seconds=${_build_s}"
            echo "build_cache_hit_rate=${_hit_rate}"
          } >> build/ci-metrics.env
          echo "[ci-metrics] build phase: ${_build_s}s, module-IR cache.hit_rate=${_hit_rate}"
        fi

    # skip-build mode: the compiler tree was downloaded from the shared
    # per-OS build-compiler artifact instead of being rebuilt here. Verify
    # the binary survived the artifact round-trip *executable* (GitHub
    # artifacts strip permissions unless the producer tars first — the
    # build-compiler job does) and actually runs before spending test time.
    - name: Verify downloaded compiler tree (skip-build mode)
      if: ${{ inputs.mode == 'skip-build' }}
      shell: bash {0}
      run: |
        set -euo pipefail
        if [ ! -x build/native/sailfin ]; then
          echo "[ci][error] skip-build mode: build/native/sailfin missing or not executable" >&2
          ls -l build/native 2>/dev/null || true
          exit 1
        fi
        build/native/sailfin version

    - name: Prepare test artifacts
      if: ${{ inputs.mode != 'build-only' && inputs.mode != 'build-package' }}
      shell: bash {0}
      run: |
        set -euo pipefail
        make ci-prepare-test-artifacts

    - name: Run tests (first-pass binary)
      if: ${{ inputs.mode != 'build-only' && inputs.mode != 'build-package' }}
      shell: bash {0}
      run: |
        set -euo pipefail
        # #1235 measurement (macOS only). Time the test phase and flip on
        # the SAILFIN_AGENT_REPORT gate so `make test-shard` →
        # scripts/test_shards.sh forwards `--json` + tees
        # build/agent-test.shard-<shard>.jsonl, whose `summary` event carries
        # cache.test_bin_hit_rate (#1230). Additive + macOS-scoped; Linux
        # shard legs keep the byte-identical human run.
        _measure=0
        if [ "${{ inputs.target }}" = "macos-arm64" ]; then
          _measure=1
          export SAILFIN_AGENT_REPORT=1
        fi
        _t0=$(date +%s)
        # No step-level ulimit: since seed 0.7.0-alpha.33 every sailfin
        # invocation self-applies an 8 GiB RLIMIT_AS on Linux at its own
        # startup (#1291, .claude/rules/compiler-safety.md) — each
        # per-test compiler process is capped independently, and the
        # subprocesses IT spawns (emit workers, clang, compiled test
        # programs) inherit that cap. Non-compiler processes the suite
        # runs directly are not capped; they were never the OOM vector.
        # A runaway compile thus fails cleanly per-test instead of
        # OOM-killing the hosted runner.
        # Empty shard = full suite (release workflows + back-compat).
        # A shard name runs only that disjoint slice; the union across
        # legs equals `make test` (asserted by the shard-cover lint).
        # Per-file parallelism within a shard leg (benchmarked: ~2x e2e /
        # ~6x unit throughput, peak RSS a fraction of the runner budget).
        # Forwarded via SAILFIN_TEST_JOBS, which scripts/test_shards.sh reads.
        # Empty/unset keeps the byte-identical serial shard run.
        if [ -n "${{ inputs.shard_test_jobs }}" ]; then
          export SAILFIN_TEST_JOBS="${{ inputs.shard_test_jobs }}"
        fi
        run_tests() {
          if [ -n "${{ inputs.shard }}" ]; then
            make test-shard SHARD="${{ inputs.shard }}"
          elif [ -n "${{ inputs.test_jobs }}" ]; then
            # Full-suite path with parallel test children (#843 Track A).
            # Forwarded only when explicitly set so the default invocation
            # stays byte-identical to the historical `make test`.
            make test TEST_JOBS="${{ inputs.test_jobs }}"
          else
            make test
          fi
        }
        # Retry-once: #892 is a live non-deterministic codegen heap bug
        # that intermittently corrupts an *unrelated* test's compile
        # (garbled link temp name, or a hang -> timeout). A re-run hits a
        # different random victim and almost always passes. A *persistent*
        # failure still fails the retry -> red, so real breakage is not
        # masked. The ::warning:: keeps every flake hit visible/tracked
        # in the run summary so #892's frequency stays measurable.
        if ! run_tests; then
          echo "::warning title=test flake (likely #892)::tests failed on attempt 1; retrying once. If this recurs, it is the non-deterministic codegen corruption tracked in #892."
          echo "[ci] retrying tests once (attempt 2/2) — see #892"
          run_tests
        fi
        if [ "$_measure" = "1" ]; then
          _t1=$(date +%s)
          _test_s=$(( _t1 - _t0 ))
          _tbhr="n/a"
          sidecar="build/agent-test.shard-${{ inputs.shard }}.jsonl"
          if command -v jq >/dev/null 2>&1 && [ -s "$sidecar" ]; then
            _tbhr="$(jq -rs 'map(select(.event == "summary")) | last | .cache.test_bin_hit_rate // "n/a"' "$sidecar" 2>/dev/null || echo n/a)"
          fi
          mkdir -p build
          {
            echo "ci_metrics_phase=test"
            echo "ci_metrics_target=${{ inputs.target }}"
            echo "ci_metrics_shard=${{ inputs.shard }}"
            echo "test_seconds=${_test_s}"
            echo "test_bin_hit_rate=${_tbhr}"
          } >> build/ci-metrics.env
          echo "[ci-metrics] test phase (shard ${{ inputs.shard }}): ${_test_s}s, cache.test_bin_hit_rate=${_tbhr}"
        fi

    - name: Package artifacts
      if: ${{ inputs.package == 'true' && inputs.mode != 'build-only' }}
      shell: bash {0}
      run: |
        set -euo pipefail
        make ci-package TARGET="${{ inputs.target }}"
