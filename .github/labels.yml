# Canonical GitHub label registry for sailfinio/sailfin.
#
# This file is the single source of truth. Sync it to GitHub via:
#   - `scripts/setup-github-labels.sh` (manual/local), or
#   - the `Sync Labels` workflow that auto-runs on push to `main`
#     when this file changes.
#
# Schema:
#   labels:
#     - name:        canonical label name (kebab-case; `prefix:value` for namespaced)
#       color:       6-char hex, no leading #
#       description: <= 100 chars, displayed on hover
#   aliases:
#     - from:        legacy label name to retire
#       to:          canonical label that replaces it
#       # The setup script always migrate-then-deletes (regardless of
#       # whether `to` already existed): it adds `to` to every issue/PR
#       # carrying `from`, removes `from` from those issues/PRs, then
#       # deletes `from` from the repository. The GitHub REST rename
#       # endpoint exists, but we don't use it because most of our
#       # aliases target labels already in active use, and migrate-then-
#       # delete works uniformly across both cases.
#   delete:
#     - name:        label to remove outright (no replacement)
#
# When you add or edit a label here, update any workflow, prompt, or local
# agent instruction that references it. See `docs/conventions/issue-naming.md`
# for naming conventions and the lifecycle diagram.

labels:
  # --- Public issue triage hints ---------------------------------------
  # Linear owns maintainer workflow state natively. These labels remain only
  # for public GitHub issues, mirrors, and GitHub-only fallback flows.
  - name: needs-grooming
    color: "fbca04"
    description: "Placeholder issue: scope, criteria, or files-affected still missing"
  - name: needs-design
    color: "fbca04"
    description: "Design grooming needed before implementation"
  - name: needs-discussion
    color: "d93f0b"
    description: "Design blocked pending human input"
  - name: claude-ready
    color: "0e8a16"
    description: "GitHub fallback: fully groomed and eligible for /pickup"
  - name: in-progress
    color: "1d76db"
    description: "GitHub fallback: currently being worked; do not pick up"
  - name: blocked
    color: "b60205"
    description: "GitHub fallback: has open dependencies"

  # --- PR lifecycle ----------------------------------------------------
  - name: needs-review
    color: "fbca04"
    description: "PR ready for re-review after changes pushed"
  - name: needs-changes
    color: "d93f0b"
    description: "PR blocked: author rework required before merge"
  - name: approved
    color: "0e8a16"
    description: "All review agents approved; safe for human merge"
  - name: agent-authored
    color: "5319e7"
    description: "PR opened by an autonomous or assistant-driven workflow"
  - name: security
    color: "d93f0b"
    description: "Security-relevant issue or PR; requires Security review"

  # --- Type taxonomy (mirror Conventional Commit prefixes) -------------
  - name: type:feature
    color: "1d76db"
    description: "New language construct or capability (Conventional: feat)"
  - name: type:bug
    color: "d73a4a"
    description: "Defect or incorrect behaviour (Conventional: fix)"
  - name: type:perf
    color: "1d76db"
    description: "Speed or memory improvement (Conventional: perf)"
  - name: type:refactor
    color: "1d76db"
    description: "Structural change with no user-visible behaviour change"
  - name: type:tech-debt
    color: "bfd4f2"
    description: "Latent quality or cleanup work (Conventional: chore)"
  - name: type:docs
    color: "0075ca"
    description: "Documentation-only change (Conventional: docs)"

  # --- Size (effort estimate) ------------------------------------------
  - name: size:xs
    color: "c2e0c6"
    description: "<1 hour, single file"
  - name: size:s
    color: "c2e0c6"
    description: "1-3 hours, few files"
  - name: size:m
    color: "c2e0c6"
    description: "3-6 hours, multi-file. Larger items must be groomed into smaller issues."

  # --- Priority --------------------------------------------------------
  # Priority is a Linear-native field, not a GitHub label. Set it in Linear
  # at groom/triage time (Urgent/High/Medium/Low). The former `priority:*`
  # labels are retired via the `delete:` list below. See
  # docs/conventions/issue-naming.md § Reflecting state across Linear and GitHub.

  # --- Area (subsystem) ------------------------------------------------
  - name: area:compiler
    color: "c5def5"
    description: "compiler/src/* — lexer, parser, typecheck, effects, emit"
  - name: area:lowering
    color: "c5def5"
    description: "compiler/src/llvm/* — LLVM IR generation"
  - name: area:runtime
    color: "c5def5"
    description: "runtime/* — prelude, native runtime, Sailfin runtime port"
  - name: area:numeric
    color: "c5def5"
    description: "Integer/float/number type system work"
  - name: area:build
    color: "c5def5"
    description: "Makefile, build driver / capsule resolver, seed handling, build pipeline"
  - name: area:agents
    color: "c5def5"
    description: ".github/workflows, .claude/agents, agentic pipeline"
  - name: area:architecture
    color: "c5def5"
    description: "Cross-cutting design or proposals; not bound to one subsystem"
  - name: area:docs
    color: "c5def5"
    description: "docs/*, site/src/content/docs/*, README, CLAUDE.md"
  - name: area:dx
    color: "c5def5"
    description: "Diagnostics, error messages, ergonomics, tooling UX"
  - name: area:capsules
    color: "c5def5"
    description: "capsules/* — standard library and package capsule surfaces"

  # --- Special markers -------------------------------------------------
  - name: tracking
    color: "a371f7"
    description: "Legacy — trackers are Linear Projects; only for Release: vX.Y.Z cadence tracker"
  - name: seed-blocker
    color: "b60205"
    description: "Must close before the next seed binary is cut"
  - name: needs-seed-cut
    color: "fbca04"
    description: "Auto-flagged: in-seed predecessor merged; queued for next cadence seed bump"
  - name: release-critical-seed
    color: "b60205"
    description: "Seed need breaking cadence batch; off-cadence cut may be warranted"
  - name: build-quality-regression
    color: "b60205"
    description: "Auto-filed by build-quality.yml on gate failure; dedup anchor"
  - name: perf-regression
    color: "b60205"
    description: "Auto-filed by perf-history.yml on a module regression; dedup anchor"

  # --- Release gating --------------------------------------------------
  # Intent labels consumed by `/release`. The single uncurated combo is
  # `channel=alpha bump=prerelease` (the routine daily alpha) — every
  # other combination is curated and consults these labels:
  #   * any `bump=patch` / `bump=minor` / `bump=major`
  #   * any promotion to channel=beta / rc / stable
  # One issue may carry multiple release:* labels (e.g. `release:beta`
  # AND `release:1.0`). See docs/conventions/issue-naming.md
  # "Release tracking".
  - name: release:next-minor
    color: "0e8a16"
    description: "Must close before the next bump=minor cut (next 0.X.0)"
  - name: release:beta
    color: "0e8a16"
    description: "Must close before the next promotion to channel=beta"
  - name: release:rc
    color: "0e8a16"
    description: "Must close before the next promotion to channel=rc"
  - name: release:stable
    color: "0e8a16"
    description: "Must close before the next promotion to channel=stable"
  - name: release:1.0
    color: "0e8a16"
    description: "Must close before 1.0 GA (long-horizon gate)"

  # --- GitHub defaults we keep -----------------------------------------
  - name: good first issue
    color: "7057ff"
    description: "Good for first-time contributors"
  - name: help wanted
    color: "008672"
    description: "Extra attention is needed"
  - name: dependencies
    color: "0366d6"
    description: "Pull requests that update a dependency file (Dependabot)"
  - name: duplicate
    color: "cfd3d7"
    description: "This issue or pull request already exists"
  - name: question
    color: "d876e3"
    description: "Further information is requested"
  - name: wontfix
    color: "ffffff"
    description: "This will not be worked on"
  - name: invalid
    color: "e4e669"
    description: "Spam, malformed, or otherwise non-actionable"

# Legacy labels to migrate to their canonical replacement, then delete.
aliases:
  - from: bug
    to: type:bug
  - from: perf
    to: type:perf
  - from: tech-debt
    to: type:tech-debt
  - from: documentation
    to: type:docs
  - from: medium
    to: size:m
  - from: blocker
    to: blocked
  - from: runtime
    to: area:runtime
  - from: compiler
    to: area:compiler
  - from: build
    to: area:build
  - from: architecture
    to: area:architecture
  - from: agentic-workflows
    to: area:agents
  - from: "area:fmt"
    to: "area:dx"
  - from: "area:formatter"
    to: "area:dx"
  - from: "area:perf"
    to: "area:build"
  - from: "type:chore"
    to: "type:tech-debt"
  - from: "type:enhancement"
    to: "type:feature"
  - from: "type:test"
    to: "type:tech-debt"

# Labels to delete outright (no canonical replacement).
delete:
  - name: enhancement
    reason: "GitHub default never adopted; type:feature is canonical"
  - name: priority:critical
    reason: "Priority is now a Linear-native field, not a GitHub label"
  - name: priority:high
    reason: "Priority is now a Linear-native field, not a GitHub label"
  - name: priority:medium
    reason: "Priority is now a Linear-native field, not a GitHub label"
  - name: priority:low
    reason: "Priority is now a Linear-native field, not a GitHub label"
  - name: "priority: critical"
    reason: "Priority is now a Linear-native field, not a GitHub label"
  - name: design-approved
    reason: "Retired GitHub agentic approval marker; Linear Ready status is canonical"
  - name: focus:proposed
    reason: "Retired weekly-focus planner marker; Linear planning state replaced it"
  - name: focus:approved
    reason: "Retired weekly-focus planner marker; Linear planning state replaced it"
  - name: focus:stale
    reason: "Retired weekly-focus planner marker; Linear planning state replaced it"
  - name: epic
    reason: "Epics are Linear Projects; historical GitHub epic issues were migrated"
  - name: size:l
    reason: "L work must be broken down; size is Linear estimate plus XS/S/M only"
  - name: large
    reason: "Old T-shirt size label; use size:m or split the issue"
  - name: small
    reason: "Old T-shirt size label; use size:s"
  - name: xtra large
    reason: "Old T-shirt size label; split the issue"
  - name: workstream
    reason: "Workstreams are Linear Initiatives/Projects, not labels"
  - name: codex
    reason: "Assistant authorship is tracked by PR body/author; agent-authored is the canonical label"
  - name: claude-ready-remove
    reason: "Temporary migration helper; no canonical use"
  - name: released on @beta
    reason: "Old release automation label; release tracking uses release:* labels"
  - name: github_actions
    reason: "Dependabot ecosystem label; dependabot.yml now uses only dependencies"
  - name: javascript
    reason: "Dependabot ecosystem label; dependabot.yml now uses only dependencies"
  - name: python
    reason: "Dependabot ecosystem label; dependabot.yml now uses only dependencies"
